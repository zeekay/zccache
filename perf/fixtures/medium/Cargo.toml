[package]
name = "medium-rust-app"
version = "0.1.0"
edition = "2021"

# Standalone workspace so cargo never tries to fold this into the
# parent soldr workspace at crates/. The perf cluster builds this
# fixture in isolation under $RUNNER_TEMP, but checking in
# `[workspace]` here makes ad-hoc local builds work too.
[workspace]

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }

[profile.release]
# Keep codegen units > 1 so the cache exercises parallel unit hashing
# rather than one giant fat-LTO unit.
codegen-units = 16
lto = false
