[package]
name = "zccache"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
description = "Local-first compiler cache for C/C++/Rust/Emscripten"

[features]
default = []
# Enables zccache::test_support (dev-only helpers).
test-support = []
# Compatibility no-op: Tokio Console support is always compiled in and
# remains dormant unless the daemon is started with the tokio-console profile.
tokio-console = []

[dependencies]
# core
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
crash-handler = "0.6"

# hash
blake3 = { workspace = true }
memmap2 = { workspace = true }

# gha
reqwest = { workspace = true, features = ["json"] }
sha2 = { workspace = true }

# protocol
bincode = { workspace = true }
bytes = { workspace = true }
prost = { workspace = true }

# ipc + test-support: needs full tokio. The tracing feature lets Tokio emit
# runtime telemetry when the workspace is built with `--cfg tokio_unstable`.
tokio = { workspace = true, features = ["tracing"] }
console-subscriber = { workspace = true }

# fscache
dashmap = { workspace = true }
# arc-swap: atomic pointer swap used by `daemon::server::state::SharedState`
# to swap `dep_graph: ArcSwap<Arc<DepGraph>>` from the empty-default to the
# disk-loaded graph after `DaemonServer::bind` returns. Removes the prior
# `Arc::get_mut` constraint on `DaemonServer::set_dep_graph`, which is
# the foundation for the deferred-depgraph-load that closes the #637 /
# #640 first-wave herd window.
arc-swap = { workspace = true }
rayon = { workspace = true }

# artifact
redb = { workspace = true }
tempfile = { workspace = true }

# watcher
notify = { workspace = true }
jwalk = { workspace = true }
globset = "0.4"

# compiler
clang = { workspace = true }

# depgraph
rkyv = { workspace = true }
uuid = { version = "1", features = ["v4"] }

# fingerprint
clap = { workspace = true }
fs2 = { workspace = true }

# exec (issue #272): regex compiles `--key-args-filter` patterns
regex = { workspace = true }

# download stack
futures = { workspace = true }
tokio-util = { workspace = true }
zip = { workspace = true }
tar = { workspace = true }
flate2 = { workspace = true }
ruzstd = { workspace = true }
lzma-rs = { workspace = true }
sevenz-rust = { workspace = true }

# daemon
running-process = { workspace = true }
# Slice 11 of #782: promote `interprocess` from dev-dependencies to a
# regular dependency so `ipc::broker_v2::probe_local_socket` can use
# the local-socket Stream::connect primitive without pulling
# `running_process::broker::client::connect_local_socket` (the v1 path).
# The version is already locked transitively via running-process; making
# it explicit in [dependencies] does not add a new resolved crate.
interprocess = "2.4.2"
filetime = { workspace = true }
sysinfo = "0.33"
sadness-generator = "0.6"

# ci
md5 = "0.7"
wait-timeout = "0.2"

# shared: used by test_support, download-daemon bin, etc.
tracing-subscriber = { workspace = true }

# Global allocator on every target. mimalloc is pure C with no autotools
# step, so it cross-compiles cleanly in every direction. tikv-jemalloc
# was the previous choice on unix but its bundled autoconf invokes a
# hidden `$(CC) -MM` dep-tracking pass that silently drops the
# `--sysroot` flag — broke Linux->*-apple-darwin (and would equally
# break Windows->Linux); see tikv/jemallocator#170. Using one allocator
# everywhere also removes a per-platform variable from perf analysis.
mimalloc = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
# Spike-only (broker_into_backend_io_spike_test): bind a running-process broker
# listener directly. Pinned to the version already locked transitively via
# running-process so no new resolution occurs.
interprocess = "2.4.2"
# Self-dep so zccache's own integration tests can pull in the gated
# test_support module without needing a separate workspace member.
zccache = { path = ".", features = ["test-support"] }
# Enables `#[tokio::test(start_paused = true)]` for deterministic
# time-dependent unit tests (issue #717). test-util is a dev-only feature
# so it does not bloat production builds.
tokio = { workspace = true, features = ["test-util"] }

[build-dependencies]
prost-build = { workspace = true }
protoc-bin-vendored = { workspace = true }

[[bench]]
name = "hashing"
harness = false

[[bench]]
name = "scan_metadata"
harness = false

[[bench]]
name = "scan_recursive"
harness = false

[[bench]]
name = "fingerprint"
harness = false

[[bin]]
name = "echo_shim"
path = "src/bin/echo_shim.rs"
required-features = ["test-support"]

[[bin]]
name = "exec_test_tool"
path = "src/bin/exec_test_tool.rs"
required-features = ["test-support"]

[[bin]]
name = "zccache-fp"
path = "src/bin/zccache-fp.rs"

[[bin]]
name = "zccache-stamp"
path = "src/bin/zccache-stamp.rs"

[[bin]]
name = "zccache-download-daemon"
path = "src/bin/zccache-download-daemon.rs"

[[bin]]
name = "zccache-download"
path = "src/bin/zccache-download.rs"
doc = false

[[bin]]
name = "zccache-daemon"
path = "src/bin/zccache-daemon.rs"

[[bin]]
name = "crash-trigger"
path = "src/bin/crash-trigger.rs"

[[bin]]
name = "zccache"
path = "src/bin/zccache.rs"

[[bin]]
name = "cli-crash-trigger"
path = "src/bin/cli-crash-trigger.rs"

[[bin]]
name = "zccache-ci"
path = "src/bin/zccache-ci.rs"

[[bench]]
name = "write_payloads"
harness = false

[[bench]]
name = "read_outputs"
harness = false

[[bench]]
name = "persist_payloads"
harness = false

[[bench]]
name = "warm_restore"
harness = false

[[bench]]
name = "exec"
harness = false
required-features = ["test-support"]

[lints]
workspace = true
