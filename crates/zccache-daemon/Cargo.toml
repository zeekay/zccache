[package]
name = "zccache-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
description = "Background daemon for the zccache compiler cache"


[lib]
name = "zccache_daemon"
path = "src/lib.rs"

[target.'cfg(unix)'.dependencies]
tikv-jemallocator = { workspace = true }

[[bin]]
name = "zccache-daemon"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
zccache-core = { workspace = true }
zccache-protocol = { workspace = true }
zccache-ipc = { workspace = true }
zccache-fscache = { workspace = true }
zccache-artifact = { workspace = true }
zccache-watcher = { workspace = true }
zccache-hash = { workspace = true }
zccache-compiler = { workspace = true }
zccache-depgraph = { workspace = true }
zccache-fingerprint = { workspace = true }
filetime = { workspace = true }
dashmap = { workspace = true }
rayon = { workspace = true }
bincode = { workspace = true }
serde_json = "1"

[target.'cfg(windows)'.dependencies]
mimalloc = { workspace = true }
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_Security", "Win32_Storage_FileSystem"] }

[dev-dependencies]
tempfile = { workspace = true }
zccache-cli = { workspace = true }
zccache-test-support = { workspace = true }
