[package]
name = "zccache-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true


[lib]
name = "zccache_daemon"
path = "src/lib.rs"

[target.'cfg(unix)'.dependencies]
tikv-jemallocator = { workspace = true }

[[bin]]
name = "zccache-daemon"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
zccache-core = { path = "../zccache-core" }
zccache-protocol = { path = "../zccache-protocol" }
zccache-ipc = { path = "../zccache-ipc" }
zccache-fscache = { path = "../zccache-fscache" }
zccache-artifact = { path = "../zccache-artifact" }
zccache-watcher = { path = "../zccache-watcher" }
zccache-hash = { path = "../zccache-hash" }
zccache-compiler = { path = "../zccache-compiler" }
zccache-depgraph = { path = "../zccache-depgraph" }
dashmap = { workspace = true }
rayon = { workspace = true }
bincode = { workspace = true }
serde_json = "1"

[target.'cfg(windows)'.dependencies]
mimalloc = { workspace = true }
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_Security", "Win32_Storage_FileSystem"] }

[dev-dependencies]
tempfile = { workspace = true }
zccache-cli = { path = "../zccache-cli" }
zccache-test-support = { path = "../zccache-test-support" }
