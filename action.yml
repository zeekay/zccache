name: "zccache"
description: >
  Unified Rust compilation + dependency caching for GitHub Actions.
  Replaces both mozilla-actions/sccache-action and Swatinem/rust-cache
  with a single, faster action. ~1ms per warm cache hit vs ~170ms for sccache.

inputs:
  cache-cargo-registry:
    description: >
      Cache cargo registry index, downloaded crate files, and git dependencies.
      Replaces Swatinem/rust-cache registry caching.
    required: false
    default: "true"
  cache-compilation:
    description: >
      Cache individual compilation units (.o/.rlib) via the zccache daemon.
      Replaces sccache.
    required: false
    default: "true"
  shared-key:
    description: >
      Additional key segment for cache isolation in matrix builds.
      Typically the Rust target triple (e.g., x86_64-unknown-linux-gnu).
    required: false
    default: ""
  zccache-version:
    description: >
      Version of zccache to install.
      Use "latest" for the newest release, or a specific version like "1.2.3".
    required: false
    default: "latest"
  save-cache:
    description: >
      Whether to save caches at the end. Set to "false" for PR builds
      where you only want to restore (saves GHA cache budget).
    required: false
    default: "true"

outputs:
  cache-hit-compilation:
    description: "Whether the zccache compilation cache was restored"
    value: ${{ steps.restore-zccache.outputs.cache-hit }}
  cache-hit-registry:
    description: "Whether the cargo registry cache was restored"
    value: ${{ steps.restore-registry.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    # --- Compute cache keys ---
    - name: Compute cache keys
      id: keys
      shell: bash
      run: |
        # Build a composite key from OS, arch, shared-key, and cargo lock hash
        OS="${{ runner.os }}"
        ARCH="${{ runner.arch }}"
        SHARED="${{ inputs.shared-key }}"
        if [ -n "$SHARED" ]; then
          PREFIX="zccache-${OS}-${ARCH}-${SHARED}"
        else
          PREFIX="zccache-${OS}-${ARCH}"
        fi

        # Hash Cargo.lock for registry cache key (falls back if no lock file)
        # Use shasum on macOS (sha256sum doesn't exist there)
        if [ -f Cargo.lock ]; then
          if command -v sha256sum &>/dev/null; then
            LOCK_HASH=$(sha256sum Cargo.lock | cut -c1-16)
          else
            LOCK_HASH=$(shasum -a 256 Cargo.lock | cut -c1-16)
          fi
        else
          LOCK_HASH="no-lock"
        fi

        echo "compilation-key=${PREFIX}-${{ github.sha }}" >> "$GITHUB_OUTPUT"
        echo "compilation-restore=${PREFIX}-" >> "$GITHUB_OUTPUT"
        echo "registry-key=cargo-registry-${OS}-${ARCH}-${LOCK_HASH}" >> "$GITHUB_OUTPUT"
        echo "registry-restore=cargo-registry-${OS}-${ARCH}-" >> "$GITHUB_OUTPUT"

    # --- Layer 1: Restore zccache compilation cache ---
    - name: Restore zccache compilation cache
      id: restore-zccache
      if: inputs.cache-compilation == 'true'
      uses: actions/cache/restore@v4
      with:
        path: ~/.zccache
        key: ${{ steps.keys.outputs.compilation-key }}
        restore-keys: ${{ steps.keys.outputs.compilation-restore }}

    # --- Layer 2: Restore cargo registry cache ---
    - name: Restore cargo registry cache
      id: restore-registry
      if: inputs.cache-cargo-registry == 'true'
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ steps.keys.outputs.registry-key }}
        restore-keys: ${{ steps.keys.outputs.registry-restore }}

    # --- Install zccache ---
    # Try binary download first (faster, no Python dependency), fall back to pip
    - name: Install zccache and start daemon
      shell: bash
      run: |
        VERSION="${{ inputs.zccache-version }}"
        INSTALLED=false

        # Try binary install on Linux/macOS (requires GitHub Releases to exist)
        if [ "${{ runner.os }}" != "Windows" ]; then
          INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"

          if [ -f "${{ github.action_path }}/install.sh" ]; then
            INSTALL_SCRIPT="${{ github.action_path }}/install.sh"
          else
            INSTALL_SCRIPT="$(mktemp)"
            curl -fsSL https://raw.githubusercontent.com/zackees/zccache/main/install.sh -o "$INSTALL_SCRIPT" 2>/dev/null || true
          fi

          if [ -f "$INSTALL_SCRIPT" ] && [ -s "$INSTALL_SCRIPT" ]; then
            if ZCCACHE_INSTALL_VERSION="$VERSION" \
               ZCCACHE_INSTALL_DIR="$INSTALL_DIR" \
               ZCCACHE_NO_MODIFY_PATH=1 \
                 sh "$INSTALL_SCRIPT" 2>/dev/null; then
              echo "$INSTALL_DIR" >> "$GITHUB_PATH"
              export PATH="$INSTALL_DIR:$PATH"
              INSTALLED=true
            fi
          fi
        fi

        # Fall back to pip install (works on all platforms)
        if [ "$INSTALLED" = "false" ]; then
          if [ "$VERSION" = "latest" ]; then
            pip install zccache
          else
            pip install "zccache==${VERSION}"
          fi

          # Add pip scripts directories to PATH
          for DIR in \
            "$(python -c 'import sysconfig; print(sysconfig.get_path("scripts", "posix_user"))' 2>/dev/null || true)" \
            "$(python -c 'import sysconfig; print(sysconfig.get_path("scripts"))' 2>/dev/null || true)" \
            "$(dirname "$(python -c 'import sys; print(sys.executable)')")" \
            "$HOME/.local/bin"; do
            if [ -n "$DIR" ] && [ -d "$DIR" ]; then
              export PATH="$DIR:$PATH"
              echo "$DIR" >> "$GITHUB_PATH"
            fi
          done

          # Fix executable permissions (macOS PyPI bundles may lose +x)
          if [ "${{ runner.os }}" != "Windows" ]; then
            for DIR in \
              "$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))' 2>/dev/null || true)" \
              "$(python -c 'import sysconfig; print(sysconfig.get_path("scripts"))' 2>/dev/null || true)"; do
              if [ -n "$DIR" ] && [ -d "$DIR" ]; then
                find "$DIR" -name 'zccache*' -type f ! -perm -u=x -exec chmod +x {} + 2>/dev/null || true
              fi
            done
          fi
        fi

        # Verify and start
        which zccache || { echo "ERROR: zccache not found on PATH"; echo "PATH=$PATH"; exit 1; }
        zccache start

    # --- Export environment ---
    - name: Set build environment
      shell: bash
      run: |
        echo "RUSTC_WRAPPER=zccache" >> "$GITHUB_ENV"

    # --- Write state for cleanup action ---
    - name: Save state for cleanup
      shell: bash
      run: |
        # Write cache keys to a file so the cleanup action can read them
        mkdir -p ~/.zccache-action-state
        echo "${{ steps.keys.outputs.compilation-key }}" > ~/.zccache-action-state/compilation-key
        echo "${{ steps.keys.outputs.registry-key }}" > ~/.zccache-action-state/registry-key
        echo "${{ inputs.save-cache }}" > ~/.zccache-action-state/save-cache
        echo "${{ inputs.cache-compilation }}" > ~/.zccache-action-state/cache-compilation
        echo "${{ inputs.cache-cargo-registry }}" > ~/.zccache-action-state/cache-registry
