[workspace]
resolver = "2"
members = [
    "crates/zccache-core",
    "crates/zccache-hash",
    "crates/zccache-protocol",
    "crates/zccache-fscache",
    "crates/zccache-artifact",
    "crates/zccache-depgraph",
    "crates/zccache-watcher",
    "crates/zccache-compiler",
    "crates/zccache-ipc",
    "crates/zccache-daemon",
    "crates/zccache-cli",
    "crates/zccache-test-support",
    "crates/zccache-ci",
    "crates/zccache-fingerprint",
]

[workspace.package]
version = "1.1.11"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
repository = "https://github.com/zackees/zccache"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive", "rc"] }
bincode = "1"
blake3 = { version = "1", features = ["pure"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
clap = { version = "4", features = ["derive"] }
dashmap = "6"
redb = "2"
notify = "7"
memmap2 = "0.9"
tempfile = "3"
rayon = "1"
jwalk = "0.8"
bytes = "1"
rkyv = { version = "0.7", features = ["validation"] }
tikv-jemallocator = { version = "0.6", features = ["unprefixed_malloc_on_supported_platforms"] }
mimalloc = "0.1"

# Vendored notify with fixes for Windows ReadDirectoryChangesW:
# 1. Detect buffer overflow (bytes_written == 0) and report as error
# 2. Report start_read failure (watcher silently dying) as error
[patch.crates-io]
notify = { path = "vendor/notify" }

# Note: workspace.lints requires Rust 1.74+. If your toolchain is older,
# these are ignored. Lint configuration is also enforced via CI clippy flags.
#
# [workspace.lints.rust]
# unsafe_code = "deny"
# missing_debug_implementations = "warn"
#
# [workspace.lints.clippy]
# all = { level = "warn", priority = -1 }
# pedantic = { level = "warn", priority = -1 }
# nursery = { level = "warn", priority = -1 }
# unwrap_used = "warn"
