name: "zccache cleanup"
description: >
  Stop the zccache daemon and save caches.
  Use this as the last step in every job that uses zackees/zccache.
  Must run with `if: always()` to ensure cleanup on failure.

outputs:
  target-snapshot-saved:
    description: "Whether a target snapshot tarball was created for saving"
    value: ${{ steps.target-snapshot.outputs.snapshot-saved }}
  target-snapshot-skipped-reason:
    description: "Why target snapshot creation was skipped, when applicable"
    value: ${{ steps.target-snapshot.outputs.snapshot-skipped-reason }}
  target-snapshot-bytes:
    description: "Size in bytes of the target snapshot tarball"
    value: ${{ steps.target-snapshot.outputs.snapshot-bytes }}
  target-snapshot-candidate-bytes:
    description: "Estimated target snapshot payload bytes after pruning"
    value: ${{ steps.target-snapshot.outputs.candidate-bytes }}
  target-pruned-dirs:
    description: "Number of target directories pruned before snapshot creation"
    value: ${{ steps.target-snapshot.outputs.pruned-dirs }}
  target-pruned-bytes:
    description: "Estimated bytes pruned before snapshot creation"
    value: ${{ steps.target-snapshot.outputs.pruned-bytes }}

runs:
  using: "composite"
  steps:
    - name: Print zccache stats
      if: always()
      shell: bash
      run: zccache status 2>/dev/null || true

    - name: Stop zccache daemon
      if: always()
      shell: bash
      run: zccache stop 2>/dev/null || true

    - name: Read state from setup
      if: always()
      id: state
      shell: bash
      run: |
        STATE_DIR="$HOME/.zccache-action-state"
        if [ -d "$STATE_DIR" ]; then
          echo "compilation-key=$(cat "$STATE_DIR/compilation-key" 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "registry-key=$(cat "$STATE_DIR/registry-key" 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "target-key=$(cat "$STATE_DIR/target-key" 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "cache-backend=$(cat "$STATE_DIR/cache-backend" 2>/dev/null || echo 'actions-cache')" >> "$GITHUB_OUTPUT"
          echo "save-cache=$(cat "$STATE_DIR/save-cache" 2>/dev/null || echo 'true')" >> "$GITHUB_OUTPUT"
          echo "cache-compilation=$(cat "$STATE_DIR/cache-compilation" 2>/dev/null || echo 'true')" >> "$GITHUB_OUTPUT"
          echo "cache-registry=$(cat "$STATE_DIR/cache-registry" 2>/dev/null || echo 'true')" >> "$GITHUB_OUTPUT"
          echo "cache-target=$(cat "$STATE_DIR/cache-target" 2>/dev/null || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "target-dir=$(cat "$STATE_DIR/target-dir" 2>/dev/null || echo 'target')" >> "$GITHUB_OUTPUT"
          echo "target-snapshot-max-size=$(cat "$STATE_DIR/target-snapshot-max-size" 2>/dev/null || echo '2GiB')" >> "$GITHUB_OUTPUT"
          echo "target-snapshot-mode=$(cat "$STATE_DIR/target-snapshot-mode" 2>/dev/null || echo 'hot')" >> "$GITHUB_OUTPUT"
          echo "target-snapshot-too-large=$(cat "$STATE_DIR/target-snapshot-too-large" 2>/dev/null || echo 'skip')" >> "$GITHUB_OUTPUT"
          echo "target-prune-incremental=$(cat "$STATE_DIR/target-prune-incremental" 2>/dev/null || echo 'true')" >> "$GITHUB_OUTPUT"
          echo "target-prune-build-script-out=$(cat "$STATE_DIR/target-prune-build-script-out" 2>/dev/null || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "target-cache-marker-epoch=$(cat "$STATE_DIR/target-cache-marker-epoch" 2>/dev/null || echo '0')" >> "$GITHUB_OUTPUT"
        else
          echo "cache-backend=actions-cache" >> "$GITHUB_OUTPUT"
          echo "save-cache=false" >> "$GITHUB_OUTPUT"
          echo "cache-compilation=false" >> "$GITHUB_OUTPUT"
          echo "cache-registry=false" >> "$GITHUB_OUTPUT"
          echo "cache-target=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Save zccache compilation cache
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-backend == 'native' && steps.state.outputs.cache-compilation == 'true'
      shell: bash
      run: |
        zccache gha-cache save \
          --key "${{ steps.state.outputs.compilation-key }}" \
          --path "$HOME/.zccache"

    - name: Save zccache compilation cache
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-backend != 'native' && steps.state.outputs.cache-compilation == 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.zccache
        key: ${{ steps.state.outputs.compilation-key }}

    - name: Save cargo registry archive
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-backend == 'native' && steps.state.outputs.cache-registry == 'true'
      shell: bash
      run: |
        zccache cargo-registry save \
          --key "${{ steps.state.outputs.registry-key }}" \
          --cargo-home "$HOME/.cargo"
        if [ -f "$HOME/.zccache/cargo-registry/${{ steps.state.outputs.registry-key }}.tar.gz" ]; then
          zccache gha-cache save \
            --key "${{ steps.state.outputs.registry-key }}" \
            --path "$HOME/.zccache/cargo-registry"
        fi

    - name: Save cargo registry cache
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-backend != 'native' && steps.state.outputs.cache-registry == 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ steps.state.outputs.registry-key }}

    # Record per-crate source content hashes BEFORE tarring so the
    # post-restore validation step on the next run can selectively
    # future-stamp dep-info files for crates whose sources still match.
    # The manifest lives under `<target>/.zccache-fp-manifest.json` so it
    # rides the existing tar without special inclusion rules. Failure is
    # logged but never fatal — without the manifest the restore side
    # falls back to cargo's normal mtime check (overbuild but correct).
    - name: Record fingerprint source hashes
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-target == 'true'
      shell: bash
      run: |
        zccache snapshot-fp-record \
          --target-dir "${{ steps.state.outputs.target-dir }}" \
          --workspace-root "$GITHUB_WORKSPACE" \
          || true

    - name: Create target snapshot
      id: target-snapshot
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-target == 'true'
      shell: bash
      env:
        TARGET_DIR: ${{ steps.state.outputs.target-dir }}
        TARGET_SNAPSHOT_MAX_SIZE: ${{ steps.state.outputs.target-snapshot-max-size }}
        TARGET_SNAPSHOT_MODE: ${{ steps.state.outputs.target-snapshot-mode }}
        TARGET_SNAPSHOT_TOO_LARGE: ${{ steps.state.outputs.target-snapshot-too-large }}
        TARGET_PRUNE_INCREMENTAL: ${{ steps.state.outputs.target-prune-incremental }}
        TARGET_PRUNE_BUILD_SCRIPT_OUT: ${{ steps.state.outputs.target-prune-build-script-out }}
        TARGET_HOT_MARKER_EPOCH: ${{ steps.state.outputs.target-cache-marker-epoch }}
      run: |
        bash "$GITHUB_ACTION_PATH/prepare-target-snapshot.sh"

    - name: Save cargo target snapshot
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-backend == 'native' && steps.state.outputs.cache-target == 'true' && steps.target-snapshot.outputs.snapshot-saved == 'true'
      shell: bash
      run: |
        zccache gha-cache save \
          --key "${{ steps.state.outputs.target-key }}" \
          --path "$HOME/.zccache-target-meta"

    - name: Save cargo target snapshot
      if: always() && steps.state.outputs.save-cache == 'true' && steps.state.outputs.cache-backend != 'native' && steps.state.outputs.cache-target == 'true' && steps.target-snapshot.outputs.snapshot-saved == 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.zccache-target-meta
        key: ${{ steps.state.outputs.target-key }}

    - name: Clean up state
      if: always()
      shell: bash
      run: rm -rf ~/.zccache-action-state
