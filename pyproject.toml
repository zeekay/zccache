[project]
name = "zccache"
version = "0.1.0"
description = "A high-performance local compiler cache daemon"
requires-python = ">=3.9"
dependencies = []

[project.scripts]
cargo = "ci.trampoline:cargo"
rustc = "ci.trampoline:rustc"
rustfmt = "ci.trampoline:rustfmt"
clippy-driver = "ci.trampoline:clippy_driver"
run_zccache = "ci.trampoline:run_zccache"
run_zccache_daemon = "ci.trampoline:run_zccache_daemon"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["ci"]
