name: Build target artifacts
description: Build zccache binaries for a single target and stage release artifacts.

inputs:
  target:
    description: Rust target triple to build.
    required: true
  binary_ext:
    description: Executable suffix for the target, for example .exe.
    required: false
    default: ""
  cache_key:
    description: Cache key suffix passed to Swatinem/rust-cache as shared-key.
    required: true
  include_python:
    description: Build and stage Python extension artifacts.
    required: false
    default: "false"
  python_version:
    description: Python version to install for packaging and optional Python extension builds.
    required: false
    default: "3.13"
  linker:
    description: Optional linker executable for cross-compilation.
    required: false
    default: ""
  strip:
    description: Optional strip executable for the target.
    required: false
    default: ""
  version:
    description: Optional version string for standalone archive naming.
    required: false
    default: ""

outputs:
  staging_dir:
    description: Directory containing staged binaries and optional Python artifacts.
    value: ${{ steps.paths.outputs.staging_dir }}
  standalone_dir:
    description: Directory containing packaged standalone archives.
    value: ${{ steps.paths.outputs.standalone_dir }}

runs:
  using: composite
  steps:
    - name: Set output paths
      id: paths
      shell: bash
      run: |
        echo "staging_dir=${{ github.workspace }}/staging" >> "$GITHUB_OUTPUT"
        echo "standalone_dir=${{ github.workspace }}/standalone" >> "$GITHUB_OUTPUT"

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94.1
        targets: ${{ inputs.target }}

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.cache_key }}

    - name: Install musl tools
      if: inputs.target == 'x86_64-unknown-linux-musl'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Install musl cross-compilation tools
      if: inputs.target == 'aarch64-unknown-linux-musl'
      shell: bash
      run: |
        curl -fsSL -o aarch64-unknown-linux-musl.tar.xz \
          https://github.com/cross-tools/musl-cross/releases/download/20250929/aarch64-unknown-linux-musl.tar.xz
        tar xJf aarch64-unknown-linux-musl.tar.xz
        echo "$PWD/aarch64-unknown-linux-musl/bin" >> "$GITHUB_PATH"

    - name: Install GNU cross-compilation tools
      if: inputs.target == 'aarch64-unknown-linux-gnu'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Configure cross-compilation linker
      if: inputs.linker != ''
      shell: bash
      run: |
        TARGET_UPPER=$(echo "${{ inputs.target }}" | tr '[:lower:]-' '[:upper:]_')
        echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=${{ inputs.linker }}" >> "$GITHUB_ENV"

    # Static-link the MSVC C runtime (vcruntime + UCRT) for Windows release
    # binaries. Without `+crt-static` the published `zccache.exe` declares
    # imports against `VCRUNTIME140.dll` and the `api-ms-win-crt-*` UCRT
    # API-set forwarders; on runner images where any of those DLLs is
    # missing or version-skewed, the Windows loader rejects the image
    # before `main` with `STATUS_DLL_INIT_FAILED` (exit `-1073741502` /
    # `0xC0000142`). Self-contained CRT linkage is the standard approach
    # for distributable Rust binaries on Windows (rustc/cargo/rustup all
    # ship this way). See zccache#269.
    #
    # We DO NOT apply +crt-static to the Python extension (.pyd) builds
    # below — those load into the host Python process and must share its
    # C runtime. Static CRT linkage is appended to RUSTFLAGS only for the
    # standalone binary build step.
    - name: Build release binaries
      shell: bash
      env:
        PYO3_PYTHON: python
      run: |
        if [[ "${{ inputs.target }}" == *pc-windows-msvc ]]; then
          export RUSTFLAGS="${RUSTFLAGS:-} -C target-feature=+crt-static"
        fi
        cargo build --release --target ${{ inputs.target }} -p zccache --bin zccache
        cargo build --release --target ${{ inputs.target }} -p zccache --bin zccache-daemon
        cargo build --release --target ${{ inputs.target }} -p zccache-fingerprint

    # Windows DLL load smoke gate (see zccache#269). If the just-built
    # `zccache.exe` cannot complete loader init on this host, `--version`
    # exits non-zero before any Rust code runs and the release stops here
    # rather than shipping a binary that will fail in CI consumers. Other
    # platforms run the same check for symmetry but the Windows leg is
    # the one that actually catches the regression. ARM64 Windows builds
    # are cross-compiled on x64 runners and so cannot exec the binary on
    # this leg — skip the smoke for that target only.
    - name: Smoke test built binary
      shell: bash
      run: |
        case "${{ inputs.target }}" in
          aarch64-pc-windows-msvc|aarch64-unknown-linux-musl|aarch64-unknown-linux-gnu)
            # Cross-compiled; skip exec on host. TODO: when matrix gains
            # an arm64 runner, gate aarch64-pc-windows-msvc through it.
            echo "Skipping smoke test for cross-compiled target ${{ inputs.target }}"
            exit 0
            ;;
        esac
        BIN="target/${{ inputs.target }}/release/zccache${{ inputs.binary_ext }}"
        echo "Smoke test: $BIN --version"
        "$BIN" --version

    - name: Build Python extension artifacts
      if: inputs.include_python == 'true'
      shell: bash
      env:
        PYO3_PYTHON: python
      run: |
        HOST_TARGET=$(rustc -vV | awk '/^host: / { print $2 }')
        if [ "$HOST_TARGET" != "${{ inputs.target }}" ]; then
          export PYO3_CROSS=1
          export PYO3_CROSS_PYTHON_VERSION="${{ inputs.python_version }}"
          export PYO3_CROSS_PYTHON_IMPLEMENTATION=CPython
        fi

        cargo build --release --target ${{ inputs.target }} -p zccache --bin zccache --features python --lib
        cargo build --release --target ${{ inputs.target }} -p zccache-watcher --features python --lib
        cargo build --release --target ${{ inputs.target }} -p zccache-fingerprint --features python --lib

    - name: Stage artifacts
      shell: bash
      run: |
        rm -rf staging standalone
        mkdir -p staging
        cp target/${{ inputs.target }}/release/zccache${{ inputs.binary_ext }} staging/
        cp target/${{ inputs.target }}/release/zccache-daemon${{ inputs.binary_ext }} staging/
        cp target/${{ inputs.target }}/release/zccache-fp${{ inputs.binary_ext }} staging/

        if [ "${{ inputs.include_python }}" = "true" ]; then
          mkdir -p staging/python/zccache/fingerprint
          mkdir -p staging/python/zccache/watcher
          if [[ "${{ inputs.target }}" == *pc-windows-msvc ]]; then
            cp target/${{ inputs.target }}/release/zccache_cli.dll staging/python/zccache/_native.pyd
            cp target/${{ inputs.target }}/release/zccache_fingerprint.dll staging/python/zccache/fingerprint/_native.pyd
            cp target/${{ inputs.target }}/release/zccache_watcher.dll staging/python/zccache/watcher/_native.pyd
          elif [[ "${{ inputs.target }}" == *apple-darwin ]]; then
            cp target/${{ inputs.target }}/release/libzccache_cli.dylib staging/python/zccache/_native.so
            cp target/${{ inputs.target }}/release/libzccache_fingerprint.dylib staging/python/zccache/fingerprint/_native.so
            cp target/${{ inputs.target }}/release/libzccache_watcher.dylib staging/python/zccache/watcher/_native.so
          else
            cp target/${{ inputs.target }}/release/libzccache_cli.so staging/python/zccache/_native.so
            cp target/${{ inputs.target }}/release/libzccache_fingerprint.so staging/python/zccache/fingerprint/_native.so
            cp target/${{ inputs.target }}/release/libzccache_watcher.so staging/python/zccache/watcher/_native.so
          fi
        fi

        # Use --strip-debug to drop DWARF sections without removing the
        # function-name symbol table that profilers read. With
        # [profile.release] split-debuginfo = "packed" the binary already
        # ships without embedded debug info on Linux/macOS, so this is mostly
        # belt-and-suspenders. Fall back to plain `strip` when the
        # cross-tool doesn't support the flag.
        STRIP="${{ inputs.strip }}"
        if [ -z "$STRIP" ]; then
          STRIP="strip"
        fi
        do_strip() {
          if "$STRIP" --strip-debug "$1" 2>/dev/null; then
            return 0
          fi
          "$STRIP" "$1" 2>/dev/null || true
        }
        if command -v "$STRIP" &> /dev/null; then
          do_strip staging/zccache${{ inputs.binary_ext }}
          do_strip staging/zccache-daemon${{ inputs.binary_ext }}
          do_strip staging/zccache-fp${{ inputs.binary_ext }}
          if [ "${{ inputs.include_python }}" = "true" ]; then
            for native in staging/python/zccache/_native.* \
                          staging/python/zccache/fingerprint/_native.* \
                          staging/python/zccache/watcher/_native.*; do
              [ -e "$native" ] && do_strip "$native"
            done
          fi
        fi

    - name: Stage debug-symbol sidecars
      shell: bash
      run: |
        # Collect per-binary debug files into staging-debug/ for packaging as
        # a separate "-debug" archive in the next step. Files come from the
        # split-debuginfo = "packed" profile setting:
        #   Linux:        <bin>.dwp
        #   macOS:        <bin>.dSYM/   (directory)
        #   Windows MSVC: <bin>.pdb
        #
        # Windows PDB naming: rustc's MSVC linker writes PDBs using the
        # underscored crate name, not the [[bin]] name. So:
        #   zccache-daemon.exe  ->  zccache_daemon.pdb
        #   zccache-fp.exe      ->  zccache_fp.pdb
        # `zccache.exe` is the exception because its [[bin]] name has no
        # hyphens. Windbg/cdb find a PDB by GUID via the codeview record
        # embedded in the PE, so the underscored filename on disk still
        # resolves for `zccache-daemon.exe`. See zccache#276 for the
        # missing-PDB regression that motivated this naming fix.
        rm -rf staging-debug
        mkdir -p staging-debug
        copy_debug() {
          local src="$1"
          if [ -e "$src" ] || [ -L "$src" ]; then
            if [ -d "$src" ]; then
              cp -RL "$src" staging-debug/
            else
              cp -L "$src" staging-debug/
            fi
          fi
        }
        TARGET_DIR="target/${{ inputs.target }}/release"
        TARGET="${{ inputs.target }}"
        case "$TARGET" in
          *pc-windows-msvc)
            copy_debug "$TARGET_DIR/zccache.pdb"
            copy_debug "$TARGET_DIR/zccache_daemon.pdb"
            copy_debug "$TARGET_DIR/zccache_fp.pdb"
            ;;
          *apple-darwin)
            copy_debug "$TARGET_DIR/zccache.dSYM"
            copy_debug "$TARGET_DIR/zccache-daemon.dSYM"
            copy_debug "$TARGET_DIR/zccache-fp.dSYM"
            ;;
          *)
            copy_debug "$TARGET_DIR/zccache.dwp"
            copy_debug "$TARGET_DIR/zccache-daemon.dwp"
            copy_debug "$TARGET_DIR/zccache-fp.dwp"
            ;;
        esac
        echo "Staged debug sidecars:"
        ls -la staging-debug || true
        # Fail the build if a target's debug sidecars are missing entirely.
        # On Windows in particular, silent misses regressed zccache#276 where
        # only zccache.pdb shipped while the daemon/fp PDBs were skipped.
        if [ -z "$(ls -A staging-debug 2>/dev/null)" ]; then
          echo "::error::No debug sidecars staged for target $TARGET" >&2
          exit 1
        fi
        # Per-binary completeness check: each of the three bins must have a
        # matching sidecar present. Failing here surfaces naming drift (e.g.
        # the rustc PDB-name convention change that caused zccache#276)
        # before it ships to a release.
        case "$TARGET" in
          *pc-windows-msvc) require=("zccache.pdb" "zccache_daemon.pdb" "zccache_fp.pdb") ;;
          *apple-darwin)    require=("zccache.dSYM" "zccache-daemon.dSYM" "zccache-fp.dSYM") ;;
          *)                require=("zccache.dwp" "zccache-daemon.dwp" "zccache-fp.dwp") ;;
        esac
        missing=()
        for entry in "${require[@]}"; do
          if [ ! -e "staging-debug/$entry" ]; then
            missing+=("$entry")
          fi
        done
        if [ ${#missing[@]} -gt 0 ]; then
          echo "::error::Missing debug sidecars for $TARGET: ${missing[*]}" >&2
          exit 1
        fi

    - name: Build release stamping helper (native host)
      shell: bash
      run: |
        # `zccache-stamp` appends a 128-byte release marker to each
        # binary. Built for the HOST (no --target) so we don't need
        # the target's runtime to run the helper itself. Just appends
        # bytes — never executes the (possibly cross-compiled) target.
        cargo build --release --bin zccache-stamp

    - name: Stamp release binaries with release marker
      shell: bash
      run: |
        # Host-binary path: same `target/release` on every runner.
        # On Windows runners the helper has a `.exe` suffix; on
        # Linux/macOS it doesn't.
        case "$RUNNER_OS" in
          Windows) STAMP="target/release/zccache-stamp.exe" ;;
          *)       STAMP="target/release/zccache-stamp" ;;
        esac
        if [ ! -x "$STAMP" ] && [ ! -e "$STAMP" ]; then
          echo "::error::zccache-stamp not found at $STAMP" >&2
          exit 1
        fi
        # We stamp the *target* binaries after stripping (so the stamp
        # isn't clipped) and before archiving (so the archive carries
        # the stamped bytes). Build timestamp captured once for all
        # three binaries so they share the same provenance footer.
        NOW="$(date -u +%s)"
        VERSION="${{ inputs.version }}"
        if [ -z "$VERSION" ]; then
          VERSION=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('Cargo.toml').read_text(encoding='utf-8'))['workspace']['package']['version'])")
        fi
        for bin in zccache zccache-daemon zccache-fp; do
          BIN_PATH="staging/${bin}${{ inputs.binary_ext }}"
          if [ ! -e "$BIN_PATH" ]; then
            echo "::error::binary missing for stamping: $BIN_PATH" >&2
            exit 1
          fi
          "$STAMP" \
            --binary "$BIN_PATH" \
            --sha "$GITHUB_SHA" \
            --version "$VERSION" \
            --triple "${{ inputs.target }}" \
            --timestamp "$NOW"
        done

    - name: Package standalone archive
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ -z "$VERSION" ]; then
          VERSION=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('Cargo.toml').read_text(encoding='utf-8'))['workspace']['package']['version'])")
        fi
        python ci/package_release.py \
          --version "$VERSION" \
          --target "${{ inputs.target }}" \
          --binary-ext "${{ inputs.binary_ext }}" \
          --input-dir staging \
          --debug-input-dir staging-debug \
          --output-dir standalone

