name: Test zccache-action

on:
  push:
    branches: [main]
    paths:
      - "action.yml"
      - "action/**"
      - "crates/zccache-cli/**"
      - "crates/zccache/**"
      - ".github/workflows/test-action.yml"
  pull_request:
    paths:
      - "action.yml"
      - "action/**"
      - "crates/zccache-cli/**"
      - "crates/zccache/**"
      - ".github/workflows/test-action.yml"
  workflow_dispatch:

concurrency:
  group: test-action-${{ github.ref }}
  cancel-in-progress: true

jobs:
  target-snapshot-gc:
    name: "Target snapshot GC unit tests"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Run target snapshot GC unit tests
        shell: bash
        run: bash action/cleanup/tests/test_prepare_target_snapshot.sh

  test-action:
    name: "${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macOS ARM
            os: macos-15
            target: aarch64-apple-darwin
          - name: macOS x86_64
            os: macos-14
            target: x86_64-apple-darwin
          - name: Windows x86_64
            os: windows-2025
            target: x86_64-pc-windows-msvc
          - name: Windows ARM64
            os: windows-2025
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.target }}

      - name: Ensure target stdlib
        shell: bash
        run: rustup target add ${{ matrix.target }}

      # --- Test the action ---
      - name: Setup zccache (action under test)
        uses: ./
        with:
          shared-key: test-${{ matrix.target }}
          # Bootstrap this repair PR from the last known-good GitHub binary
          # release. The production action still defaults to latest, and the
          # release workflow now blocks malformed latest assets before PyPI or
          # crates.io publish.
          zccache-version: "1.11.4"

      - name: Verify RUSTC_WRAPPER is set
        shell: bash
        run: |
          echo "RUSTC_WRAPPER=$RUSTC_WRAPPER"
          if [ "$RUSTC_WRAPPER" != "zccache" ]; then
            echo "FAIL: RUSTC_WRAPPER not set to zccache"
            exit 1
          fi

      - name: Verify zccache daemon is running
        shell: bash
        run: zccache status

      # --- Cold build ---
      - name: Build (cold cache)
        shell: bash
        run: cargo build -p zccache --target ${{ matrix.target }}

      - name: Record zccache stats after cold build
        shell: bash
        run: |
          STATUS_OUTPUT="$(zccache status)"
          printf '%s\n' "$STATUS_OUTPUT"

          CACHE_HITS="$(printf '%s\n' "$STATUS_OUTPUT" | awk '
            /Compilations:/ {
              for (i = 1; i <= NF; i++) {
                if ($i == "cached," || $i == "cached") {
                  cached = $(i - 1)
                  gsub(/[^0-9]/, "", cached)
                  print cached
                  exit
                }
              }
            }
          ')"
          if [[ ! "$CACHE_HITS" =~ ^[0-9]+$ ]]; then
            echo "FAIL: unable to parse cached compilation count from zccache status"
            exit 1
          fi
          echo "COLD_CACHE_HITS=$CACHE_HITS" >> "$GITHUB_ENV"

      # --- Warm build (clean target, rebuild from zccache) ---
      - name: Clean target directory
        shell: bash
        run: cargo clean

      - name: Build (warm cache — should hit zccache)
        shell: bash
        run: cargo build -p zccache --target ${{ matrix.target }}

      - name: Verify zccache cache hits after warm build
        shell: bash
        run: |
          STATUS_OUTPUT="$(zccache status)"
          printf '%s\n' "$STATUS_OUTPUT"

          WARM_CACHE_HITS="$(printf '%s\n' "$STATUS_OUTPUT" | awk '
            /Compilations:/ {
              for (i = 1; i <= NF; i++) {
                if ($i == "cached," || $i == "cached") {
                  cached = $(i - 1)
                  gsub(/[^0-9]/, "", cached)
                  print cached
                  exit
                }
              }
            }
          ')"
          if [[ ! "$WARM_CACHE_HITS" =~ ^[0-9]+$ ]]; then
            echo "FAIL: unable to parse cached compilation count from zccache status"
            exit 1
          fi

          COLD_CACHE_HITS="${COLD_CACHE_HITS:-0}"
          if (( WARM_CACHE_HITS <= COLD_CACHE_HITS )); then
            echo "FAIL: warm rebuild did not produce additional zccache hits"
            echo "Cold cached compilations: $COLD_CACHE_HITS"
            echo "Warm cached compilations: $WARM_CACHE_HITS"
            exit 1
          fi
          echo "OK: warm rebuild added zccache hits ($COLD_CACHE_HITS -> $WARM_CACHE_HITS)"

      # --- Test the cleanup action ---
      - name: Cleanup (action under test)
        if: always()
        uses: ./action/cleanup

  # Test that save-cache: false works (for PR builds)
  test-no-save:
    name: "No-save mode (Linux)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Setup zccache (no save)
        uses: ./
        with:
          save-cache: "false"

      - name: Build something
        run: cargo check -p zccache

      - name: Cleanup (should skip save)
        if: always()
        uses: ./action/cleanup

  # Test cargo-registry subcommand (issue #10)
  test-cargo-registry:
    name: "cargo-registry (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Build zccache CLI
        shell: bash
        run: cargo build -p zccache --bin zccache

      # --- Test cargo-registry hash ---
      - name: "cargo-registry hash: produces 16-char hex"
        shell: bash
        run: |
          HASH=$(./target/debug/zccache cargo-registry hash --lockfile Cargo.lock)
          echo "Hash: $HASH"
          if [ ${#HASH} -ne 16 ]; then
            echo "FAIL: expected 16-char hash, got ${#HASH} chars: $HASH"
            exit 1
          fi

      - name: "cargo-registry hash: deterministic"
        shell: bash
        run: |
          H1=$(./target/debug/zccache cargo-registry hash --lockfile Cargo.lock)
          H2=$(./target/debug/zccache cargo-registry hash --lockfile Cargo.lock)
          if [ "$H1" != "$H2" ]; then
            echo "FAIL: hash not deterministic: $H1 vs $H2"
            exit 1
          fi
          echo "OK: both runs produced $H1"

      - name: "cargo-registry hash: fails on missing file"
        shell: bash
        run: |
          if ./target/debug/zccache cargo-registry hash --lockfile nonexistent.lock 2>/dev/null; then
            echo "FAIL: should have failed on missing file"
            exit 1
          fi
          echo "OK: correctly failed on missing file"

      # --- Test cargo-registry save/restore round-trip ---
      - name: "cargo-registry save: creates archive"
        shell: bash
        run: |
          # Ensure there's something in the cargo registry
          cargo fetch
          ./target/debug/zccache cargo-registry save --key test-roundtrip
          ARCHIVE="$HOME/.zccache/cargo-registry/test-roundtrip.tar.gz"
          if [ ! -f "$ARCHIVE" ]; then
            echo "FAIL: archive not created at $ARCHIVE"
            exit 1
          fi
          SIZE=$(wc -c < "$ARCHIVE")
          echo "OK: archive created ($SIZE bytes)"

      - name: "cargo-registry restore: restores from archive"
        shell: bash
        run: |
          # Save original registry state
          CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          BEFORE_COUNT=$(find "$CARGO_HOME/registry" -type f 2>/dev/null | wc -l || echo 0)

          # Delete registry and restore
          rm -rf "$CARGO_HOME/registry/cache" "$CARGO_HOME/registry/index"
          ./target/debug/zccache cargo-registry restore --key test-roundtrip

          AFTER_COUNT=$(find "$CARGO_HOME/registry" -type f 2>/dev/null | wc -l || echo 0)
          echo "Files before delete: $BEFORE_COUNT, after restore: $AFTER_COUNT"
          if [ "$AFTER_COUNT" -eq 0 ]; then
            echo "FAIL: restore produced no files"
            exit 1
          fi
          echo "OK: registry restored"

      # --- Test cargo-registry clean ---
      - name: "cargo-registry clean: removes archives"
        shell: bash
        run: |
          ./target/debug/zccache cargo-registry clean
          ARCHIVE="$HOME/.zccache/cargo-registry/test-roundtrip.tar.gz"
          if [ -f "$ARCHIVE" ]; then
            echo "FAIL: archive still exists after clean"
            exit 1
          fi
          echo "OK: archives cleaned"

  # Test gha-cache subcommand (issue #11)
  test-gha-cache:
    name: "gha-cache (Linux)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Build zccache CLI
        shell: bash
        run: cargo build -p zccache --bin zccache

      # --- Unit tests always run ---
      - name: "zccache unit tests"
        shell: bash
        run: cargo test -p zccache

      # --- Test gha-cache status (works without cache API) ---
      - name: "gha-cache status: runs without error"
        shell: bash
        run: |
          OUTPUT=$(./target/debug/zccache gha-cache status 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "gha cache"; then
            echo "OK: status command works"
          else
            echo "FAIL: unexpected output"
            exit 1
          fi

      # --- Test gha-cache save/restore (requires ACTIONS_CACHE_URL) ---
      # The GHA cache API env vars are only available with actions/cache.
      # Use actions/cache to prime the environment, then test our CLI.
      - name: "Prime GHA cache environment"
        uses: actions/cache@v5
        with:
          path: /tmp/gha-cache-primer
          key: zccache-test-primer-${{ github.sha }}
          restore-keys: zccache-test-primer-

      - name: "gha-cache save: upload test data"
        shell: bash
        env:
          ACTIONS_CACHE_URL: ${{ env.ACTIONS_CACHE_URL }}
          ACTIONS_RUNTIME_TOKEN: ${{ env.ACTIONS_RUNTIME_TOKEN }}
        run: |
          # Check if GHA cache API is available
          if [ -z "$ACTIONS_CACHE_URL" ]; then
            echo "SKIP: ACTIONS_CACHE_URL not set (expected in some environments)"
            exit 0
          fi

          mkdir -p /tmp/gha-test-data
          echo "hello from zccache gha-cache test" > /tmp/gha-test-data/test.txt
          date >> /tmp/gha-test-data/test.txt

          ./target/debug/zccache gha-cache save \
            --key "zccache-cli-test-${{ github.sha }}" \
            --path /tmp/gha-test-data
          echo "OK: save completed"

      - name: "gha-cache restore: download and verify"
        shell: bash
        env:
          ACTIONS_CACHE_URL: ${{ env.ACTIONS_CACHE_URL }}
          ACTIONS_RUNTIME_TOKEN: ${{ env.ACTIONS_RUNTIME_TOKEN }}
        run: |
          if [ -z "$ACTIONS_CACHE_URL" ]; then
            echo "SKIP: ACTIONS_CACHE_URL not set"
            exit 0
          fi

          rm -rf /tmp/gha-test-data
          mkdir -p /tmp/gha-restored

          ./target/debug/zccache gha-cache restore \
            --key "zccache-cli-test-${{ github.sha }}" \
            --path /tmp/gha-restored

          if [ -f /tmp/gha-restored/test.txt ]; then
            echo "OK: file restored"
            cat /tmp/gha-restored/test.txt
          else
            echo "FAIL: restored file not found"
            ls -la /tmp/gha-restored/ 2>/dev/null || echo "(empty)"
            exit 1
          fi

      - name: "gha-cache: graceful failure without API"
        shell: bash
        run: |
          # Ensure the CLI exits cleanly when API is not available
          unset ACTIONS_CACHE_URL
          unset ACTIONS_RUNTIME_TOKEN
          OUTPUT=$(./target/debug/zccache gha-cache save --key test --path /tmp 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "not running\|not available"; then
            echo "OK: graceful failure"
          else
            echo "FAIL: should report not available"
            exit 1
          fi
