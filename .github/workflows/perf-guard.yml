name: Perf Guard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "action.yml"
      - "action/**"
      - "ci/**"
      - "crates/**"
      - ".github/workflows/perf-guard.yml"

concurrency:
  group: perf-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-perf-benchmark:
    name: Build perf benchmark binary
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: zackees/setup-soldr@v0.9.16
        with:
          zccache-seed-strict: true
          cache: false
          linker: fast

      - name: Build perf benchmark binary
        shell: bash
        run: |
          set -euo pipefail
          soldr --no-cache cargo test -p zccache --test perf_bench_test --no-run
          bench_bin="$(
            find target/debug/deps \
              -maxdepth 1 \
              -type f \
              -name 'perf_bench_test-*' \
              -perm -111 \
              | head -n 1
          )"
          if [[ -z "$bench_bin" ]]; then
            echo "perf_bench_test binary was not found" >&2
            exit 1
          fi
          mkdir -p perf-guard-bin
          cp "$bench_bin" perf-guard-bin/perf_bench_test
          chmod +x perf-guard-bin/perf_bench_test

      - name: Upload perf benchmark binary
        uses: actions/upload-artifact@v7
        with:
          name: perf-guard-binary
          path: perf-guard-bin/perf_bench_test
          if-no-files-found: error

  perf-guard:
    name: ${{ matrix.label }} speed floor
    if: github.ref == 'refs/heads/main'
    needs: build-perf-benchmark
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c
            label: C
            artifact: c
          - language: c++
            label: C++
            artifact: cpp
          - language: rust
            label: Rust
            artifact: rust

    steps:
      - uses: actions/checkout@v6

      - uses: zackees/setup-soldr@v0.9.16
        with:
          zccache-seed-strict: true
          cache: false
          linker: fast

      - uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install benchmark tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Download perf benchmark binary
        uses: actions/download-artifact@v7
        with:
          name: perf-guard-binary
          path: perf-guard-bin

      - name: Prepare perf benchmark binary
        shell: bash
        run: chmod +x perf-guard-bin/perf_bench_test

      # --- Per-test perf guard steps -----------------------------------
      # Each benchmark test gets its own step so the GitHub Actions UI shows
      # per-test timing and failure status. Each step writes its results to
      # `perf-guard-output/<test_name>/`. The final aggregation step combines
      # those into a single pass/fail outcome for the job.

      - name: "C — perf_c_zccache_vs_bare"
        if: matrix.language == 'c'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language c --test perf_c_zccache_vs_bare \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_c_zccache_vs_bare || true

      - name: "C — perf_c_archive_link"
        if: matrix.language == 'c'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language c --test perf_c_archive_link \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_c_archive_link || true

      - name: "C++ — perf_warm_cache_zccache_vs_sccache"
        if: matrix.language == 'c++'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language c++ --test perf_warm_cache_zccache_vs_sccache \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_warm_cache_zccache_vs_sccache || true

      - name: "C++ — perf_response_file"
        if: matrix.language == 'c++'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language c++ --test perf_response_file \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_response_file || true

      - name: "C++ — perf_cpp_sibling_remap_warm"
        if: matrix.language == 'c++'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language c++ --test perf_cpp_sibling_remap_warm \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_cpp_sibling_remap_warm || true

      - name: "C++ — perf_cpp_driver_link"
        if: matrix.language == 'c++'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language c++ --test perf_cpp_driver_link \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_cpp_driver_link || true

      - name: "Rust — perf_rustc_zccache_vs_sccache"
        if: matrix.language == 'rust'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language rust --test perf_rustc_zccache_vs_sccache \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_rustc_zccache_vs_sccache || true

      - name: "Rust — perf_rustc_sibling_remap_warm"
        if: matrix.language == 'rust'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language rust --test perf_rustc_sibling_remap_warm \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_rustc_sibling_remap_warm || true

      - name: "Rust — perf_rust_workspace_link"
        if: matrix.language == 'rust'
        shell: bash
        run: |
          python3 -m ci.perf_guard --run-benchmarks --language rust --test perf_rust_workspace_link \
            --attempts 3 --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output/perf_rust_workspace_link || true

      - name: Aggregate perf guard results
        id: perf_guard
        if: always()
        shell: bash
        run: |
          set +e
          overall=0
          # Highlight any line containing "FAIL" in red so the runner log
          # surfaces regressions at a glance. Restored from commit 06424f7
          # after the per-test split (46bbbee) inadvertently dropped it.
          print_fail_colored() {
            local line
            while IFS= read -r line || [[ -n "$line" ]]; do
              if [[ "$line" == *FAIL* ]]; then
                printf '\033[31m%s\033[0m\n' "$line"
              else
                printf '%s\n' "$line"
              fi
            done
          }
          shopt -s nullglob
          for dir in perf-guard-output/*/; do
            name="$(basename "$dir")"
            result_file="$dir/perf-guard-result.txt"
            summary_file="$dir/perf-guard-summary.md"
            echo "::group::$name"
            if [[ -f "$summary_file" ]]; then
              print_fail_colored < "$summary_file"
            fi
            if [[ -f "$result_file" ]]; then
              result="$(cat "$result_file")"
              if [[ "$result" == *FAILED* ]]; then
                overall=1
                echo "::error title=Perf guard failed ($name)::$result"
              else
                echo "::notice title=Perf guard ok ($name)::$result"
              fi
              printf '%s\n' "$result" | print_fail_colored
            else
              overall=1
              echo "::error title=Perf guard missing ($name)::no perf-guard-result.txt produced"
            fi
            echo "::endgroup::"
          done
          shopt -u nullglob
          echo "status=$overall" >> "$GITHUB_OUTPUT"

      - name: Upload perf guard artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-guard-${{ matrix.artifact }}-output
          path: perf-guard-output
          if-no-files-found: warn

      # When any per-test step regressed, re-run only the failing tests under
      # `perf record` and turn the captured stacks into a flamegraph + top-N
      # report. The dev test binary is already built with
      # debug = "line-tables-only" (see [profile.dev] in Cargo.toml), so the
      # captured samples resolve to zccache_* function names + source lines.
      - name: Profile failing perf guard run
        id: profile_failure
        if: steps.perf_guard.outputs.status != '0'
        shell: bash
        run: |
          set +e

          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            linux-tools-common \
            linux-tools-generic \
            "linux-tools-$(uname -r)" \
            || sudo apt-get install -y -qq linux-tools-common linux-tools-generic
          cargo install inferno --locked --quiet

          # Allow `perf record` to capture without elevated privileges.
          echo 1 | sudo tee /proc/sys/kernel/perf_event_paranoid >/dev/null
          echo 0 | sudo tee /proc/sys/kernel/kptr_restrict >/dev/null

          mkdir -p perf-profile-output
          pushd perf-profile-output >/dev/null

          # Profile only the per-test directories whose result.txt is FAILED.
          FAILED_TESTS=""
          for dir in ../perf-guard-output/*/; do
            [[ -d "$dir" ]] || continue
            result_file="$dir/perf-guard-result.txt"
            name="$(basename "$dir")"
            if [[ -f "$result_file" ]] && grep -q FAILED "$result_file"; then
              FAILED_TESTS="$FAILED_TESTS $name"
            fi
          done

          for test_name in $FAILED_TESTS; do
            echo "::group::perf record: $test_name"
            perf record \
              -F 999 \
              -g --call-graph dwarf \
              -o "$test_name.perf.data" \
              -- ../perf-guard-bin/perf_bench_test "$test_name" \
                --nocapture --ignored --test-threads=1
            record_status=$?
            echo "perf record exit: $record_status"

            if [[ -f "$test_name.perf.data" ]]; then
              perf script -i "$test_name.perf.data" > "$test_name.script.txt" 2>/dev/null
              if [[ -s "$test_name.script.txt" ]]; then
                inferno-collapse-perf < "$test_name.script.txt" > "$test_name.collapsed.txt"
                if [[ -s "$test_name.collapsed.txt" ]]; then
                  inferno-flamegraph < "$test_name.collapsed.txt" > "$test_name.flamegraph.svg"

                  # Top 20 hot stacks (inclusive sample count).
                  sort -rn -k2 -t' ' "$test_name.collapsed.txt" \
                    | head -20 > "$test_name.top20-stacks.txt"

                  # Top 20 hot leaf functions (self-time).
                  awk -F';' '{
                    n = split($NF, parts, " ")
                    leaf = parts[1]
                    cnt = parts[2] + 0
                    tot[leaf] += cnt
                  }
                  END {
                    for (k in tot) print tot[k], k
                  }' "$test_name.collapsed.txt" \
                    | sort -rn | head -20 > "$test_name.top20-self.txt"

                  grep -E '^[0-9]+ (zccache|_ZN.*zccache)' "$test_name.top20-self.txt" \
                    > "$test_name.top20-zccache.txt" || true
                fi
              fi
            fi
            echo "::endgroup::"
          done

          popd >/dev/null

          {
            echo "## Profiler results: ${{ matrix.label }} speed floor"
            echo ""
            echo "Full data (perf.data, flamegraph SVGs, folded stacks, top-N tables) is in the"
            echo "\`perf-profile-${{ matrix.artifact }}\` artifact."
            echo ""
            shopt -s nullglob
            for top_self in perf-profile-output/*.top20-self.txt; do
              [[ -f "$top_self" ]] || continue
              base="$(basename "$top_self" .top20-self.txt)"
              echo "### $base"
              echo ""
              echo "**Top leaf functions (self samples × function):**"
              echo ""
              echo '```'
              head -20 "$top_self"
              echo '```'
              echo ""
              top_zc="perf-profile-output/$base.top20-zccache.txt"
              if [[ -s "$top_zc" ]]; then
                echo "**zccache-only leaves (filtered):**"
                echo ""
                echo '```'
                head -20 "$top_zc"
                echo '```'
                echo ""
              fi
              top_stacks="perf-profile-output/$base.top20-stacks.txt"
              if [[ -s "$top_stacks" ]]; then
                echo "**Top 20 hot stacks (inclusive samples × full stack):**"
                echo ""
                echo '```'
                head -20 "$top_stacks"
                echo '```'
                echo ""
              fi
            done
            shopt -u nullglob
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0

      - name: Upload profile artifacts
        if: steps.perf_guard.outputs.status != '0'
        uses: actions/upload-artifact@v7
        with:
          name: perf-profile-${{ matrix.artifact }}
          path: perf-profile-output
          if-no-files-found: warn

      - name: Fail job if any per-test guard failed
        if: always()
        shell: bash
        run: |
          status="${{ steps.perf_guard.outputs.status }}"
          if [[ -z "$status" || "$status" != "0" ]]; then
            echo "::error title=Perf guard failed::one or more per-test perf guards failed"
            exit 1
          fi
          echo "All per-test perf guards passed."
