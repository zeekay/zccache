name: Perf Guard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "action.yml"
      - "action/**"
      - "ci/**"
      - "crates/**"
      - ".github/workflows/perf-guard.yml"

concurrency:
  group: perf-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf-guard:
    name: ${{ matrix.label }} speed floor
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c
            label: C
            artifact: c
          - language: c++
            label: C++
            artifact: cpp
          - language: rust
            label: Rust
            artifact: rust

    steps:
      - uses: actions/checkout@v6

      - uses: zackees/setup-soldr@v0
        with:
          cache: false
          build-cache: false
          target-cache: false

      - uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install benchmark tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Run perf regression guard
        shell: bash
        run: |
          set -euo pipefail
          python3 -m ci.perf_guard \
            --run-benchmarks \
            --language "${{ matrix.language }}" \
            --bare-threshold 1.5 \
            --sccache-threshold 1.5 \
            --attempts 3 \
            --output-dir perf-guard-output

      - name: Upload perf guard artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-guard-${{ matrix.artifact }}-output
          path: perf-guard-output
          if-no-files-found: warn
