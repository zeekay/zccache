name: Perf Guard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "action.yml"
      - "action/**"
      - "ci/**"
      - "crates/**"
      - ".github/workflows/perf-guard.yml"

concurrency:
  group: perf-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-perf-benchmark:
    name: Build perf benchmark binary
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: zackees/setup-soldr@v0
        with:
          cache: false
          build-cache: false
          target-cache: false

      - name: Build perf benchmark binary
        shell: bash
        run: |
          set -euo pipefail
          soldr --no-cache cargo test -p zccache-daemon --test perf_bench_test --no-run
          bench_bin="$(
            find target/debug/deps \
              -maxdepth 1 \
              -type f \
              -name 'perf_bench_test-*' \
              -perm -111 \
              | head -n 1
          )"
          if [[ -z "$bench_bin" ]]; then
            echo "perf_bench_test binary was not found" >&2
            exit 1
          fi
          mkdir -p perf-guard-bin
          cp "$bench_bin" perf-guard-bin/perf_bench_test
          chmod +x perf-guard-bin/perf_bench_test

      - name: Upload perf benchmark binary
        uses: actions/upload-artifact@v7
        with:
          name: perf-guard-binary
          path: perf-guard-bin/perf_bench_test
          if-no-files-found: error

  perf-guard:
    name: ${{ matrix.label }} speed floor
    if: github.ref == 'refs/heads/main'
    needs: build-perf-benchmark
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c
            label: C
            artifact: c
          - language: c++
            label: C++
            artifact: cpp
          - language: rust
            label: Rust
            artifact: rust

    steps:
      - uses: actions/checkout@v6

      - uses: zackees/setup-soldr@v0
        with:
          cache: false
          build-cache: false
          target-cache: false

      - uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install benchmark tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Download perf benchmark binary
        uses: actions/download-artifact@v7
        with:
          name: perf-guard-binary
          path: perf-guard-bin

      - name: Prepare perf benchmark binary
        shell: bash
        run: chmod +x perf-guard-bin/perf_bench_test

      - name: Run perf regression guard
        id: perf_guard
        shell: bash
        run: |
          set +e
          python3 -m ci.perf_guard \
            --run-benchmarks \
            --language "${{ matrix.language }}" \
            --bare-threshold 1.5 \
            --sccache-threshold 1.5 \
            --cold-bare-threshold 0.85 \
            --cold-sccache-threshold 1.0 \
            --attempts 3 \
            --benchmark-binary "$PWD/perf-guard-bin/perf_bench_test" \
            --output-dir perf-guard-output
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload perf guard artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-guard-${{ matrix.artifact }}-output
          path: perf-guard-output
          if-no-files-found: warn

      # When the perf guard regresses, re-run the language's benchmarks under
      # `perf record` and turn the captured stacks into a flamegraph + top-N
      # report. The dev test binary is already built with
      # debug = "line-tables-only" (see [profile.dev] in Cargo.toml), so the
      # captured samples resolve to zccache_* function names + source lines.
      # This step is best-effort — its `exit 0` keeps the job moving on to
      # `Print perf guard result`, which is what actually fails the job.
      - name: Profile failing perf guard run
        id: profile_failure
        if: steps.perf_guard.outputs.status != '0'
        shell: bash
        run: |
          set +e

          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            linux-tools-common \
            linux-tools-generic \
            "linux-tools-$(uname -r)" \
            || sudo apt-get install -y -qq linux-tools-common linux-tools-generic
          cargo install inferno --locked --quiet

          # Allow `perf record` to capture without elevated privileges.
          echo 1 | sudo tee /proc/sys/kernel/perf_event_paranoid >/dev/null
          echo 0 | sudo tee /proc/sys/kernel/kptr_restrict >/dev/null

          mkdir -p perf-profile-output
          pushd perf-profile-output >/dev/null

          # Which tests belong to the failing language? `benchmark_stats`
          # already encodes that mapping — re-use it instead of duplicating
          # the list in YAML.
          TEST_NAMES="$(python3 -c "from ci import benchmark_stats; \
            print(' '.join(benchmark_stats.BENCHMARK_TESTS_BY_LANGUAGE['${{ matrix.language }}']))")"

          for test_name in $TEST_NAMES; do
            echo "::group::perf record: $test_name"
            perf record \
              -F 999 \
              -g --call-graph dwarf \
              -o "$test_name.perf.data" \
              -- ../perf-guard-bin/perf_bench_test "$test_name" \
                --nocapture --ignored --test-threads=1
            record_status=$?
            echo "perf record exit: $record_status"

            if [[ -f "$test_name.perf.data" ]]; then
              perf script -i "$test_name.perf.data" > "$test_name.script.txt" 2>/dev/null
              if [[ -s "$test_name.script.txt" ]]; then
                inferno-collapse-perf < "$test_name.script.txt" > "$test_name.collapsed.txt"
                if [[ -s "$test_name.collapsed.txt" ]]; then
                  inferno-flamegraph < "$test_name.collapsed.txt" > "$test_name.flamegraph.svg"

                  # Top 20 hot stacks (inclusive sample count).
                  # Folded format: "frame1;frame2;...;frameN COUNT"
                  sort -rn -k2 -t' ' "$test_name.collapsed.txt" \
                    | head -20 > "$test_name.top20-stacks.txt"

                  # Top 20 hot leaf functions (self-time).
                  awk -F';' '{
                    n = split($NF, parts, " ")
                    leaf = parts[1]
                    cnt = parts[2] + 0
                    tot[leaf] += cnt
                  }
                  END {
                    for (k in tot) print tot[k], k
                  }' "$test_name.collapsed.txt" \
                    | sort -rn | head -20 > "$test_name.top20-self.txt"

                  # Daemon-side hot leaves, restricted to zccache_* symbols.
                  grep -E '^[0-9]+ (zccache|_ZN.*zccache)' "$test_name.top20-self.txt" \
                    > "$test_name.top20-zccache.txt" || true
                fi
              fi
            fi
            echo "::endgroup::"
          done

          popd >/dev/null

          # Compact step-summary so the failure reason and the hot frames
          # are visible at a glance in the GitHub Actions UI.
          {
            echo "## Profiler results: ${{ matrix.label }} speed floor"
            echo ""
            echo "Full data (perf.data, flamegraph SVGs, folded stacks, top-N tables) is in the"
            echo "\`perf-profile-${{ matrix.artifact }}\` artifact."
            echo ""
            shopt -s nullglob
            for top_self in perf-profile-output/*.top20-self.txt; do
              [[ -f "$top_self" ]] || continue
              base="$(basename "$top_self" .top20-self.txt)"
              echo "### $base"
              echo ""
              echo "**Top leaf functions (self samples × function):**"
              echo ""
              echo '```'
              head -20 "$top_self"
              echo '```'
              echo ""
              top_zc="perf-profile-output/$base.top20-zccache.txt"
              if [[ -s "$top_zc" ]]; then
                echo "**zccache-only leaves (filtered):**"
                echo ""
                echo '```'
                head -20 "$top_zc"
                echo '```'
                echo ""
              fi
              top_stacks="perf-profile-output/$base.top20-stacks.txt"
              if [[ -s "$top_stacks" ]]; then
                echo "**Top 20 hot stacks (inclusive samples × full stack):**"
                echo ""
                echo '```'
                head -20 "$top_stacks"
                echo '```'
                echo ""
              fi
            done
            shopt -u nullglob
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0

      - name: Upload profile artifacts
        if: steps.perf_guard.outputs.status != '0'
        uses: actions/upload-artifact@v7
        with:
          name: perf-profile-${{ matrix.artifact }}
          path: perf-profile-output
          if-no-files-found: warn

      - name: Print perf guard result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary_path="perf-guard-output/perf-guard-summary.md"
          result_path="perf-guard-output/perf-guard-result.txt"
          status="${{ steps.perf_guard.outputs.status }}"
          print_fail_colored() {
            local line
            while IFS= read -r line || [[ -n "$line" ]]; do
              if [[ "$line" == *FAIL* ]]; then
                printf '\033[31m%s\033[0m\n' "$line"
              else
                printf '%s\n' "$line"
              fi
            done
          }
          if [[ -f "$summary_path" ]]; then
            print_fail_colored < "$summary_path"
          fi
          if [[ -f "$result_path" ]]; then
            result="$(cat "$result_path")"
          else
            result="PERF GUARD FAILED: no perf guard result was produced."
            status=1
          fi
          if [[ -z "$status" ]]; then
            status=1
          fi
          if [[ "$status" != "0" ]]; then
            echo "::error title=Perf guard failed::$result"
            printf '%s\n' "$result" | print_fail_colored
            exit 1
          fi
          echo "::notice title=Perf guard ok::$result"
          printf '%s\n' "$result" | print_fail_colored
