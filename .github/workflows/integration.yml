name: Integration

# Linux-only full `cargo test --workspace --no-fail-fast`, including the
# integration test binaries under `crates/*/tests/`. Most of those tests
# are #[ignore]'d, but the binaries themselves are still compiled — which
# costs ~4 minutes on Windows MSVC per run (see issue #106). The platform
# Check / Test workflows in `ci-check.yml` therefore only run `--lib --bins`;
# this workflow restores the cross-binary integration coverage on the
# fastest platform (Linux).

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  integration:
    name: Integration (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.28
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          # #240: seed the isolated integration SOLDR_CACHE_DIR from the
          # restored build-cache so the daemon-isolated test phase starts warm.
          seed-isolated-build-cache: ${{ runner.temp }}/zccache-self-tests/integration
          verify-compile-cache: warn
          # zackees/setup-soldr#282: this job restored 5,454 cook artifacts
          # but produced hit_rate=0.0% on the subsequent compile. logging:true
          # emits the [compile_journal] block in the post step (miss_reasons
          # histogram + slowest_misses with per-record miss_diff). Confirmed
          # zero key-impact (setup-soldr#247), so enabling it does NOT cold
          # any cache layer. Remove once #282 is root-caused.
          logging: true
      - name: Build integration test binaries
        shell: bash
        run: soldr cargo test --workspace --no-fail-fast --no-run
      - name: Stop setup-soldr builder cache before tests
        uses: zackees/setup-soldr/cleanup@v0.9.28
      - name: Test (full workspace)
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/integration
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
        run: |
          set +e
          unset ZCCACHE_CACHE_DIR
          echo "Using isolated test SOLDR_CACHE_DIR=$SOLDR_CACHE_DIR"
          start=$SECONDS
          soldr cargo test --workspace --no-fail-fast 2>&1 | tee test-output.txt
          status=${PIPESTATUS[0]}
          dur=$((SECONDS - start))
          echo "- **Integration (Linux)**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"
          if [ $status -ne 0 ]; then
            {
              echo '## Integration Test Failures'
              echo '```'
              awk '/^failures:$/,/^test result:/' test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $status
      - name: Stop isolated test cache
        if: always()
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/integration
        run: |
          unset ZCCACHE_CACHE_DIR
          soldr cache shutdown --archive-logs "$SOLDR_CACHE_DIR/cache/zccache/logs/archive" || true
