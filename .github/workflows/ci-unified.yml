name: CI

# Single workflow: one job per platform, every gate runs even if earlier
# ones fail. The final "report" step collects every gate's outcome and
# fails the job with a list of which gates actually broke, so a single
# CI cycle surfaces ALL failures at once instead of stopping at the
# first one. (User directive: "if a step breaks, keep going then error
# at the end with which step broke".)
#
# Per-platform gate matrix (path-ignored sets at top filter out
# docs-only edits so unrelated PRs skip the whole job):
#
#                linux   windows  macos
#   fmt           Y       Y        Y
#   clippy        Y       Y        Y
#   dylint        Y       -        Y    (unix-only nightly toolchain)
#   docs          Y       -        -
#   build (check) Y       Y        Y
#   unit tests    Y       Y        Y
#   integration   Y       -        -
#   cargo-registry Y      Y        Y    (subcommand smoke)
#   gha-cache     Y       -        -
#   wrapper-e2e   Y       Y        Y    (SOLDR_RUSTC_WRAPPER end-to-end)
#
# Workflows NOT folded here (distinct purposes, not gates):
#   release-auto.yml      PyPI + crates.io + GH release
#   perf-*.yml, bench-*   perf regression cluster
#   build.yml             distribution binaries (workflow_dispatch)
#   coverage.yml          coverage builds (separate RUSTFLAGS)
#   cache-cleanup.yml     scheduled housekeeping
#   feature-matrix-check  feature flag combinations
#   wire-stability.yml    IPC protocol stability
# test-action.yml was DELETED — its cargo-registry + gha-cache jobs
# are now inlined here; its action-wrapper test was redundant with
# wrapper-e2e.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            is_linux: "yes"
            is_windows: ""
          - os: windows-latest
            platform: windows
            is_linux: ""
            is_windows: "yes"
          - os: macos-latest
            platform: macos
            is_linux: ""
            is_windows: ""
    steps:
      - uses: actions/checkout@v6

      - id: setup-soldr
        uses: zackees/setup-soldr@v0.9.62
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: unified-${{ matrix.platform }}
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          solo-toolchain-cache: true
          verify-compile-cache: warn
          dylint-cache: true
          dylint-toolchain: nightly-2026-03-26
          dylint-driver-rev: 4bd91ce7729b74c7ee5664bbb588f7baf30b4a09
          cargo-dylint-version: 5.0.0
          dylint-link-version: 5.0.0

      # Every gate below: `continue-on-error: true` + an `id` so the
      # final report step can collect outcomes via `steps.<id>.outcome`.
      # A failed gate marks its step `failure`, but the job continues
      # and the next gate runs. The final report aggregates failures
      # and exits 1 if any gate broke.

      - id: gate_fmt
        name: fmt
        continue-on-error: true
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo fmt --all -- --check
          echo "- **${{ matrix.platform }} / fmt**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      - id: gate_clippy
        name: clippy
        continue-on-error: true
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo clippy --workspace --all-targets -- -D warnings
          echo "- **${{ matrix.platform }} / clippy**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      # dylint: unix-only because the nightly driver build assumes a
      # Unix-shaped rustup layout. Combined install + run into a single
      # gate so dylint shows up as one row in the failure summary.
      - id: gate_dylint
        name: dylint
        if: matrix.is_windows != 'yes'
        continue-on-error: true
        shell: bash
        run: |
          start=$SECONDS
          set -e
          soldr rustup toolchain install nightly-2026-03-26 \
            --component llvm-tools-preview --component rust-src \
            --component rustc-dev --profile minimal
          if [ "${{ steps.setup-soldr.outputs.dylint-cache-hit }}" != "true" ]; then
            soldr cargo install cargo-dylint --version 5.0.0 --locked
            soldr cargo install dylint-link  --version 5.0.0 --locked
            python3 ci/build_dylint_driver.py
          fi
          export PATH="${CARGO_HOME}/bin:${PATH}"
          soldr cargo fmt --manifest-path dylints/ban_std_pathbuf/Cargo.toml --all -- --check
          soldr cargo fmt --manifest-path dylints/ban_unrooted_tempdir/Cargo.toml --all -- --check
          soldr rustup run nightly-2026-03-26 cargo test --manifest-path dylints/ban_std_pathbuf/Cargo.toml
          soldr rustup run nightly-2026-03-26 cargo test --manifest-path dylints/ban_unrooted_tempdir/Cargo.toml
          python3 -m ci.lint --dylint-only
          echo "- **${{ matrix.platform }} / dylint**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      - id: gate_docs
        name: docs
        if: matrix.is_linux == 'yes'
        continue-on-error: true
        shell: bash
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          start=$SECONDS
          soldr cargo doc --workspace --no-deps
          echo "- **${{ matrix.platform }} / docs**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      # Build is the only NON-continue-on-error gate. If `cargo check`
      # fails, every downstream gate (clippy already ran, but unit
      # tests / integration / wrapper-e2e / cargo-registry / gha-cache
      # / docs) would produce noise rather than signal — they all
      # require the workspace to compile. So we halt the job here and
      # the final `report failures` step (`if: always()`) reports
      # `build` as the single broken gate.
      - id: gate_build
        name: build
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo check --workspace --all-targets
          echo "- **${{ matrix.platform }} / build**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      - id: gate_test_compile
        name: compile test binaries
        continue-on-error: true
        shell: bash
        run: soldr cargo test --workspace --lib --bins --no-fail-fast --no-run

      - name: Stop setup-soldr builder cache before tests
        if: always()
        uses: zackees/setup-soldr/cleanup@v0.9.62

      - id: gate_unit
        name: unit tests
        continue-on-error: true
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/unified-${{ matrix.platform }}
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
        run: |
          set +e
          unset ZCCACHE_CACHE_DIR
          mkdir -p "$SOLDR_CACHE_DIR"
          start=$SECONDS
          soldr cargo test --workspace --lib --bins --no-fail-fast 2>&1 | tee unit-output.txt
          status=${PIPESTATUS[0]}
          echo "- **${{ matrix.platform }} / unit**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"
          if [ $status -ne 0 ]; then
            {
              echo '## Unit test failures (${{ matrix.platform }})'
              echo '```'
              awk '/^failures:$/,/^test result:/' unit-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $status

      - id: gate_integration
        name: integration tests
        if: matrix.is_linux == 'yes'
        continue-on-error: true
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/integration-unified
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
        run: |
          set +e
          unset ZCCACHE_CACHE_DIR
          mkdir -p "$SOLDR_CACHE_DIR"
          start=$SECONDS
          soldr cargo test --workspace --no-fail-fast 2>&1 | tee integration-output.txt
          status=${PIPESTATUS[0]}
          echo "- **${{ matrix.platform }} / integration**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"
          if [ $status -ne 0 ]; then
            {
              echo '## Integration test failures'
              echo '```'
              awk '/^failures:$/,/^test result:/' integration-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $status

      - id: gate_cargo_registry
        name: cargo-registry smoke
        continue-on-error: true
        shell: bash
        run: |
          set -e
          start=$SECONDS
          # setup-soldr exports SOLDR_SKIP_CARGO_REGISTRY_SAVE=1
          # because IT owns the cache layer in the warm-path setup;
          # if we leave it set our `save` becomes a no-op and the
          # archive existence check below fires (#272). The smoke
          # test is the explicit caller — unset so save actually runs.
          unset SOLDR_SKIP_CARGO_REGISTRY_SAVE
          soldr cargo build -p zccache --bin zccache
          ZCC="$(find target -type f -name 'zccache' -not -path '*/deps/*' -not -path '*/build/*' | head -1)"
          if [ -z "$ZCC" ]; then
            ZCC="$(find target -type f -name 'zccache.exe' -not -path '*/deps/*' -not -path '*/build/*' | head -1)"
          fi
          test -x "$ZCC" || { echo "FAIL: zccache binary not found under target/" >&2; exit 1; }
          H1=$("$ZCC" cargo-registry hash --lockfile Cargo.lock)
          H2=$("$ZCC" cargo-registry hash --lockfile Cargo.lock)
          test "$H1" = "$H2" || { echo "FAIL: hash not deterministic ($H1 vs $H2)" >&2; exit 1; }
          test "${#H1}" -eq 16 || { echo "FAIL: hash length ${#H1} != 16" >&2; exit 1; }
          soldr cargo fetch
          "$ZCC" cargo-registry save --key ci-unified-$$
          ROOT="$("$ZCC" cache-root)"
          ARCHIVE="$ROOT/cargo-registry/ci-unified-$$.tar.gz"
          test -f "$ARCHIVE" || { echo "FAIL: archive not at $ARCHIVE" >&2; exit 1; }
          "$ZCC" cargo-registry clean
          ! test -f "$ARCHIVE" || { echo "FAIL: clean did not remove $ARCHIVE" >&2; exit 1; }
          echo "- **${{ matrix.platform }} / cargo-registry**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      - id: gate_gha_cache
        name: gha-cache smoke
        if: matrix.is_linux == 'yes'
        continue-on-error: true
        shell: bash
        run: |
          start=$SECONDS
          ZCC="$(find target -type f -name 'zccache' -not -path '*/deps/*' -not -path '*/build/*' | head -1)"
          OUTPUT=$("$ZCC" gha-cache status 2>&1 || true)
          echo "gha-cache status: $OUTPUT"
          echo "- **${{ matrix.platform }} / gha-cache**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      - id: gate_wrapper_e2e_unix
        name: wrapper-e2e (unix)
        if: matrix.is_windows != 'yes'
        continue-on-error: true
        shell: bash
        env:
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: |
          set -e
          start=$SECONDS
          install_dir="$HOME/.local/bin"
          mkdir -p "$install_dir"
          ZCC="$(find target -type f -name 'zccache' -not -path '*/deps/*' -not -path '*/build/*' | head -1)"
          ZCCD="$(find target -type f -name 'zccache-daemon' -not -path '*/deps/*' -not -path '*/build/*' | head -1)"
          if [ -z "$ZCCD" ]; then
            soldr cargo build -p zccache --bin zccache-daemon
            ZCCD="$(find target -type f -name 'zccache-daemon' -not -path '*/deps/*' -not -path '*/build/*' | head -1)"
          fi
          install -m755 "$ZCC"  "$install_dir/zccache"
          install -m755 "$ZCCD" "$install_dir/zccache-daemon"
          export PATH="$install_dir:$PATH"
          export SOLDR_RUSTC_WRAPPER="$install_dir/zccache"
          cd "$(mktemp -d)"
          soldr cargo new --lib hello
          cd hello
          soldr cargo add serde --features derive
          soldr cargo build --verbose 2>&1 | tee build.log
          grep -F 'zccache ' build.log
          effective_root="$(zccache cache-root)"
          test -d "$effective_root/logs"
          zccache stop || true
          echo "- **${{ matrix.platform }} / wrapper-e2e**: $((SECONDS - start))s" >> "$GITHUB_STEP_SUMMARY"

      - id: gate_wrapper_e2e_windows
        name: wrapper-e2e (windows)
        if: matrix.is_windows == 'yes'
        continue-on-error: true
        shell: pwsh
        env:
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: |
          $start = Get-Date
          $installDir = "$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          $zcc = Get-ChildItem -Recurse target -Filter zccache.exe -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match '\\debug\\' -and $_.FullName -notmatch '\\deps\\' -and $_.FullName -notmatch '\\build\\' } |
                 Select-Object -First 1
          if (-not $zcc) {
            soldr cargo build -p zccache --bin zccache
            $zcc = Get-ChildItem -Recurse target -Filter zccache.exe -ErrorAction SilentlyContinue |
                   Where-Object { $_.FullName -match '\\debug\\' -and $_.FullName -notmatch '\\deps\\' -and $_.FullName -notmatch '\\build\\' } |
                   Select-Object -First 1
          }
          soldr cargo build -p zccache --bin zccache-daemon
          $zccd = Get-ChildItem -Recurse target -Filter zccache-daemon.exe -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match '\\debug\\' -and $_.FullName -notmatch '\\deps\\' -and $_.FullName -notmatch '\\build\\' } |
                  Select-Object -First 1
          Copy-Item $zcc.FullName  "$installDir\zccache.exe"        -Force
          Copy-Item $zccd.FullName "$installDir\zccache-daemon.exe" -Force
          $env:PATH = "$installDir;$env:PATH"
          $env:SOLDR_RUSTC_WRAPPER = "$installDir\zccache.exe"
          $tmp = New-Item -ItemType Directory -Path "$env:TEMP/zc-e2e-$(Get-Random)" -Force
          Set-Location $tmp
          soldr cargo new --lib hello
          Set-Location hello
          soldr cargo add serde --features derive
          soldr cargo build --verbose 2>&1 | Tee-Object -FilePath build.log
          if (-not (Select-String -Path build.log -SimpleMatch 'zccache')) { exit 1 }
          $effectiveRoot = (& zccache cache-root).Trim()
          if (-not (Test-Path "$effectiveRoot/logs")) { exit 1 }
          zccache stop 2>$null
          $dur = ((Get-Date) - $start).TotalSeconds
          Add-Content $env:GITHUB_STEP_SUMMARY "- **${{ matrix.platform }} / wrapper-e2e**: $([math]::Round($dur))s"

      - name: Stop isolated unit-test cache
        if: always() && matrix.is_windows != 'yes'
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/unified-${{ matrix.platform }}
        run: |
          unset ZCCACHE_CACHE_DIR
          soldr cache shutdown --archive-logs "$SOLDR_CACHE_DIR/cache/zccache/logs/archive" || true

      # ── Final report ────────────────────────────────────────────────
      # Collect every gate's outcome and exit 1 if any failed, with a
      # concise summary of which ones broke. Always runs (even if every
      # earlier step succeeded — then it prints the all-green line).
      - name: report failures
        if: always()
        shell: bash
        run: |
          set -e
          declare -a failures=()
          add_fail() {
            local outcome="$1" gate="$2"
            if [ "$outcome" = "failure" ]; then
              failures+=("$gate")
            fi
          }
          add_fail "${{ steps.gate_fmt.outcome }}"               "fmt"
          add_fail "${{ steps.gate_clippy.outcome }}"            "clippy"
          add_fail "${{ steps.gate_dylint.outcome }}"            "dylint"
          add_fail "${{ steps.gate_docs.outcome }}"              "docs"
          add_fail "${{ steps.gate_build.outcome }}"             "build"
          add_fail "${{ steps.gate_test_compile.outcome }}"      "test-compile"
          add_fail "${{ steps.gate_unit.outcome }}"              "unit"
          add_fail "${{ steps.gate_integration.outcome }}"       "integration"
          add_fail "${{ steps.gate_cargo_registry.outcome }}"    "cargo-registry"
          add_fail "${{ steps.gate_gha_cache.outcome }}"         "gha-cache"
          add_fail "${{ steps.gate_wrapper_e2e_unix.outcome }}"  "wrapper-e2e"
          add_fail "${{ steps.gate_wrapper_e2e_windows.outcome }}" "wrapper-e2e"

          if [ ${#failures[@]} -eq 0 ]; then
            echo "## ${{ matrix.platform }}: all gates passed" >> "$GITHUB_STEP_SUMMARY"
            echo "all gates passed"
            exit 0
          fi

          {
            echo "## ${{ matrix.platform }}: FAILED gates"
            for g in "${failures[@]}"; do echo "- $g"; done
          } >> "$GITHUB_STEP_SUMMARY"

          echo "FAILED: ${failures[*]}"
          exit 1
