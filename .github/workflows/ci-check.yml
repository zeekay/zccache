name: CI Check

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SOLDR_RUSTC_WRAPPER: none

jobs:
  check:
    name: Check
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: zackees/setup-soldr@v0
        with:
          toolchain: 1.94.1
          cache: true
      - name: Check
        run: soldr cargo check --workspace --all-targets
      - name: Test
        shell: bash
        run: |
          set +e
          soldr cargo test --workspace --no-fail-fast 2>&1 | tee test-output.txt
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            {
              echo '## Test Failures'
              echo '```'
              # Extract the "failures:" summary blocks (test names + assertion details)
              awk '/^failures:$/,/^test result:/' test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $status
