name: CI Check

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: zackees/setup-soldr@v0
        with:
          version: "0.7.14"
          toolchain: 1.94.1
          cache: true
      - name: Check
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo check --workspace
          status=$?
          dur=$((SECONDS - start))
          echo "- **${{ inputs.os }} / Check**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"
          exit $status
      - name: Stop zccache before cache save
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          status = subprocess.run(
              ["soldr", "status", "--json"],
              capture_output=True,
              text=True,
              check=False,
          )
          if status.returncode != 0:
              raise SystemExit(0)

          try:
              payload = json.loads(status.stdout)
          except json.JSONDecodeError:
              raise SystemExit(0)

          zccache = payload.get("zccache") or {}
          binary = zccache.get("binary_path")
          cache_dir = zccache.get("cache_dir") or zccache.get("state_dir")
          if not binary:
              raise SystemExit(0)

          env = os.environ.copy()
          if cache_dir:
              env["ZCCACHE_CACHE_DIR"] = cache_dir
          subprocess.run([binary, "stop"], env=env, check=False)
          PY

  test:
    name: Test
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: zackees/setup-soldr@v0
        with:
          version: "0.7.14"
          toolchain: 1.94.1
          cache: true
      # Platform Test runs unit tests in libraries and binaries only — it
      # intentionally does NOT compile the integration test binaries under
      # `crates/*/tests/`. Most of those binaries' tests are #[ignore]'d, but
      # the binaries are still compiled by `cargo test --workspace`, which
      # cost ~4m of Windows CI time per run (issue #106). Full integration
      # coverage is provided by the `integration` workflow on Linux.
      - name: Test
        shell: bash
        run: |
          set +e
          start=$SECONDS
          soldr cargo test --workspace --lib --bins --no-fail-fast 2>&1 | tee test-output.txt
          status=${PIPESTATUS[0]}
          dur=$((SECONDS - start))
          echo "- **${{ inputs.os }} / Test**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"
          if [ $status -ne 0 ]; then
            {
              echo '## Test Failures'
              echo '```'
              # Extract the "failures:" summary blocks (test names + assertion details)
              awk '/^failures:$/,/^test result:/' test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $status
      - name: Stop zccache before cache save
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          status = subprocess.run(
              ["soldr", "status", "--json"],
              capture_output=True,
              text=True,
              check=False,
          )
          if status.returncode != 0:
              raise SystemExit(0)

          try:
              payload = json.loads(status.stdout)
          except json.JSONDecodeError:
              raise SystemExit(0)

          zccache = payload.get("zccache") or {}
          binary = zccache.get("binary_path")
          cache_dir = zccache.get("cache_dir") or zccache.get("state_dir")
          if not binary:
              raise SystemExit(0)

          env = os.environ.copy()
          if cache_dir:
              env["ZCCACHE_CACHE_DIR"] = cache_dir
          subprocess.run([binary, "stop"], env=env, check=False)
          PY
