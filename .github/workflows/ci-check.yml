name: CI Check

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.47
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: check-${{ inputs.os }}
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          verify-compile-cache: warn
          # setup-soldr#305: skip ~7-11s `rustup toolchain install`
          # on warm runs by restoring from a tiny per-platform cache.
          # Was missing on Linux/macOS/Windows check+test jobs.
          solo-toolchain-cache: true
      - name: Check
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo check --workspace
          status=$?
          dur=$((SECONDS - start))
          echo "- **${{ inputs.os }} / Check**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"
          exit $status

  test:
    name: Test
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.47
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: test-${{ inputs.os }}
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          # #240: seed the isolated test SOLDR_CACHE_DIR (per-OS) from the
          # restored build-cache so the daemon-isolated test phase starts warm
          # across Linux/macOS/Windows.
          seed-isolated-build-cache: ${{ runner.temp }}/zccache-self-tests/test-${{ inputs.os }}
          verify-compile-cache: warn
          # setup-soldr#305: skip ~7-11s `rustup toolchain install` on warm
          # runs by restoring the toolchain from a tiny per-platform cache.
          solo-toolchain-cache: true
      # Platform Test runs unit tests in libraries and binaries only — it
      # intentionally does NOT compile the integration test binaries under
      # `crates/*/tests/`. Most of those binaries' tests are #[ignore]'d, but
      # the binaries are still compiled by `cargo test --workspace`, which
      # cost ~4m of Windows CI time per run (issue #106). Full integration
      # coverage is provided by the `integration` workflow on Linux.
      - name: Build test binaries
        shell: bash
        run: soldr cargo test --workspace --lib --bins --no-fail-fast --no-run
      - name: Stop setup-soldr builder cache before tests
        uses: zackees/setup-soldr/cleanup@v0.9.47
      - name: Test
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/test-${{ inputs.os }}
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
        run: |
          set +e
          unset ZCCACHE_CACHE_DIR
          echo "Using isolated test SOLDR_CACHE_DIR=$SOLDR_CACHE_DIR"
          start=$SECONDS
          soldr cargo test --workspace --lib --bins --no-fail-fast 2>&1 | tee test-output.txt
          status=${PIPESTATUS[0]}
          dur=$((SECONDS - start))
          echo "- **${{ inputs.os }} / Test**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"

          if [ $status -ne 0 ]; then
            {
              echo '## Test Failures'
              echo '```'
              awk '/^failures:$/,/^test result:/' test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $status
      - name: Stop isolated test cache
        if: always()
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/test-${{ inputs.os }}
        run: |
          unset ZCCACHE_CACHE_DIR
          soldr cache shutdown --archive-logs "$SOLDR_CACHE_DIR/cache/zccache/logs/archive" || true
