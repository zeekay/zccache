name: Cache Cleanup

# setup-soldr#320 / setup-soldr#316: prune per-commit caches to prevent
# LRU eviction of small long-lived caches (solo-toolchain,
# cargo-registry). Without this the repo cache budget (10 GB) gets
# dominated by per-commit cook-delta + zccache-test entries,
# nullifying the warm-run wins from setup-soldr#305 / #310 / #313.
#
# Triggered on-demand:
# - workflow_dispatch: manual trigger
# - workflow_run: after CI / Integration / Coverage complete (those
#   are the workflows that ADD large per-commit cache entries). The
#   first step gates on actual cache size so cleanup is a no-op
#   unless usage is over the high-water mark (8 GB).
#
# Strategy: for each per-commit key family, keep the newest 5,
# prune the rest unconditionally.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI", "Integration", "Coverage", "Benchmark Stats", "Perf Cluster Rust"]
    types: [completed]

jobs:
  prune-per-commit-caches:
    name: Prune stale per-commit cache entries
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Gate on cache usage (skip when under 8 GB high-water mark)
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            // Skip the cleanup when cache usage is under the high-water
            // mark. The 10 GB cap is GitHub's soft limit (LRU eviction
            // engages above it). Triggering at 8 GB leaves 2 GB
            // headroom for in-flight workflow saves to complete
            // without forcing eviction of small long-lived caches.
            const HIGH_WATER_GB = 8;
            const usage = await github.rest.actions.getActionsCacheUsage(context.repo);
            const sizeGb = usage.data.active_caches_size_in_bytes / 1024 / 1024 / 1024;
            console.log(
              `Repo cache: ${usage.data.active_caches_count} entries, ` +
              `${sizeGb.toFixed(2)} GB (high-water: ${HIGH_WATER_GB} GB)`
            );
            if (sizeGb < HIGH_WATER_GB) {
              console.log("Under high-water mark — skipping cleanup.");
              core.setOutput("needed", "false");
            } else {
              console.log("Over high-water mark — cleanup needed.");
              core.setOutput("needed", "true");
            }

      - name: Prune per-commit cache families (keep newest 3)
        if: steps.gate.outputs.needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // setup-soldr#346: per-commit cache families accumulate
            // one entry per push and dominate the 10 GB budget. Each
            // family keeps its 3 newest entries (recent push + retry
            // + 1 in-flight PR); the rest are pruned unconditionally.
            //
            // Was KEEP=5 — observed at 14.6 GB usage which evicted
            // small build-cache entries (per-platform-job builds got
            // cold rebuilds, ~50 s wall-clock regression on macOS).
            // Tightened to 3.
            const PREFIXES = [
              "cook-delta-v2-",
              "zccache-Linux-X64-test-",
              "zccache-Linux-ARM64-test-",
              "zccache-Windows-X64-test-",
              "zccache-macos-arm64-test-",
              "cargo-target-Linux-X64-bench-",
              "cargo-target-Windows-X64-bench-",
              "zccache-Linux-X64-bench-",
              "zccache-Windows-X64-bench-",
              "zccache-macos-arm64-bench-",
              "cargo-target-macos-arm64-bench-",
            ];
            const KEEP = 3;
            const repo = context.repo;
            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { ...repo, per_page: 100, sort: "created_at", direction: "desc" }
            );

            let totalPruned = 0;
            let totalBytes = 0;
            for (const prefix of PREFIXES) {
              const matching = caches.filter(c => c.key && c.key.startsWith(prefix));
              const stale = matching.slice(KEEP);
              if (matching.length === 0) continue;
              console.log(`${prefix}: ${matching.length} entries, will prune ${stale.length}`);
              for (const c of stale) {
                try {
                  await github.rest.actions.deleteActionsCacheById({
                    ...repo,
                    cache_id: c.id,
                  });
                  totalBytes += c.size_in_bytes;
                  totalPruned += 1;
                  console.log(
                    `  Deleted ${c.key} (${(c.size_in_bytes / 1024 / 1024).toFixed(0)} MB, age ` +
                    `${((Date.now() - new Date(c.created_at).getTime()) / 3600000).toFixed(1)}h)`
                  );
                } catch (err) {
                  // Tolerate 404 — another cleanup workflow may have
                  // raced and deleted this entry already. Workflow_run
                  // fires this cleanup from multiple parent workflows
                  // simultaneously, so concurrent deletes on the same
                  // stale entry are expected.
                  if (err.status === 404) {
                    console.log(`  Skipped ${c.key} (already deleted by concurrent cleanup)`);
                  } else {
                    throw err;
                  }
                }
              }
            }
            console.log(
              `Pruned ${totalPruned} per-commit entries (${(totalBytes / 1024 / 1024 / 1024).toFixed(2)} GB recovered)`
            );

      - name: Hard cap — prune oldest entries until under 8 GB
        if: steps.gate.outputs.needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // setup-soldr#346: even after count-based pruning, the
            // sum of all categories can exceed the 10 GB cap. To
            // prevent the LRU from evicting *small* long-lived caches
            // (build-cache, solo-toolchain) that we WANT to keep,
            // proactively delete the oldest entries from prune-
            // eligible families until usage is under 8 GB.
            const TARGET_GB = 8;
            const ELIGIBLE_PREFIXES = [
              "cook-delta-v2-",
              "zccache-Linux-X64-test-",
              "zccache-Linux-ARM64-test-",
              "zccache-Windows-X64-test-",
              "zccache-macos-arm64-test-",
              "cargo-target-Linux-X64-bench-",
              "cargo-target-Windows-X64-bench-",
              "zccache-Linux-X64-bench-",
              "zccache-Windows-X64-bench-",
              "zccache-macos-arm64-bench-",
              "cargo-target-macos-arm64-bench-",
            ];
            const repo = context.repo;
            let usage = await github.rest.actions.getActionsCacheUsage(repo);
            let sizeGb = usage.data.active_caches_size_in_bytes / 1024 / 1024 / 1024;
            console.log(`After count-prune: ${sizeGb.toFixed(2)} GB. Target: ${TARGET_GB} GB.`);
            if (sizeGb <= TARGET_GB) {
              console.log("Already under hard cap — no further pruning needed.");
              return;
            }

            // Build list of prune-eligible entries, OLDEST FIRST.
            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { ...repo, per_page: 100, sort: "created_at", direction: "asc" }
            );
            const eligible = caches.filter(c =>
              c.key && ELIGIBLE_PREFIXES.some(p => c.key.startsWith(p))
            );
            console.log(`${eligible.length} prune-eligible entries available (oldest first).`);

            let extraPruned = 0;
            let extraBytes = 0;
            const targetBytes = TARGET_GB * 1024 * 1024 * 1024;
            for (const c of eligible) {
              usage = await github.rest.actions.getActionsCacheUsage(repo);
              if (usage.data.active_caches_size_in_bytes <= targetBytes) break;
              try {
                await github.rest.actions.deleteActionsCacheById({
                  ...repo,
                  cache_id: c.id,
                });
                extraBytes += c.size_in_bytes;
                extraPruned += 1;
                console.log(
                  `  Hard-cap deleted ${c.key} ` +
                  `(${(c.size_in_bytes / 1024 / 1024).toFixed(0)} MB, age ` +
                  `${((Date.now() - new Date(c.created_at).getTime()) / 3600000).toFixed(1)}h)`
                );
              } catch (err) {
                if (err.status === 404) continue;
                throw err;
              }
            }
            console.log(
              `Hard cap: pruned ${extraPruned} additional entries ` +
              `(${(extraBytes / 1024 / 1024 / 1024).toFixed(2)} GB recovered)`
            );

      - name: Report repo cache usage
        if: steps.gate.outputs.needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const usage = await github.rest.actions.getActionsCacheUsage(context.repo);
            console.log(
              `Repo cache after cleanup: ${usage.data.active_caches_count} entries, ` +
              `${(usage.data.active_caches_size_in_bytes / 1024 / 1024 / 1024).toFixed(2)} GB`
            );
