name: Coverage

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.62
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: coverage
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          # #240: seed the isolated coverage SOLDR_CACHE_DIR from the restored
          # build-cache so the daemon-isolated llvm-cov phase starts warm.
          seed-isolated-build-cache: ${{ runner.temp }}/zccache-self-tests/coverage
          verify-compile-cache: warn
          # setup-soldr#305: see Formatting job comment in ci.yml.
          solo-toolchain-cache: true
      - name: Install Rust coverage component
        run: soldr rustup component add llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Stop setup-soldr builder cache before coverage tests
        uses: zackees/setup-soldr/cleanup@v0.9.62
      - name: Generate coverage
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/coverage
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
        run: |
          unset ZCCACHE_CACHE_DIR
          echo "Using isolated coverage SOLDR_CACHE_DIR=$SOLDR_CACHE_DIR"
          # --lib --bins matches ci-check.yml's test scope. The integration
          # tests under crates/*/tests spawn helper binaries via
          # env!("CARGO_BIN_EXE_*"); cargo never builds required-features
          # bins for `cargo test`, so under llvm-cov's separate target dir
          # (target/llvm-cov-target) those spawns fail with NotFound
          # (issue #1025: cli_cache_root broke Coverage on every push since
          # 2026-07-07). Spawned children wouldn't contribute coverage
          # anyway — scope to in-process unit tests.
          soldr cargo llvm-cov --workspace --lib --bins --lcov --output-path lcov.info
      - name: Stop isolated coverage cache
        if: always()
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/coverage
        run: |
          unset ZCCACHE_CACHE_DIR
          soldr cache shutdown --archive-logs "$SOLDR_CACHE_DIR/cache/zccache/logs/archive" || true
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
