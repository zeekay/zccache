name: CI

# One job per platform; every gate is a step that delegates to
# `ci.py <gate>`. Logic lives in Python (`ci/gates/*.py`); YAML is the
# thin orchestration layer it should always have been.
#
# Gates inherit continue-past-failures semantics from the action's
# `continue-on-error`. The final `ci.py all` step is NOT used here —
# we expand to one step per gate so step-level UI in the GHA web view
# still tells the developer which gate fired. For local repro
# (laptop, fix-it loop), `./ci.sh all` runs everything
# with the same continue-past-failures accumulator.
#
# Platform matrix:
#
#   platform           runner               target triple (if non-default)
#   ---------------    -------------------- ------------------------------
#   linux-x86          ubuntu-latest        default
#   linux-x86-musl     ubuntu-latest        x86_64-unknown-linux-musl
#   linux-arm          ubuntu-24.04-arm     default
#   linux-arm-musl     ubuntu-24.04-arm     aarch64-unknown-linux-musl
#   windows-x86        windows-latest       default
#   windows-arm        windows-11-arm       default
#   mac-x86            macos-13             default
#   mac-arm            macos-latest         default

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86
            os: ubuntu-latest
            target: ""
          - platform: linux-x86-musl
            os: ubuntu-latest
            target: "x86_64-unknown-linux-musl"
          - platform: linux-arm
            os: ubuntu-24.04-arm
            target: ""
          - platform: linux-arm-musl
            os: ubuntu-24.04-arm
            target: "aarch64-unknown-linux-musl"
          - platform: windows-x86
            os: windows-latest
            target: ""
          - platform: windows-arm
            os: windows-11-arm
            target: ""
          - platform: mac-x86
            os: macos-13
            target: ""
          - platform: mac-arm
            os: macos-latest
            target: ""
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - id: setup-soldr
        uses: zackees/setup-soldr@v0.9.62
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: unified-${{ matrix.platform }}
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          solo-toolchain-cache: true
          verify-compile-cache: warn
          dylint-cache: true
          dylint-toolchain: nightly-2026-03-26
          dylint-driver-rev: 4bd91ce7729b74c7ee5664bbb588f7baf30b4a09
          cargo-dylint-version: 5.0.0
          dylint-link-version: 5.0.0

      - name: Install musl toolchain
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: |
          soldr rustup target add ${{ matrix.target }}
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Export gate env
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            echo "CARGO_TARGET_FLAG=--target ${{ matrix.target }}" >> "$GITHUB_ENV"
          else
            echo "CARGO_TARGET_FLAG=" >> "$GITHUB_ENV"
          fi
          # Pass the dylint-cache-hit through to the dylint gate so it
          # can skip the install steps when setup-soldr already restored
          # the driver.
          echo "SETUP_SOLDR_DYLINT_CACHE_HIT=${{ steps.setup-soldr.outputs.dylint-cache-hit }}" >> "$GITHUB_ENV"

      # ── Gates ──────────────────────────────────────────────────────
      # Each gate is `./ci.sh <gate>` so the actual logic
      # lives in `ci/gates/*.py`. `continue-on-error: true` on every
      # gate except build; the final `report failures` step aggregates.

      - id: gate_fmt
        name: fmt
        continue-on-error: true
        run: ./ci.sh fmt

      - id: gate_clippy
        name: clippy
        continue-on-error: true
        run: ./ci.sh clippy

      - id: gate_dylint
        name: dylint
        continue-on-error: true
        run: ./ci.sh dylint

      - id: gate_docs
        name: docs
        continue-on-error: true
        run: ./ci.sh docs

      # Build is the one fatal gate — see `FATAL_GATES` in ci.gates.
      - id: gate_build
        name: build
        run: ./ci.sh build

      - id: gate_test_compile
        name: compile test binaries
        continue-on-error: true
        run: ./ci.sh test-compile

      - name: Stop setup-soldr builder cache before tests
        if: always()
        uses: zackees/setup-soldr/cleanup@v0.9.62

      - id: gate_unit
        name: unit tests
        continue-on-error: true
        run: ./ci.sh unit

      - id: gate_integration
        name: integration tests
        continue-on-error: true
        run: ./ci.sh integration

      - id: gate_cargo_registry
        name: cargo-registry smoke
        continue-on-error: true
        run: ./ci.sh cargo-registry

      - id: gate_gha_cache
        name: gha-cache smoke
        continue-on-error: true
        run: ./ci.sh gha-cache

      - id: gate_action_yaml
        name: action.yml structural
        continue-on-error: true
        run: ./ci.sh action-yaml

      - id: gate_action_surface
        name: action surface contract
        continue-on-error: true
        run: ./ci.sh action-surface

      - id: gate_wrapper_e2e
        name: wrapper-e2e
        continue-on-error: true
        run: ./ci.sh wrapper-e2e

      # ── Final report ────────────────────────────────────────────────
      - name: report failures
        if: always()
        shell: bash
        run: |
          set -e
          declare -a failures=()
          add_fail() {
            local outcome="$1" gate="$2"
            if [ "$outcome" = "failure" ]; then
              failures+=("$gate")
            fi
          }
          add_fail "${{ steps.gate_fmt.outcome }}"            "fmt"
          add_fail "${{ steps.gate_clippy.outcome }}"         "clippy"
          add_fail "${{ steps.gate_dylint.outcome }}"         "dylint"
          add_fail "${{ steps.gate_docs.outcome }}"           "docs"
          add_fail "${{ steps.gate_build.outcome }}"          "build"
          add_fail "${{ steps.gate_test_compile.outcome }}"   "test-compile"
          add_fail "${{ steps.gate_unit.outcome }}"           "unit"
          add_fail "${{ steps.gate_integration.outcome }}"    "integration"
          add_fail "${{ steps.gate_cargo_registry.outcome }}" "cargo-registry"
          add_fail "${{ steps.gate_gha_cache.outcome }}"      "gha-cache"
          add_fail "${{ steps.gate_action_yaml.outcome }}"    "action-yaml"
          add_fail "${{ steps.gate_action_surface.outcome }}" "action-surface"
          add_fail "${{ steps.gate_wrapper_e2e.outcome }}"    "wrapper-e2e"

          if [ ${#failures[@]} -eq 0 ]; then
            echo "## ${{ matrix.platform }}: all gates passed" >> "$GITHUB_STEP_SUMMARY"
            echo "all gates passed"
            exit 0
          fi

          {
            echo "## ${{ matrix.platform }}: FAILED gates"
            for g in "${failures[@]}"; do echo "- $g"; done
          } >> "$GITHUB_STEP_SUMMARY"

          echo "FAILED: ${failures[*]}"
          exit 1
