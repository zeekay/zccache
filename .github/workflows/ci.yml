name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.42
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          build-cache: false
          linker: fast
          prebuild-deps: none
          # solo-toolchain-cache restores a partial rustup state on warm
          # runs where rustfmt appears installed in the manifest but
          # `cargo-fmt` is missing from the toolchain bin/ directory.
          # Result: `cargo fmt` fails with "the 'cargo-fmt' binary is
          # not applicable to the '1.94.1-x86_64-unknown-linux-gnu'
          # toolchain" on every push-to-main since the cache started
          # landing exact-hits. Disabling the cache for this lightweight
          # job costs ~8 s per run — cheap insurance vs. losing CI
          # signal on Formatting. Re-enable once setup-soldr packages
          # the rustfmt binary into the cached toolchain layout.
          solo-toolchain-cache: false
      - name: Install Rust components
        run: soldr rustup component add rustfmt
      - name: Check formatting
        run: soldr cargo fmt --all -- --check

  dylint:
    name: Dylint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: setup-soldr
        uses: zackees/setup-soldr@v0.9.42
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cargo-registry-cache: false
          cache-key-suffix: dylint
          linker: fast
          prebuild-deps: soldr-cook
          dylint-cache: true
          dylint-toolchain: nightly-2026-03-26
          dylint-driver-rev: 4bd91ce7729b74c7ee5664bbb588f7baf30b4a09
          cargo-dylint-version: 5.0.0
          dylint-link-version: 5.0.0
      - name: Install Dylint nightly toolchain
        run: soldr rustup toolchain install nightly-2026-03-26 --component llvm-tools-preview --component rust-src --component rustc-dev --profile minimal
      - name: Install stable Rust components
        run: soldr rustup component add rustfmt
      - name: Install Dylint
        if: steps.setup-soldr.outputs.dylint-cache-hit != 'true'
        run: |
          soldr cargo install cargo-dylint --version 5.0.0 --locked
          soldr cargo install dylint-link --version 5.0.0 --locked
      - name: Build compatible Dylint driver
        if: steps.setup-soldr.outputs.dylint-cache-hit != 'true'
        run: python3 ci/build_dylint_driver.py
      - name: Check Dylint Library Formatting (ban_std_pathbuf)
        run: soldr cargo fmt --manifest-path dylints/ban_std_pathbuf/Cargo.toml --all -- --check
      - name: Check Dylint Library Formatting (ban_unrooted_tempdir)
        run: soldr cargo fmt --manifest-path dylints/ban_unrooted_tempdir/Cargo.toml --all -- --check
      - name: Test Dylint Library (ban_std_pathbuf)
        run: |
          export PATH="${CARGO_HOME}/bin:${PATH}"
          soldr rustup run nightly-2026-03-26 cargo test --manifest-path dylints/ban_std_pathbuf/Cargo.toml
      - name: Test Dylint Library (ban_unrooted_tempdir)
        run: |
          export PATH="${CARGO_HOME}/bin:${PATH}"
          soldr rustup run nightly-2026-03-26 cargo test --manifest-path dylints/ban_unrooted_tempdir/Cargo.toml
      - name: Run Dylint
        run: |
          export PATH="${CARGO_HOME}/bin:${PATH}"
          python3 -m ci.lint --dylint-only

  msrv:
    name: MSRV (1.94.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.42
        with:
          zccache-seed-strict: true
          cache: true
          toolchain: 1.94.1
          cache-key-suffix: msrv
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          verify-compile-cache: warn
          # setup-soldr#305: see Formatting job comment above.
          solo-toolchain-cache: true
      - name: Check MSRV
        run: soldr cargo check --workspace

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.42
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: docs
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          verify-compile-cache: warn
          # setup-soldr#305: see Formatting job comment above.
          solo-toolchain-cache: true
      - name: Build docs
        run: soldr cargo doc --workspace --no-deps
