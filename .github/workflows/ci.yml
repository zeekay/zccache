name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0
        with:
          version: "0.7.14"
          toolchain: 1.94.1
          cache: true
          build-cache: false
          target-cache: false
      - name: Install Rust components
        run: rustup component add rustfmt
      - name: Check formatting
        run: soldr cargo fmt --all -- --check

  dylint:
    name: Dylint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0
        with:
          version: "0.7.14"
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: dylint
      - name: Install Dylint nightly toolchain
        run: rustup toolchain install nightly-2026-03-26 --component llvm-tools-preview --component rust-src --component rustc-dev --profile minimal
      - name: Install stable Rust components
        run: rustup component add rustfmt
      - name: Install Dylint
        run: soldr cargo install cargo-dylint dylint-link --version 5.0.0
      - name: Build compatible Dylint driver
        run: python3 ci/build_dylint_driver.py
      - name: Check Dylint Library Formatting
        run: soldr cargo fmt --manifest-path dylints/ban_std_pathbuf/Cargo.toml --all -- --check
      - name: Test Dylint Library
        run: |
          export PATH="${CARGO_HOME}/bin:${PATH}"
          cargo +nightly-2026-03-26 test --manifest-path dylints/ban_std_pathbuf/Cargo.toml
      - name: Run Dylint
        run: |
          export PATH="${CARGO_HOME}/bin:${PATH}"
          python3 -m ci.lint --dylint-only

  msrv:
    name: MSRV (1.94.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0
        with:
          version: "0.7.14"
          cache: true
          toolchain: 1.94.1
          cache-key-suffix: msrv
      - name: Check MSRV
        run: soldr cargo check --workspace

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0
        with:
          version: "0.7.14"
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: docs
      - name: Build docs
        run: soldr cargo doc --workspace --no-deps
