name: macOS (unified)

# Single-runner macOS validation that consolidates fmt, clippy, dylint,
# build, and unit tests into one job. Trades per-step status badges
# for ~5-7x fewer macOS runner-minutes and dramatically shorter
# end-to-end CI wall-clock — the macOS runner pool is the bottleneck
# on every zccache PR, and the previous fragmented layout (one runner
# per check) queues 5-6 jobs against a finite per-org concurrency cap.
#
# Per the original design discussion: badges are sacrificed willingly.
# A single FAIL row tells the developer that something on macOS is
# broken; the per-step `echo` markers below + the standard `cargo`
# error output identify which check fired without needing a separate
# job to fingerprint.
#
# Does NOT replace:
# - test-action.yml `cargo-registry (macos-15)` — exercises a distinct
#   subcommand surface, kept separate intentionally.
# - wrapper-e2e.yml `wrapper-e2e (macos-14)` — exercises the
#   SOLDR_RUSTC_WRAPPER end-to-end with a real cargo project, also
#   separate intentionally.
# - release-auto.yml macOS builds — release-time only.
#
# Does replace:
# - ci-macos.yml's Check + Test jobs (via ci-check.yml reuse) — those
#   are now subsumed here.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  macos:
    name: macOS validation (fmt + clippy + build + test)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      # setup-soldr defaults: zccache-seed-strict + cache + solo-toolchain-cache
      # are the warm-path enablers. prebuild-deps=soldr-cook gives us
      # cargo-chef recipe warming so every subsequent step inside this job
      # reuses the same warmed dependency graph — that's where the macOS
      # speedup actually lands compared to N separate runners each doing
      # their own soldr-cook.
      - uses: zackees/setup-soldr@v0.9.62
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: macos-unified
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          solo-toolchain-cache: true
          verify-compile-cache: warn

      # ── fmt ──────────────────────────────────────────────────────────
      - name: fmt
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo fmt --all -- --check
          dur=$((SECONDS - start))
          echo "- **macOS / fmt**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"

      # ── clippy (the lint user listed first) ──────────────────────────
      - name: clippy
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo clippy --workspace --all-targets -- -D warnings
          dur=$((SECONDS - start))
          echo "- **macOS / clippy**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"

      # ── build (cargo check is the standard "does it compile" gate;
      #     covers what the old Check job ran) ─────────────────────────
      - name: build
        shell: bash
        run: |
          start=$SECONDS
          soldr cargo check --workspace --all-targets
          dur=$((SECONDS - start))
          echo "- **macOS / build**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"

      # The test step needs an isolated cache dir so the daemon-isolated
      # unit tests don't fight with the build cache (#240). Matches the
      # pattern from ci-check.yml.
      - name: Build test binaries
        shell: bash
        run: soldr cargo test --workspace --lib --bins --no-fail-fast --no-run

      - name: Stop setup-soldr builder cache before tests
        uses: zackees/setup-soldr/cleanup@v0.9.62

      - name: test
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/macos-unified
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
        run: |
          set +e
          unset ZCCACHE_CACHE_DIR
          mkdir -p "$SOLDR_CACHE_DIR"
          start=$SECONDS
          soldr cargo test --workspace --lib --bins --no-fail-fast 2>&1 | tee test-output.txt
          status=${PIPESTATUS[0]}
          dur=$((SECONDS - start))
          echo "- **macOS / test**: ${dur}s" >> "$GITHUB_STEP_SUMMARY"

          if [ $status -ne 0 ]; then
            {
              echo '## Test Failures (macOS unified)'
              echo '```'
              awk '/^failures:$/,/^test result:/' test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $status

      - name: Stop isolated test cache
        if: always()
        shell: bash
        env:
          SOLDR_CACHE_DIR: ${{ runner.temp }}/zccache-self-tests/macos-unified
        run: |
          unset ZCCACHE_CACHE_DIR
          soldr cache shutdown --archive-logs "$SOLDR_CACHE_DIR/cache/zccache/logs/archive" || true
