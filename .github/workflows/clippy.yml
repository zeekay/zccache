name: Clippy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@be9cd32c413a696e85c13eaeef25400666dd5317
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: clippy
      - name: Install Clippy
        run: rustup component add clippy
      - name: Run Clippy
        run: soldr cargo clippy --workspace --all-targets -- -D warnings
