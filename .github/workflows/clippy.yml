name: Clippy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

env:
  CARGO_TERM_COLOR: always
  # NOTE: -D warnings deliberately omitted (#944). The workspace
  # [lints.clippy] block in Cargo.toml uses `deny` for the panic-class
  # lints (unwrap_used / unwrap_in_result / panic_in_result_fn) which
  # error on their own, and `warn` for expect_used — which is an
  # intentional documented-invariant escape hatch. Escalating warn → error
  # here would defeat that. Other workflows keep -D warnings.

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zackees/setup-soldr@v0.9.62
        with:
          zccache-seed-strict: true
          toolchain: 1.94.1
          cache: true
          cache-key-suffix: clippy
          linker: fast
          prebuild-deps: soldr-cook
          prebuild-deps-flags: ""
          verify-compile-cache: warn
          # setup-soldr#305: see Formatting job comment in ci.yml.
          solo-toolchain-cache: true
      - name: Install Clippy
        run: soldr rustup component add clippy
      - name: Run Clippy
        run: soldr cargo clippy --workspace --all-targets
