name: Perf Cluster Rust

# See PERF.md for branch-naming convention and per-branch scope table.
# Mirrors soldr's perf-cluster.yml; the diff is:
#   - build-binaries job builds soldr + zccache from source (plain
#     cargo + Swatinem cache + mold linker — no soldr/zccache
#     wrapping cargo, would be circular with the binaries under
#     test);
#   - soldr's vendored submodule is moved to the zccache commit under
#     test before soldr is built, so the tested daemon is embedded.

on:
  workflow_dispatch:
    inputs:
      platforms:
        # mac-x86 is intentionally not listed (Intel macs are EOL on
        # GHA's roadmap). Until a matrix row exists for a given
        # platform its cells gate themselves out via the
        # bench/build-binaries gate steps, so the dispatch UI stays
        # stable as cross-platform RSS pollers land in
        # perf/lib/common.sh.
        description: Platform subset
        type: choice
        required: true
        default: all
        options:
          - all
          - linux
          - mac-arm
          - win
      fixtures:
        # Both fixtures are part of the sanctioned rollout gate.
        description: Fixture subset
        type: choice
        required: true
        default: all
        options:
          - all
          - medium
          - sqlite-link
      scenarios:
        # Single-select dropdown to match the platforms / fixtures
        # shape. Arbitrary subsets (e.g. "cold + worktree but not
        # touch") aren't expressible here today — pick `all` or one
        # specific scenario. If subsets become a regular need, swap
        # back to per-scenario booleans.
        description: Scenario subset
        type: choice
        required: true
        default: all
        options:
          - all
          - cold-tar-untar-warm
          - worktree-share
          - touch-no-change
          - restore-no-clean-warm
      debug:
        description: Verbose tracing + retain raw RSS CSVs
        type: boolean
        required: true
        default: false
  push:
    branches:
      - main
      - 'perf/**'
      - 'evaluate/**'
    paths:
      - '.github/workflows/perf-rust-cluster.yml'
      - 'perf/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  # Never cancel a perf run in flight — every measurement is a data
  # point we want to keep, even if a follow-up push lands before this
  # one finishes. Runs queue per-ref instead of superseding.
  group: perf-rust-cluster-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    # Resolve the effective (platforms, fixtures, scenarios) scope
    # once and pipe the result to every downstream gate via job
    # outputs. Two sources:
    #
    # 1. `workflow_dispatch` -> use the dispatch inputs verbatim.
    # 2. `push` -> parse the branch name. `main` and `perf/all` are
    #    full-sweep aliases. `perf/<P>-<F>-<S>` narrows on the named
    #    axis tokens (see PERF.md for the full table). Unknown
    #    perf/* branches fall back to a full sweep with an
    #    `::notice::` so the dev still gets useful data while
    #    iterating on a feature branch.
    name: setup
    runs-on: ubuntu-24.04
    outputs:
      platforms: ${{ steps.parse.outputs.platforms }}
      fixtures:  ${{ steps.parse.outputs.fixtures }}
      scenarios: ${{ steps.parse.outputs.scenarios }}
      source:    ${{ steps.parse.outputs.source }}
    steps:
      - name: Parse scope
        id: parse
        env:
          EVENT:    ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          IN_PLAT:  ${{ inputs.platforms }}
          IN_FIX:   ${{ inputs.fixtures }}
          IN_SCEN:  ${{ inputs.scenarios }}
        run: |
          set -euo pipefail

          # Main, dispatch, and unknown perf branches default to the
          # complete sanctioned rollout matrix. Canonical branch tokens
          # remain available for narrow iteration.
          PLAT="all"; FIX="all"; SCEN="all"; SOURCE="default"

          if [[ "${EVENT}" == "workflow_dispatch" ]]; then
            PLAT="${IN_PLAT:-all}"
            FIX="${IN_FIX:-all}"
            SCEN="${IN_SCEN:-all}"
            SOURCE="dispatch"
          else
            case "${REF_NAME}" in
              main)
                SOURCE="alias:main"
                ;;
              perf/all)
                SOURCE="alias:perf/all"
                ;;
              perf/*)
                triple="${REF_NAME#perf/}"
                # Strict 3-token split. Branches with fewer or more
                # tokens fall through to the unknown-branch arm.
                IFS='-' read -r tp tf ts rest <<<"${triple}"
                bad=0
                # Platform token
                case "${tp}" in
                  all|linux|win) plat="${tp}" ;;
                  mac)           plat="mac-arm" ;;
                  *)             bad=1 ;;
                esac
                # Fixture token
                case "${tf}" in
                  all|medium) fix="${tf}" ;;
                  sqlite)     fix="sqlite-link" ;;
                  *)          bad=1 ;;
                esac
                # Scenario token
                case "${ts}" in
                  all)      scen="all" ;;
                  cold)     scen="cold-tar-untar-warm" ;;
                  worktree) scen="worktree-share" ;;
                  touch)    scen="touch-no-change" ;;
                  restore)  scen="restore-no-clean-warm" ;;
                  *)        bad=1 ;;
                esac
                if [[ -n "${rest}" || "${bad}" == "1" ]]; then
                  echo "::notice::Branch '${REF_NAME}' does not match perf/<plat>-<fix>-<scen>; falling back to the full matrix. See PERF.md."
                  SOURCE="unknown-perf:${REF_NAME}"
                else
                  PLAT="${plat}"; FIX="${fix}"; SCEN="${scen}"
                  SOURCE="branch:${REF_NAME}"
                fi
                ;;
              *)
                # evaluate/** and anything else covered by the push
                # filter that isn't main/perf uses full defaults.
                SOURCE="non-perf:${REF_NAME}"
                ;;
            esac
          fi

          {
            echo "## Scope"
            echo ""
            echo "| axis | value |"
            echo "| --- | --- |"
            echo "| event | ${EVENT} |"
            echo "| ref | ${REF_NAME} |"
            echo "| source | ${SOURCE} |"
            echo "| platforms | ${PLAT} |"
            echo "| fixtures | ${FIX} |"
            echo "| scenarios | ${SCEN} |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "platforms=${PLAT}" >> "$GITHUB_OUTPUT"
          echo "fixtures=${FIX}"   >> "$GITHUB_OUTPUT"
          echo "scenarios=${SCEN}" >> "$GITHUB_OUTPUT"
          echo "source=${SOURCE}"  >> "$GITHUB_OUTPUT"

  build-binaries:
    # Build soldr + zccache from source. Plain cargo invocations
    # (NOT wrapped by soldr or zccache — that would be circular with
    # the binaries under test). Fast-build stack: Swatinem/rust-cache
    # for cargo intermediates + mold linker on Linux. Both repos are
    # checked out at HEAD-of-main on each run; a broken source tree
    # in either repo fails the build loudly.
    needs: setup
    name: build-binaries (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-24.04
            exe: ""
            rustflags: -C link-arg=-fuse-ld=mold
          - platform: mac-arm
            runs_on: macos-14
            exe: ""
            rustflags: ""
          - platform: win
            runs_on: windows-2025
            exe: .exe
            rustflags: ""
    runs-on: ${{ matrix.runs_on }}
    steps:
      # Platform gate is a step (not job-level `if:`) because GHA
      # rejects `matrix.X` references in job-level `if:` expressions
      # with "Unrecognized named-value: 'matrix'", even though the
      # same context is available at `runs-on:` and inside step
      # `if:` blocks. Mirrors the gate-step pattern used by the
      # bench job below.
      - name: Gate cell against resolved scope
        id: gate
        env:
          REQ_PLATFORMS: ${{ needs.setup.outputs.platforms }}
          M_PLATFORM:    ${{ matrix.platform }}
        run: |
          if [[ "${REQ_PLATFORMS}" == "all" ]] \
             || [[ ",${REQ_PLATFORMS}," == *",${M_PLATFORM},"* ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "Platform ${M_PLATFORM} not in scope '${REQ_PLATFORMS}'; skipping build." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout zccache
        if: steps.gate.outputs.selected == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout soldr
        if: steps.gate.outputs.selected == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: zackees/soldr
          ref: main
          path: soldr-src
          submodules: recursive

      - name: Pin zccache source into soldr build
        if: steps.gate.outputs.selected == 'true'
        run: |
          set -euo pipefail
          git -C soldr-src/_vender/zccache fetch origin "$GITHUB_SHA"
          git -C soldr-src/_vender/zccache checkout --detach "$GITHUB_SHA"
          test "$(git -C soldr-src/_vender/zccache rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Install Rust toolchain
        if: steps.gate.outputs.selected == 'true'
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal --no-self-update

      - name: Install mold linker
        if: steps.gate.outputs.selected == 'true' && matrix.platform == 'linux'
        run: |
          which mold || sudo apt-get install -y mold

      # Binary cache keys: `<repo>-<platform>-<sha>-<2day-bucket>`.
      #
      # `<2day-bucket>` is `floor(unix_epoch_seconds / 172800)`; it ticks once
      # every 2 days, which is how we enforce the "expire stale binaries after
      # 2 days" rule without depending on a TTL feature actions/cache does
      # not offer. Same SHA built within the same 2-day window → cache hit,
      # skip the whole rust-cache/build/stage chain. Same SHA but the bucket
      # rolled over → cache miss, rebuild from scratch (and refresh the entry).
      - name: Compute binary cache keys
        if: steps.gate.outputs.selected == 'true'
        id: keys
        working-directory: soldr-src
        run: |
          set -euo pipefail
          bucket="$(( $(date +%s) / 172800 ))"
          soldr_sha="$(git rev-parse HEAD)"
          echo "bucket=${bucket}"       >> "$GITHUB_OUTPUT"
          echo "soldr_sha=${soldr_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "### Binary cache keys"
            echo ""
            echo "| repo | key |"
            echo "| --- | --- |"
            echo "| zccache | zccache-${{ matrix.platform }}-${{ github.sha }}-${bucket} |"
            echo "| soldr   | soldr-${{ matrix.platform }}-${soldr_sha}-${{ github.sha }}-${bucket} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore prebuilt zccache binaries
        if: steps.gate.outputs.selected == 'true'
        id: cache_zccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: staged/zccache
          key: zccache-${{ matrix.platform }}-${{ github.sha }}-${{ steps.keys.outputs.bucket }}

      - name: Restore cargo cache for zccache build
        if: steps.gate.outputs.selected == 'true' && steps.cache_zccache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: perf-rust-cluster-zccache-${{ matrix.platform }}
          workspaces: . -> target

      - name: Build zccache trio (release)
        if: steps.gate.outputs.selected == 'true' && steps.cache_zccache.outputs.cache-hit != 'true'
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cargo build --release --features zccache-bin,daemon-bin,fingerprint-bin --bin zccache --bin zccache-daemon --bin zccache-fp

      - name: Stage zccache binaries
        if: steps.gate.outputs.selected == 'true' && steps.cache_zccache.outputs.cache-hit != 'true'
        run: |
          mkdir -p staged/zccache
          for binary in zccache zccache-daemon zccache-fp; do
            cp "target/release/${binary}${{ matrix.exe }}" "staged/zccache/${binary}${{ matrix.exe }}"
            chmod +x "staged/zccache/${binary}${{ matrix.exe }}"
          done

      - name: Restore prebuilt soldr binary
        if: steps.gate.outputs.selected == 'true'
        id: cache_soldr
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: staged/soldr
          key: soldr-${{ matrix.platform }}-${{ steps.keys.outputs.soldr_sha }}-${{ github.sha }}-${{ steps.keys.outputs.bucket }}

      - name: Restore cargo cache for soldr build
        if: steps.gate.outputs.selected == 'true' && steps.cache_soldr.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: perf-rust-cluster-soldr-${{ matrix.platform }}
          workspaces: soldr-src -> target

      - name: Build soldr (release)
        if: steps.gate.outputs.selected == 'true' && steps.cache_soldr.outputs.cache-hit != 'true'
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        working-directory: soldr-src
        run: |
          cargo build --release -p soldr-cli

      - name: Stage soldr binary
        if: steps.gate.outputs.selected == 'true' && steps.cache_soldr.outputs.cache-hit != 'true'
        run: |
          mkdir -p staged/soldr
          cp "soldr-src/target/release/soldr${{ matrix.exe }}" "staged/soldr/soldr${{ matrix.exe }}"
          chmod +x "staged/soldr/soldr${{ matrix.exe }}"

      - name: Verify staged binaries
        if: steps.gate.outputs.selected == 'true'
        run: |
          find staged -maxdepth 4 -type f -exec ls -l {} \;
          for needed in staged/soldr/soldr staged/zccache/zccache staged/zccache/zccache-daemon staged/zccache/zccache-fp; do
            needed="${needed}${{ matrix.exe }}"
            if [[ ! -f "${needed}" ]]; then
              echo "::error::Missing required binary ${needed} after source build"
              exit 1
            fi
          done

      - name: Upload staged binaries for downstream jobs
        if: steps.gate.outputs.selected == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-binaries-${{ matrix.platform }}
          path: staged/
          retention-days: 7

  bench:
    name: bench (${{ matrix.platform }} / ${{ matrix.fixture }})
    needs: [setup, build-binaries]
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, mac-arm, win]
        fixture: [medium, sqlite-link]
        include:
          - platform: linux
            runs_on: ubuntu-24.04
            exe: ""
          - platform: mac-arm
            runs_on: macos-14
            exe: ""
          - platform: win
            runs_on: windows-2025
            exe: .exe
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Gate cell against resolved scope
        id: gate
        env:
          REQ_PLATFORMS: ${{ needs.setup.outputs.platforms }}
          REQ_FIXTURES:  ${{ needs.setup.outputs.fixtures }}
          REQ_SCENARIOS: ${{ needs.setup.outputs.scenarios }}
          M_PLATFORM:    ${{ matrix.platform }}
          M_FIXTURE:     ${{ matrix.fixture }}
        run: |
          in_subset() {
            local req="$1" val="$2"
            [[ "${req}" == "all" ]] && return 0
            [[ ",${req}," == *",${val},"* ]] && return 0
            return 1
          }

          # Cell is gated on (platform, fixture) only. Scenarios that
          # are not selected are filtered out of the per-cell loop
          # below, so a cell with zero selected scenarios still skips
          # the rest of the steps but does not consume bench-time.
          ALL_SCENARIOS="cold-tar-untar-warm worktree-share touch-no-change restore-no-clean-warm"
          selected_scenarios=""
          for s in ${ALL_SCENARIOS}; do
            if in_subset "${REQ_SCENARIOS}" "${s}"; then
              selected_scenarios="${selected_scenarios:+${selected_scenarios} }${s}"
            fi
          done

          if in_subset "${REQ_PLATFORMS}" "${M_PLATFORM}" \
             && in_subset "${REQ_FIXTURES}" "${M_FIXTURE}" \
             && [[ -n "${selected_scenarios}" ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
            echo "scenarios=${selected_scenarios}" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "Cell (${M_PLATFORM}, ${M_FIXTURE}) not selected by dispatch inputs (or zero matching scenarios); skipping." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: steps.gate.outputs.selected == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        if: steps.gate.outputs.selected == 'true'
        run: |
          # Workers need cargo on PATH so soldr cargo can dispatch to
          # it. The staged soldr already embeds the zccache commit under
          # test.
          rustup show active-toolchain || rustup toolchain install stable --profile minimal --no-self-update

      - name: Install fixture native deps
        if: steps.gate.outputs.selected == 'true' && matrix.fixture == 'sqlite-link' && matrix.platform == 'linux'
        run: |
          # rusqlite's `bundled` feature compiles libsqlite3 from C
          # via cc-rs. ubuntu-24.04 ships gcc already, but be
          # explicit so a future image change does not silently break
          # this row.
          which gcc || sudo apt-get install -y gcc

      - name: Download staged binaries
        if: steps.gate.outputs.selected == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: perf-binaries-${{ matrix.platform }}
          path: staged

      - name: Stage soldr on PATH
        if: steps.gate.outputs.selected == 'true'
        run: |
          chmod +x "staged/soldr/soldr${{ matrix.exe }}"
          mkdir -p "$HOME/.local/bin"
          cp "staged/soldr/soldr${{ matrix.exe }}" "$HOME/.local/bin/soldr${{ matrix.exe }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify soldr is the source build
        if: steps.gate.outputs.selected == 'true'
        run: |
          which soldr
          soldr version --json

      - name: Run selected scenarios
        if: steps.gate.outputs.selected == 'true'
        id: run
        env:
          SOLDR_DEBUG: ${{ inputs.debug == true && '1' || '' }}
          # A wedged compiler/daemon must fail this perf cell promptly so
          # the remaining matrix evidence and raw diagnostics are retained.
          SOLDR_CARGO_WAIT_TIMEOUT_SECS: "300"
          SELECTED_SCENARIOS: ${{ steps.gate.outputs.scenarios }}
          M_PLATFORM: ${{ matrix.platform }}
          M_FIXTURE: ${{ matrix.fixture }}
        run: |
          set -o pipefail

          runner_temp="${RUNNER_TEMP}"
          if [[ "${M_PLATFORM}" == "win" ]]; then
            # Git Bash exposes RUNNER_TEMP in native D:\\... form. GNU tar
            # treats the colon as a remote archive separator, so all shell
            # tools must receive the MSYS /d/... spelling instead.
            runner_temp="$(cygpath -u "${RUNNER_TEMP}")"
          fi
          out_root="${runner_temp}/perf-${M_PLATFORM}-${M_FIXTURE}"
          mkdir -p "${out_root}"
          artifact_root="${out_root}"
          if [[ "${M_PLATFORM}" == "win" ]]; then
            # upload-artifact is a Node action, not an MSYS process, and
            # therefore needs the native Windows spelling.
            artifact_root="$(cygpath -w "${out_root}")"
          fi
          echo "out_root=${artifact_root}" >> "$GITHUB_OUTPUT"

          # One header for the cell; each scenario appends a row via
          # measure::append_summary_md.
          {
            echo "## ${M_PLATFORM} / ${M_FIXTURE}"
            echo
            echo "| scenario | cold/A ms | warm/B ms | speedup | hits/misses | hit rate | peak daemon RSS |"
            echo "| --- | --- | --- | --- | --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          status=0
          for scenario in ${SELECTED_SCENARIOS}; do
            # Per-scenario workdir keeps cache dirs / tarball / RSS
            # CSV isolated even though all scenarios share this runner.
            workdir="${out_root}/${scenario}"
            mkdir -p "${workdir}"
            bash perf/lib/extract.sh "${M_FIXTURE}" "${workdir}"

            echo "::group::scenario: ${scenario}"
            if bash "perf/scenarios/${scenario}/run.sh" "${workdir}/${M_FIXTURE}" \
                 | tee "${workdir}/result.json"; then
              :
            else
              # Don't abort the loop on a single scenario failure —
              # the other scenarios on this fixture are independent
              # signals worth collecting. Final exit status reflects
              # the worst case.
              echo "scenario ${scenario} failed"
              status=1
            fi
            echo "::endgroup::"
          done
          exit "${status}"

      - name: Upload raw results
        if: steps.gate.outputs.selected == 'true' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-results-${{ matrix.platform }}-${{ matrix.fixture }}
          path: |
            ${{ steps.run.outputs.out_root }}/*/result.json
            ${{ steps.run.outputs.out_root }}/*/*-shutdown.json
            ${{ steps.run.outputs.out_root }}/*/rss-*.csv
            ${{ steps.run.outputs.out_root }}/*/warm-cache-report.json
            ${{ steps.run.outputs.out_root }}/*/cold-cache-report.json
            ${{ steps.run.outputs.out_root }}/*/*-cache-report.json
            ${{ steps.run.outputs.out_root }}/*/warm-zccache-logs/**
            ${{ steps.run.outputs.out_root }}/*/cold-zccache-logs/**
          if-no-files-found: warn
          retention-days: 14

  evaluate:
    # Pull every fixture artifact for one platform and hard-gate all
    # four rollout scenarios plus their staged telemetry.
    name: Evaluate ${{ matrix.platform }}
    needs: [setup, bench]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-24.04
            # Every scenario gates on speedup >= min_speedup.
            min_speedup: "4.5"
            # Optional per-scenario warm-ms ceiling. Combined with
            # the speedup gate as AND (gate fails if either fails).
            # Empty string = no warm-ms ceiling for that scenario.
            #
            # restore-no-clean-warm: 1500ms — cold-side compile time
            # dominates the speedup ratio, so a real 20× warm
            # regression would still pass a speedup-only gate.
            # The warm-ms ceiling is the binding constraint here.
            # 1500ms is conservative; tighten once GHA noise is
            # known. See PERF.md.
            max_warm_ms_cold: ""
            max_warm_ms_restore: "1500"
            max_warm_ms_worktree: "4000"
            max_warm_ms_touch: "2500"
            max_staged_overhead_ms: "15000"
            max_materialization_copied_bytes: "2147483648"
          - platform: mac-arm
            runs_on: macos-14
            min_speedup: "3.0"
            max_warm_ms_cold: ""
            max_warm_ms_restore: "2500"
            max_warm_ms_worktree: "6000"
            max_warm_ms_touch: "4000"
            max_staged_overhead_ms: "25000"
            max_materialization_copied_bytes: "2147483648"
          - platform: win
            runs_on: windows-2025
            min_speedup: "2.0"
            max_warm_ms_cold: ""
            max_warm_ms_restore: "5000"
            max_warm_ms_worktree: "8000"
            max_warm_ms_touch: "8000"
            max_staged_overhead_ms: "40000"
            max_materialization_copied_bytes: "2147483648"
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Gate cell against resolved scope
        id: gate
        env:
          REQ_PLATFORMS: ${{ needs.setup.outputs.platforms }}
          M_PLATFORM:    ${{ matrix.platform }}
        run: |
          in_subset() {
            local req="$1" val="$2"
            [[ "${req}" == "all" ]] && return 0
            [[ ",${req}," == *",${val},"* ]] && return 0
            return 1
          }

          # Fixture/scenario subsetting is done inside the evaluate
          # step (via needs.setup.outputs). The cell-level gate only
          # decides whether this whole platform's evaluator runs.
          if in_subset "${REQ_PLATFORMS}" "${M_PLATFORM}"; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "Evaluate (${M_PLATFORM}) not selected by dispatch inputs; skipping." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Download all perf results for ${{ matrix.platform }}
        if: steps.gate.outputs.selected == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Glob across every fixture bench cell ran for this
          # platform. v4's `pattern:` keeps each artifact's
          # subdirectory under `perf-results/` so the scenario
          # lookup below stays unambiguous.
          pattern: perf-results-${{ matrix.platform }}-*
          path: perf-results

      - name: Evaluate scenarios for ${{ matrix.platform }}
        if: steps.gate.outputs.selected == 'true'
        env:
          MIN_SPEEDUP:          ${{ matrix.min_speedup }}
          MAX_WARM_MS_COLD:     ${{ matrix.max_warm_ms_cold }}
          MAX_WARM_MS_RESTORE:  ${{ matrix.max_warm_ms_restore }}
          MAX_WARM_MS_WORKTREE: ${{ matrix.max_warm_ms_worktree }}
          MAX_WARM_MS_TOUCH:    ${{ matrix.max_warm_ms_touch }}
          MAX_STAGED_OVERHEAD_MS: ${{ matrix.max_staged_overhead_ms }}
          MAX_MATERIALIZATION_COPIED_BYTES: ${{ matrix.max_materialization_copied_bytes }}
          REQ_FIXTURES:         ${{ needs.setup.outputs.fixtures }}
          REQ_SCENARIOS:        ${{ needs.setup.outputs.scenarios }}
          M_PLATFORM:           ${{ matrix.platform }}
        run: |
          set -uo pipefail

          in_subset() {
            local req="$1" val="$2"
            [[ "${req}" == "all" ]] && return 0
            [[ ",${req}," == *",${val},"* ]] && return 0
            return 1
          }

          # Every known rollout scenario is a hard gate.
          mode_for() {
            case "$1" in
              cold-tar-untar-warm|restore-no-clean-warm|worktree-share|touch-no-change) echo "fail" ;;
              *) echo "warn" ;;
            esac
          }

          # Optional per-scenario warm-ms ceiling (combined as AND
          # with the speedup gate). Empty = no ceiling for that
          # scenario.
          max_warm_ms_for() {
            case "$1" in
              cold-tar-untar-warm)   echo "${MAX_WARM_MS_COLD}" ;;
              restore-no-clean-warm) echo "${MAX_WARM_MS_RESTORE}" ;;
              worktree-share)        echo "${MAX_WARM_MS_WORKTREE}" ;;
              touch-no-change)       echo "${MAX_WARM_MS_TOUCH}" ;;
              *)                     echo "" ;;
            esac
          }

          # Each scenario emits a different (cold_key, warm_key) pair.
          # Centralizing here keeps the assertion loop scenario-agnostic.
          cold_key_for() {
            case "$1" in
              worktree-share) echo "a_ms" ;;
              *) echo "cold_ms" ;;
            esac
          }
          warm_key_for() {
            case "$1" in
              worktree-share) echo "b_ms" ;;
              *) echo "warm_ms" ;;
            esac
          }

          # ---- formatting helpers ----------------------------------

          # ms -> human (Xh Ymin / Ymin Zs / Z.Xs / Xms / —).
          fmt_ms() {
            local ms="$1"
            if [[ -z "${ms}" || "${ms}" == "null" ]]; then echo "—"; return; fi
            awk -v m="${ms}" 'BEGIN {
              if (m+0 >= 60000) { printf "%dm%02ds", int(m/60000), int((m%60000)/1000) }
              else if (m+0 >= 1000) { printf "%.2fs", m/1000 }
              else { printf "%dms", m }
            }'
          }

          # bytes -> human (GiB / MiB / KiB / B / —).
          fmt_bytes() {
            local b="$1"
            if [[ -z "${b}" || "${b}" == "null" ]]; then echo "—"; return; fi
            awk -v x="${b}" 'BEGIN {
              if (x+0 >= 1073741824) { printf "%.2f GiB", x/1073741824 }
              else if (x+0 >= 1048576) { printf "%.1f MiB", x/1048576 }
              else if (x+0 >= 1024) { printf "%.1f KiB", x/1024 }
              else if (x+0 > 0) { printf "%d B", x }
              else { printf "0 B" }
            }'
          }

          # rate (0.0–1.0) -> "XX.X%". Missing -> "—".
          fmt_pct() {
            local r="$1"
            if [[ -z "${r}" || "${r}" == "null" ]]; then echo "—"; return; fi
            awk -v r="${r}" 'BEGIN { printf "%.1f%%", r*100 }'
          }

          # count over total -> "N (X.Y%)". Used for Hits/Misses/Ignored
          # so each cell carries its own ratio inline — no separate
          # percentage column needed and the cell remains self-explanatory
          # when copy-pasted out of context.
          fmt_count_pct() {
            local n="$1" total="$2"
            if [[ -z "${n}" || "${n}" == "null" ]]; then echo "—"; return; fi
            if [[ -z "${total}" || "${total}" == "null" || "${total}" == "0" ]]; then
              echo "${n}"
              return
            fi
            awk -v n="${n}" -v t="${total}" 'BEGIN { printf "%d (%.1f%%)", n, (n/t)*100 }'
          }

          # Single-line, self-contained summary suitable for inline
          # GHA annotations (::error / ::warning). Includes every
          # field the table shows so the annotation in the sidebar
          # tells the full story without opening the step summary.
          # All inputs come from this loop iteration's scope; `need`
          # is the per-scenario threshold label (e.g. ">=4.5x" or
          # "<=1500ms") so the annotation is accurate for both
          # speedup-gated and absolute-warm-gated scenarios.
          fmt_annotation() {
            local need="$1"
            printf '%s/%s: speedup=%sx (need %s); cold=%s warm=%s; compiles=%s hits=%s misses=%s ignored=%s errors=%s; hit=%s miss=%s ignore=%s; bytes_W=%s bytes_R=%s; time_saved=%s; daemon_RSS=%s compile_RSS=%s' \
              "${fixture}" "${scenario}" \
              "${speedup}" "${need}" \
              "$(fmt_ms "${cold_ms}")" "$(fmt_ms "${warm_ms}")" \
              "${compiles:-—}" "${hits:-—}" "${misses:-—}" "${non_cache:-—}" "${errs:-—}" \
              "$(fmt_pct "${hit_rate}")" "$(ratio_pct "${misses}" "${compiles}")" "$(ratio_pct "${non_cache}" "${compiles}")" \
              "$(fmt_bytes "${bytes_w}")" "$(fmt_bytes "${bytes_r}")" \
              "$(fmt_ms "${time_saved}")" \
              "$(fmt_bytes "${daemon_rss}")" "$(fmt_bytes "${compile_rss}")"
          }

          # `<count> / <total>` -> "X.Y%". Used by fmt_annotation for
          # the comma-separated rate triple; the table itself uses
          # fmt_count_pct which embeds the ratio next to the count.
          ratio_pct() {
            local n="$1" total="$2"
            if [[ -z "${n}" || "${n}" == "null" || -z "${total}" || "${total}" == "null" || "${total}" == "0" ]]; then
              echo "—"
              return
            fi
            awk -v n="${n}" -v t="${total}" 'BEGIN { printf "%.1f%%", (n/t)*100 }'
          }

          # ---- header --------------------------------------------------

          # 17-column table. Wide on purpose: collapses what used to be
          # a half-dozen separate `::error::` lines into a single
          # scannable row per cell. Hits/Misses/Ignored embed their
          # share of `compiles` inline (e.g. "115 (78.8%)") so the
          # hit / miss / ignore ratios are present without spending
          # three more columns. Columns:
          #   identity (2) | gate (3) | timing (2) | counts (5) |
          #   throughput (3) | resource (2).
          {
            echo "## Evaluate ${M_PLATFORM}"
            echo
            echo "| Fixture | Scenario | Verdict | Speedup | Need | Cold | Warm | Staged miss | Tiers R/H/C | Copied | Salvage | Compiles | Hits | Misses | Ignored | Errors | Unique Srcs | Bytes W | Time Saved | Daemon RSS | Compile RSS |"
            echo "| --- | --- | :---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Verdict cell: bold-marked so PASS/FAIL/WARN jumps out at a
          # glance when scanning the per-platform table in the run page.
          fmt_verdict() {
            case "$1" in
              PASS) echo "**PASS**" ;;
              FAIL) echo "**FAIL**" ;;
              WARN) echo "**WARN**" ;;
              *)    echo "$1" ;;
            esac
          }

          # Emit one table row. Caller fills in cold_ms, warm_ms,
          # speedup, verdict + the cache/resource cells (which may be
          # "—" when the underlying JSON is missing). Kept inline so
          # the column order is in one place; any new column gets
          # added here + in the header above.
          #
          # `need` (second arg) is the threshold-label cell, e.g.
          # ">=4.5x" for speedup-gated scenarios or "<=1500ms" for
          # the absolute-warm-ms gate on restore-no-clean-warm.
          # Pre-result rows (MISSING / BAD-JSON / BAD-WARM) pass "—"
          # since the threshold isn't applicable.
          emit_row() {
            local verdict="$1"
            local need="${2:-—}"
            printf '| %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s | %s |\n' \
              "${fixture}" "${scenario}" \
              "$(fmt_verdict "${verdict}")" "${speedup:-—}x" "${need}" \
              "$(fmt_ms "${cold_ms}")" "$(fmt_ms "${warm_ms}")" \
              "$(fmt_ms "${staged_overhead_ms}")" "${tier_counts:-n/a}" \
              "$(fmt_bytes "${materialization_copied}")" "${salvage_count:-n/a}" \
              "${compiles:-—}" \
              "$(fmt_count_pct "${hits}" "${compiles}")" \
              "$(fmt_count_pct "${misses}" "${compiles}")" \
              "$(fmt_count_pct "${non_cache}" "${compiles}")" \
              "${errs:-—}" "${unique_srcs:-—}" \
              "$(fmt_bytes "${bytes_w}")" "$(fmt_ms "${time_saved}")" \
              "$(fmt_bytes "${daemon_rss}")" "$(fmt_bytes "${compile_rss}")" \
              >> "$GITHUB_STEP_SUMMARY"
          }

          status=0
          for fixture in medium sqlite-link; do
            if ! in_subset "${REQ_FIXTURES}" "${fixture}"; then
              echo "fixture ${fixture} not selected by dispatch input / branch narrowing; skipping"
              continue
            fi

            # download-artifact@v4 with `pattern:` lays each artifact
            # under its own subdir: perf-results/perf-results-<plat>-<fixt>/.
            fixture_root="perf-results/perf-results-${M_PLATFORM}-${fixture}"
            if [[ ! -d "${fixture_root}" ]]; then
              echo "::warning::no artifact for fixture ${fixture} on ${M_PLATFORM} — bench cell likely skipped"
              continue
            fi

            for scenario in cold-tar-untar-warm worktree-share touch-no-change restore-no-clean-warm; do
              if ! in_subset "${REQ_SCENARIOS}" "${scenario}"; then
                echo "scenario ${scenario} not selected by dispatch input; skipping"
                continue
              fi

              mode="$(mode_for "${scenario}")"
              cold_key="$(cold_key_for "${scenario}")"
              warm_key="$(warm_key_for "${scenario}")"

              # Reset per-cell so a missing report doesn't bleed
              # last cell's stats into this row.
              cold_ms="" warm_ms="" speedup="—"
              compiles="" hits="" misses="" non_cache="" errs="" hit_rate=""
              bytes_w="" bytes_r="" time_saved="" unique_srcs=""
              daemon_rss="" compile_rss=""
              staged_overhead_ms="" tier_counts="" materialization_copied=""
              salvage_count="" staged_critical_failures="" publication_success=""
              warm_compilations="" warm_misses=""

              result_json="$(find "${fixture_root}" -type f -path "*/${scenario}/result.json" | head -n1)"
              if [[ -z "${result_json}" ]]; then
                emit_row "MISSING"
                if [[ "${mode}" == "fail" ]]; then
                  echo "::error::${fixture}/${scenario}: result.json not found in artifact (bench cell may have crashed before emit)"
                  status=1
                else
                  echo "::warning::${fixture}/${scenario}: result.json not found in artifact (bench cell may have crashed before emit)"
                fi
                continue
              fi

              cold_ms="$(jq -r --arg k "${cold_key}" '.[$k] // empty' "${result_json}")"
              warm_ms="$(jq -r --arg k "${warm_key}" '.[$k] // empty' "${result_json}")"
              daemon_rss="$(jq -r '.peak_daemon_rss_bytes // empty' "${result_json}")"
              compile_rss="$(jq -r '.peak_compile_rss_bytes // empty' "${result_json}")"
              warm_compilations="$(jq -r '.warm_compilations // empty' "${result_json}")"
              warm_misses="$(jq -r '.warm_misses // empty' "${result_json}")"

              cold_report=""
              for cand in 'cold-cache-report.json' 'a-cache-report.json'; do
                f="$(find "${fixture_root}" -type f -path "*/${scenario}/${cand}" | head -n1)"
                if [[ -n "${f}" ]]; then cold_report="${f}"; break; fi
              done

              # Pull warm-side per-session counters from the cache
              # report. Naming varies by scenario:
              #   cold-tar-untar-warm + touch-no-change -> warm-cache-report.json
              #   worktree-share                        -> b-cache-report.json
              #   anything else                         -> first *-cache-report.json that is not the cold/a side
              warm_report=""
              for cand in 'warm-cache-report.json' 'b-cache-report.json'; do
                f="$(find "${fixture_root}" -type f -path "*/${scenario}/${cand}" | head -n1)"
                if [[ -n "${f}" ]]; then warm_report="${f}"; break; fi
              done
              if [[ -z "${warm_report}" ]]; then
                warm_report="$(find "${fixture_root}" -type f -path "*/${scenario}/*-cache-report.json" \
                  ! -name 'cold-*' ! -name 'a-*' | head -n1)"
              fi
              if [[ -n "${warm_report}" ]]; then
                compiles="$(jq -r '.last_session.compilations // empty' "${warm_report}")"
                hits="$(jq -r '.last_session.hits // empty' "${warm_report}")"
                misses="$(jq -r '.last_session.misses // empty' "${warm_report}")"
                non_cache="$(jq -r '.last_session.non_cacheable // empty' "${warm_report}")"
                errs="$(jq -r '.last_session.errors // empty' "${warm_report}")"
                hit_rate="$(jq -r '.last_session.hit_rate // empty' "${warm_report}")"
                bytes_w="$(jq -r '.last_session.bytes_written // empty' "${warm_report}")"
                bytes_r="$(jq -r '.last_session.bytes_read // empty' "${warm_report}")"
                time_saved="$(jq -r '.last_session.time_saved_ms // empty' "${warm_report}")"
                unique_srcs="$(jq -r '.last_session.unique_sources // empty' "${warm_report}")"
              fi

              if [[ -n "${cold_report}" ]]; then
                staged_overhead_ns="$(jq -r '
                  (.last_session.phase_profile.staged.timings_ns.hashing // 0) +
                  (.last_session.phase_profile.staged.timings_ns.publication // 0) +
                  (.last_session.phase_profile.staged.timings_ns.miss_materialization // 0)
                ' "${cold_report}")"
                staged_overhead_ms="$(( (staged_overhead_ns + 999999) / 1000000 ))"
                publication_success="$(jq -r '.last_session.phase_profile.staged.counters.publication_success // empty' "${cold_report}")"
                cold_salvage="$(jq -r '.last_session.phase_profile.staged.counters.salvage_attempt // 0' "${cold_report}")"
                cold_critical="$(jq -r '
                  (.last_session.phase_profile.staged.counters.publication_failure // 0) +
                  (.last_session.phase_profile.staged.counters.publication_conflict // 0) +
                  (.last_session.phase_profile.staged.counters.materialize_failure // 0)
                ' "${cold_report}")"
              else
                cold_salvage=""
                cold_critical=""
              fi

              if [[ -n "${warm_report}" ]]; then
                tier_reflink="$(jq -r '.last_session.phase_profile.staged.counters.materialize_reflink // 0' "${warm_report}")"
                tier_hardlink="$(jq -r '.last_session.phase_profile.staged.counters.materialize_hardlink_shared // 0' "${warm_report}")"
                tier_copy="$(jq -r '.last_session.phase_profile.staged.counters.materialize_copy // 0' "${warm_report}")"
                materialization_copied="$(jq -r '.last_session.phase_profile.staged.bytes.materialization_copied // 0' "${warm_report}")"
                warm_salvage="$(jq -r '.last_session.phase_profile.staged.counters.salvage_attempt // 0' "${warm_report}")"
                warm_critical="$(jq -r '
                  (.last_session.phase_profile.staged.counters.publication_failure // 0) +
                  (.last_session.phase_profile.staged.counters.publication_conflict // 0) +
                  (.last_session.phase_profile.staged.counters.materialize_failure // 0)
                ' "${warm_report}")"
                tier_counts="${tier_reflink}/${tier_hardlink}/${tier_copy}"
              else
                tier_reflink="" tier_hardlink="" tier_copy=""
                warm_salvage="" warm_critical=""
              fi

              if [[ -n "${cold_salvage}" && -n "${warm_salvage}" ]]; then
                salvage_count="$(( cold_salvage + warm_salvage ))"
                staged_critical_failures="$(( cold_critical + warm_critical ))"
              elif [[ "${scenario}" == "restore-no-clean-warm" && -n "${cold_salvage}" ]]; then
                salvage_count="${cold_salvage}"
                staged_critical_failures="${cold_critical}"
                tier_counts="0/0/0"
                materialization_copied="0"
              fi

              if [[ -z "${cold_ms}" || -z "${warm_ms}" ]]; then
                emit_row "BAD-JSON"
                if [[ "${mode}" == "fail" ]]; then
                  echo "::error::${fixture}/${scenario}: result.json missing ${cold_key}/${warm_key}"
                  status=1
                else
                  echo "::warning::${fixture}/${scenario}: result.json missing ${cold_key}/${warm_key}"
                fi
                continue
              fi

              # Treat a 0ms warm build as a measurement bug, not a win.
              if (( warm_ms <= 0 )); then
                emit_row "BAD-WARM"
                if [[ "${mode}" == "fail" ]]; then
                  echo "::error::${fixture}/${scenario}: ${warm_key}=${warm_ms}ms is non-positive (measurement bug, not a perf win)"
                  status=1
                else
                  echo "::warning::${fixture}/${scenario}: ${warm_key}=${warm_ms}ms is non-positive (measurement bug, not a perf win)"
                fi
                continue
              fi

              speedup="$(awk -v c="${cold_ms}" -v w="${warm_ms}" 'BEGIN { printf "%.2f", c / w }')"

              # Uniform AND-style gate:
              #   pass = (speedup >= min_speedup) AND (warm_ms <= max_warm_ms)
              # The warm-ms half is optional and only evaluated for
              # scenarios that opt in (via the matrix `max_warm_ms_<scen>`
              # field, surfaced here by `max_warm_ms_for`). Scenarios
              # with no warm-ms ceiling gate on speedup only.
              #
              # Why both: some scenarios (e.g. restore-no-clean-warm)
              # have cold-side compile noise that dominates the speedup
              # ratio, so a real warm regression can hide behind a still-
              # passing speedup ratio. The warm-ms ceiling catches that.
              # Others (cold-tar-untar-warm) want speedup as the signal
              # of cache contribution and don't need a warm-ms ceiling.
              speedup_pass="$(awk -v s="${speedup}" -v t="${MIN_SPEEDUP}" 'BEGIN { print (s >= t) ? "1" : "0" }')"
              max_warm="$(max_warm_ms_for "${scenario}")"
              warm_pass="1"
              warm_clause=""
              if [[ -n "${max_warm}" ]]; then
                warm_pass="$(awk -v w="${warm_ms}" -v t="${max_warm}" 'BEGIN { print (w+0 <= t+0) ? "1" : "0" }')"
                warm_clause=" AND <=${max_warm}ms"
              fi
              need=">=${MIN_SPEEDUP}x${warm_clause}"

              telemetry_pass="1"
              telemetry_issue=""
              if [[ -z "${staged_overhead_ms}" || -z "${publication_success}" ]]; then
                telemetry_pass="0"
                telemetry_issue="missing cold staged telemetry"
              elif (( publication_success <= 0 )); then
                telemetry_pass="0"
                telemetry_issue="cold path published no staged generations"
              elif (( staged_overhead_ms > MAX_STAGED_OVERHEAD_MS )); then
                telemetry_pass="0"
                telemetry_issue="staged miss overhead ${staged_overhead_ms}ms exceeds ${MAX_STAGED_OVERHEAD_MS}ms"
              elif [[ -z "${salvage_count}" || -z "${staged_critical_failures}" ]]; then
                telemetry_pass="0"
                telemetry_issue="missing staged failure telemetry"
              elif (( salvage_count != 0 || staged_critical_failures != 0 )); then
                telemetry_pass="0"
                telemetry_issue="salvage=${salvage_count} critical_failures=${staged_critical_failures}"
              elif [[ -z "${materialization_copied}" ]]; then
                telemetry_pass="0"
                telemetry_issue="missing materialization byte telemetry"
              elif (( materialization_copied > MAX_MATERIALIZATION_COPIED_BYTES )); then
                telemetry_pass="0"
                telemetry_issue="materialization copied ${materialization_copied} bytes (max ${MAX_MATERIALIZATION_COPIED_BYTES})"
              elif [[ "${scenario}" == "restore-no-clean-warm" ]]; then
                if [[ -z "${warm_misses}" || "${warm_misses}" != "0" ]]; then
                  telemetry_pass="0"
                  telemetry_issue="restore warm build had cache misses (misses=${warm_misses:-missing}, compilations=${warm_compilations:-missing})"
                fi
              elif [[ -z "${tier_reflink}" || -z "${tier_hardlink}" || -z "${tier_copy}" ]] \
                   || (( tier_reflink + tier_hardlink + tier_copy <= 0 )); then
                telemetry_pass="0"
                telemetry_issue="warm build reported no materialization tier"
              fi
              need="${need}; staged<=${MAX_STAGED_OVERHEAD_MS}ms; copied<=${MAX_MATERIALIZATION_COPIED_BYTES}B; salvage=0"

              if [[ "${speedup_pass}" == "1" && "${warm_pass}" == "1" && "${telemetry_pass}" == "1" ]]; then
                emit_row "PASS" "${need}"
                echo "PASS  ${fixture}/${scenario}: speedup=${speedup}x warm=$(fmt_ms "${warm_ms}") (need ${need}), cold=$(fmt_ms "${cold_ms}"), hits=${hits:-?}/${compiles:-?} ($(fmt_pct "${hit_rate}"))"
              else
                if [[ "${mode}" == "fail" ]]; then
                  emit_row "FAIL" "${need}"
                  echo "::error::$(fmt_annotation "${need}")"
                  if [[ -n "${telemetry_issue}" ]]; then
                    echo "::error::${fixture}/${scenario}: ${telemetry_issue}; tiers=${tier_counts:-missing}; copied=${materialization_copied:-missing}; salvage=${salvage_count:-missing}"
                  fi
                  status=1
                else
                  emit_row "WARN" "${need}"
                  # Soft gate: emit a warning that still has the
                  # full context, so a future tightening to a hard
                  # gate (see workflow header) doesn't need a
                  # message rewrite.
                  echo "::warning::$(fmt_annotation "${need}") [soft gate — not failing today]"
                fi
              fi
            done
          done

          exit "${status}"
