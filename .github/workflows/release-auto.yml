name: Auto-Release

on:
  push:
    tags:
      - "[0-9]*"
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag to publish, for example 1.3.0 or v1.3.0. Leave empty to use the current workspace version.
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUSTUP_HOME: ${{ github.workspace }}/.rustup

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Validate release metadata
        run: |
          python - <<'PY'
          from ci.release_checks import validate_release_metadata
          validate_release_metadata()
          PY

      - name: Resolve release version and fail on already-published release
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RAW_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          print(data["workspace"]["package"]["version"])
          PY
          )"

          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#refs/tags/}"
            CHECKOUT_REF="$TAG"
          else
            TAG="${RAW_TAG#refs/tags/}"
            if [ -z "$TAG" ]; then
              if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
                TAG="$VERSION"
                CHECKOUT_REF="$VERSION"
              elif git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
                TAG="v$VERSION"
                CHECKOUT_REF="$TAG"
              else
                TAG="$VERSION"
                CHECKOUT_REF="$GITHUB_SHA"
              fi
            else
              if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
                CHECKOUT_REF="$TAG"
              else
                CHECKOUT_REF="$GITHUB_SHA"
              fi
            fi
          fi

          NORMALIZED_TAG="${TAG#v}"

          if [ "$NORMALIZED_TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match workspace version $VERSION" >&2
            exit 1
          fi

          SEEN=""
          for CANDIDATE in "$TAG" "$NORMALIZED_TAG" "v$NORMALIZED_TAG"; do
            if [ -z "$CANDIDATE" ]; then
              continue
            fi
            case " $SEEN " in
              *" $CANDIDATE "*) continue ;;
            esac
            SEEN="$SEEN $CANDIDATE"

            RELEASE_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$CANDIDATE" 2>/dev/null || true)"
            if [ -z "$RELEASE_JSON" ]; then
              continue
            fi

            PUBLISHED_AT="$(RELEASE_JSON="$RELEASE_JSON" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RELEASE_JSON"])
          print(data.get("published_at") or "")
          PY
            )"
            if [ -n "$PUBLISHED_AT" ]; then
              echo "Release $CANDIDATE is already published at $PUBLISHED_AT" >&2
              exit 1
            fi
          done

          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail fast if version already exists on PyPI or crates.io
        run: |
          python -m ci.release_workflow check-registries

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            include_python: "false"
            upload_binaries: "false"
            upload_release: "true"

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            linker: aarch64-unknown-linux-musl-gcc
            strip: aarch64-unknown-linux-musl-strip
            include_python: "false"
            upload_binaries: "false"
            upload_release: "true"

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_ext: ""
            include_python: "true"
            upload_binaries: "true"
            upload_release: "false"

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary_ext: ""
            linker: aarch64-linux-gnu-gcc
            strip: aarch64-linux-gnu-strip
            include_python: "true"
            upload_binaries: "true"
            upload_release: "false"

          - target: x86_64-apple-darwin
            os: macos-14
            binary_ext: ""
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

          - target: aarch64-apple-darwin
            os: macos-latest
            binary_ext: ""
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: ./.github/actions/build-target
        id: build_target
        with:
          target: ${{ matrix.target }}
          binary_ext: ${{ matrix.binary_ext }}
          cache_key: release-${{ matrix.target }}
          include_python: ${{ matrix.include_python }}
          linker: ${{ matrix.linker || '' }}
          strip: ${{ matrix.strip || '' }}
          version: ${{ needs.preflight.outputs.version }}

      - uses: actions/upload-artifact@v4
        if: matrix.upload_binaries == 'true'
        with:
          name: binaries-${{ matrix.target }}
          path: ${{ steps.build_target.outputs.staging_dir }}/
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: matrix.upload_release == 'true'
        with:
          name: release-${{ matrix.target }}
          path: ${{ format('{0}/*{1}', steps.build_target.outputs.standalone_dir, matrix.binary_ext == '.exe' && '.zip' || '.tar.gz') }}
          if-no-files-found: error

  build-wheels:
    name: Build PyPI Wheels
    runs-on: ubuntu-latest
    needs: [preflight, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifact-downloads

      - name: Build wheels from downloaded artifacts
        run: python -m ci.release_workflow build-wheels --artifact-download-dir artifact-downloads

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: dist/wheels/*
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: [preflight, build-wheels]
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: dist/wheels

      - name: Publish wheel distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels/
          print-hash: true
          skip-existing: true

  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: [preflight, publish-pypi]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: python -m ci.release_workflow publish-crates

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, build, publish-pypi, publish-crates]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Add installer scripts
        run: |
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
          chmod 755 release-assets/install.sh

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          name: zccache ${{ needs.preflight.outputs.version }}
          body: |
            ## Install

            ```bash
            curl -LsSf https://github.com/zackees/zccache/releases/latest/download/install.sh | sh
            ```

            ```powershell
            powershell -ExecutionPolicy Bypass -c "irm https://github.com/zackees/zccache/releases/latest/download/install.ps1 | iex"
            ```

            GitHub Marketplace publication remains a manual GitHub UI step:
            open the generated release, select `Publish this action to the GitHub Marketplace`,
            choose categories, and publish.
          files: release-assets/*
          fail_on_unmatched_files: true
