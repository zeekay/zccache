name: Auto-Release

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]*"
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag to publish, for example 1.3.0 or v1.3.0. Leave empty to use the current workspace version.
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUSTUP_HOME: ${{ github.workspace }}/.rustup

jobs:
  detect-bump:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine whether to proceed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail

          read_version() {
            python3 - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          print(data["workspace"]["package"]["version"])
          PY
          }

          # Manual dispatch always proceeds — operator chose to run it.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "manual dispatch — proceeding"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_VERSION="$(read_version)"

          # Push to main: only proceed when Cargo.toml workspace version changed.
          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "branch" ]; then
            OLD_VERSION="$(git show HEAD^:Cargo.toml 2>/dev/null \
              | python3 -c "import sys, tomllib; print(tomllib.loads(sys.stdin.read())['workspace']['package']['version'])" 2>/dev/null \
              || echo "")"
            if [ -z "$OLD_VERSION" ] || [ "$NEW_VERSION" = "$OLD_VERSION" ]; then
              echo "no workspace version change ($NEW_VERSION) — skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "version bumped: $OLD_VERSION -> $NEW_VERSION"
          fi

          # Skip if a GitHub release already exists for this version. Prevents
          # double-runs when publish-release creates the tag and re-triggers us.
          # Rerun attempts are allowed through so an operator can restart after
          # the GitHub Release checkpoint exists and resume PyPI/crates.io.
          for CANDIDATE in "$NEW_VERSION" "v$NEW_VERSION"; do
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$CANDIDATE" >/dev/null 2>&1; then
              if [ "${RUN_ATTEMPT:-1}" != "1" ]; then
                echo "release $CANDIDATE already exists, but run attempt $RUN_ATTEMPT is a restart - proceeding"
                echo "should_release=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "release $CANDIDATE already exists — skipping"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "should_release=true" >> "$GITHUB_OUTPUT"

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    needs: detect-bump
    if: needs.detect-bump.outputs.should_release == 'true'
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      pypi_complete: ${{ steps.registries.outputs.pypi_complete }}
      crates_complete: ${{ steps.registries.outputs.crates_complete }}
      github_release_exists: ${{ steps.meta.outputs.github_release_exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Validate release metadata
        run: |
          python - <<'PY'
          from ci.release_checks import validate_release_metadata
          validate_release_metadata()
          PY

      - name: Resolve release version and existing release
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RAW_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          print(data["workspace"]["package"]["version"])
          PY
          )"

          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#refs/tags/}"
            CHECKOUT_REF="$TAG"
          else
            TAG="${RAW_TAG#refs/tags/}"
            if [ -z "$TAG" ]; then
              if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
                TAG="$VERSION"
                CHECKOUT_REF="$VERSION"
              elif git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
                TAG="v$VERSION"
                CHECKOUT_REF="$TAG"
              else
                TAG="$VERSION"
                CHECKOUT_REF="$GITHUB_SHA"
              fi
            else
              if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
                CHECKOUT_REF="$TAG"
              else
                CHECKOUT_REF="$GITHUB_SHA"
              fi
            fi
          fi

          NORMALIZED_TAG="${TAG#v}"

          if [ "$NORMALIZED_TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match workspace version $VERSION" >&2
            exit 1
          fi

          SEEN=""
          GITHUB_RELEASE_EXISTS=false
          for CANDIDATE in "$TAG" "$NORMALIZED_TAG" "v$NORMALIZED_TAG"; do
            if [ -z "$CANDIDATE" ]; then
              continue
            fi
            case " $SEEN " in
              *" $CANDIDATE "*) continue ;;
            esac
            SEEN="$SEEN $CANDIDATE"

            RELEASE_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$CANDIDATE" 2>/dev/null || true)"
            if [ -z "$RELEASE_JSON" ]; then
              continue
            fi

            PUBLISHED_AT="$(RELEASE_JSON="$RELEASE_JSON" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RELEASE_JSON"])
          print(data.get("published_at") or "")
          PY
            )"
            if [ -n "$PUBLISHED_AT" ]; then
              GITHUB_RELEASE_EXISTS=true
              echo "Release $CANDIDATE is already published at $PUBLISHED_AT; release job will update it"
              break
            fi
          done

          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "github_release_exists=$GITHUB_RELEASE_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Check registry publish status
        id: registries
        run: |
          python -m ci.release_workflow check-registries

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            prebuild_deps: none
            clear_target_after_setup: "true"
            include_python: "false"
            upload_binaries: "false"
            upload_release: "true"

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            linker: aarch64-unknown-linux-musl-gcc
            strip: aarch64-unknown-linux-musl-strip
            prebuild_deps: none
            clear_target_after_setup: "true"
            include_python: "false"
            upload_binaries: "false"
            upload_release: "true"

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_ext: ""
            clear_target_after_setup: "true"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "false"

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary_ext: ""
            linker: aarch64-linux-gnu-gcc
            strip: aarch64-linux-gnu-strip
            prebuild_deps: none
            clear_target_after_setup: "true"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "false"

          - target: x86_64-apple-darwin
            os: macos-14
            binary_ext: ""
            clear_target_after_setup: "true"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

          - target: aarch64-apple-darwin
            os: macos-latest
            binary_ext: ""
            prebuild_deps: none
            clear_target_after_setup: "true"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"
            clear_target_after_setup: "true"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"
            prebuild_deps: none
            clear_target_after_setup: "true"
            require_debug_sidecars: "false"
            include_python: "true"
            upload_binaries: "true"
            upload_release: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: ./.github/actions/build-target
        id: build_target
        with:
          target: ${{ matrix.target }}
          binary_ext: ${{ matrix.binary_ext }}
          cache_key: release-${{ matrix.target }}
          use_soldr: "false"
          prebuild_deps: ${{ matrix.prebuild_deps || 'soldr-cook' }}
          clear_target_after_setup: ${{ matrix.clear_target_after_setup || 'false' }}
          require_debug_sidecars: ${{ matrix.require_debug_sidecars || 'true' }}
          include_python: ${{ matrix.include_python }}
          linker: ${{ matrix.linker || '' }}
          strip: ${{ matrix.strip || '' }}
          version: ${{ needs.preflight.outputs.version }}

      - uses: actions/upload-artifact@v7
        if: matrix.upload_binaries == 'true'
        with:
          name: binaries-${{ matrix.target }}
          path: ${{ steps.build_target.outputs.staging_dir }}/
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: matrix.upload_release == 'true'
        with:
          name: release-${{ matrix.target }}
          path: ${{ format('{0}/*{1}', steps.build_target.outputs.standalone_dir, matrix.binary_ext == '.exe' && '.zip' || '.tar.gz') }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, build]
    if: |
      always()
      && needs.preflight.result == 'success'
      && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Add installer scripts
        run: |
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
          chmod 755 release-assets/install.sh

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Generate manifest.json
        shell: bash
        # Issue #858: publish a static manifest so soldr resolves binaries via
        # the release-asset CDN instead of the rate-limited GitHub releases API.
        # Runs after checksums so it enumerates the final archive set; the
        # manifest lands in release-assets/ and is swept up by the upload glob.
        run: |
          uv run --no-project ci/build_release_manifest.py \
            --assets-dir release-assets \
            --version "${{ needs.preflight.outputs.version }}" \
            --tag "${{ needs.preflight.outputs.release_tag }}" \
            --repo "${{ github.repository }}"

      - name: Publish or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          name: zccache ${{ needs.preflight.outputs.version }}
          body: |
            ## Install

            ```bash
            curl -LsSf https://github.com/zackees/zccache/releases/latest/download/install.sh | sh
            ```

            ```powershell
            powershell -ExecutionPolicy Bypass -c "irm https://github.com/zackees/zccache/releases/latest/download/install.ps1 | iex"
            ```

            GitHub Marketplace publication remains a manual GitHub UI step:
            open the generated release, select `Publish this action to the GitHub Marketplace`,
            choose categories, and publish.
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true

  build-wheels:
    name: Build PyPI Wheels
    runs-on: ubuntu-latest
    needs: [preflight, build, publish-release]
    if: needs.preflight.outputs.pypi_complete != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: artifact-downloads

      - name: Build wheels from downloaded artifacts
        run: python -m ci.release_workflow build-wheels --artifact-download-dir artifact-downloads

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-wheels
          path: dist/wheels/*
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: [preflight, publish-release, build-wheels]
    if: |
      always()
      && needs.preflight.result == 'success'
      && needs.publish-release.result == 'success'
      && needs.preflight.outputs.pypi_complete != 'true'
      && needs.build-wheels.result == 'success'
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pypi-wheels
          path: dist/wheels

      - name: Publish wheel distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels/
          print-hash: true
          skip-existing: true

      # Issue #483: pypa/gh-action-pypi-publish uploads wheels
      # sequentially, so downstream `uv sync` running mid-upload can
      # cache a partial wheel set and refuse to install. Poll the PyPI
      # JSON API until every wheel we just uploaded is visible before
      # this job returns success.
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Issue #657: `actions/checkout@v6` above wipes the workspace,
      # including `dist/wheels/` populated by the earlier download-
      # artifact step. Re-download the artifact post-checkout so the
      # verify step's `--wheels-dir dist/wheels` lookup succeeds.
      # Without this, the verify step fails with "wheels directory does
      # not exist" even though the actual publish step already ran
      # successfully — release-auto reports failure on a green release.
      - uses: actions/download-artifact@v8
        with:
          name: pypi-wheels
          path: dist/wheels
      - name: Verify all wheels visible on PyPI
        run: |
          python -m ci.release_workflow verify-pypi \
            --project zccache \
            --version "${{ needs.preflight.outputs.version }}" \
            --wheels-dir dist/wheels \
            --timeout-s 300 \
            --poll-interval-s 5

  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: [preflight, publish-release, publish-pypi]
    if: |
      always()
      && needs.preflight.result == 'success'
      && needs.publish-release.result == 'success'
      && needs.preflight.outputs.crates_complete != 'true'
      && (needs.preflight.outputs.pypi_complete == 'true' || needs.publish-pypi.result == 'success')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: python -m ci.release_workflow publish-crates
