name: Benchmark - zccache vs sccache vs bare

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "action.yml"
      - "action/**"
      - ".github/workflows/bench-action.yml"

concurrency:
  group: bench-action-${{ github.ref }}
  cancel-in-progress: true

# The benchmark builds zccache-core (a real crate with dependencies) three ways:
# 1. Bare cargo (no caching)
# 2. sccache (mozilla-actions/sccache-action)
# 3. zccache (this repo's action)
#
# Each approach does: cold build â†’ clean â†’ warm build â†’ clean â†’ warm build
# and reports wall-clock seconds for every step.

env:
  # Build a real crate that takes non-trivial time
  BUILD_TARGET: zccache-core
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # â”€â”€ Bare cargo (no cache) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  bare:
    name: "Bare (no cache)"
    runs-on: ubuntu-24.04
    outputs:
      cold: ${{ steps.cold.outputs.seconds }}
      warm1: ${{ steps.warm1.outputs.seconds }}
      warm2: ${{ steps.warm2.outputs.seconds }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: "Cold build"
        id: cold
        shell: bash
        run: |
          cargo clean 2>/dev/null || true
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::Bare cold build: ${ELAPSED}ms"

      - name: "Clean"
        run: cargo clean

      - name: "Warm build 1 (no cache = full rebuild)"
        id: warm1
        shell: bash
        run: |
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::Bare warm1 build: ${ELAPSED}ms"

      - name: "Clean"
        run: cargo clean

      - name: "Warm build 2 (no cache = full rebuild)"
        id: warm2
        shell: bash
        run: |
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::Bare warm2 build: ${ELAPSED}ms"

  # â”€â”€ sccache (legacy) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  sccache:
    name: "sccache"
    runs-on: ubuntu-24.04
    outputs:
      cold: ${{ steps.cold.outputs.seconds }}
      warm1: ${{ steps.warm1.outputs.seconds }}
      warm2: ${{ steps.warm2.outputs.seconds }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Cold build (sccache cold cache)"
        id: cold
        shell: bash
        run: |
          cargo clean 2>/dev/null || true
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::sccache cold build: ${ELAPSED}ms"

      - name: "sccache stats after cold"
        run: sccache --show-stats

      - name: "Clean"
        run: cargo clean

      - name: "Warm build 1 (sccache warm cache)"
        id: warm1
        shell: bash
        run: |
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::sccache warm1 build: ${ELAPSED}ms"

      - name: "sccache stats after warm1"
        run: sccache --show-stats

      - name: "Clean"
        run: cargo clean

      - name: "Warm build 2 (sccache warm cache)"
        id: warm2
        shell: bash
        run: |
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::sccache warm2 build: ${ELAPSED}ms"

      - name: "sccache final stats"
        run: sccache --show-stats

  # â”€â”€ zccache (new) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  zccache:
    name: "zccache"
    runs-on: ubuntu-24.04
    outputs:
      cold: ${{ steps.cold.outputs.seconds }}
      warm1: ${{ steps.warm1.outputs.seconds }}
      warm2: ${{ steps.warm2.outputs.seconds }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: ./
        with:
          shared-key: bench

      - name: "Cold build (zccache cold cache)"
        id: cold
        shell: bash
        run: |
          cargo clean 2>/dev/null || true
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::zccache cold build: ${ELAPSED}ms"

      - name: "zccache stats after cold"
        run: zccache status

      - name: "Clean"
        run: cargo clean

      - name: "Warm build 1 (zccache warm cache)"
        id: warm1
        shell: bash
        run: |
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::zccache warm1 build: ${ELAPSED}ms"

      - name: "zccache stats after warm1"
        run: zccache status

      - name: "Clean"
        run: cargo clean

      - name: "Warm build 2 (zccache warm cache)"
        id: warm2
        shell: bash
        run: |
          START=$(date +%s%N)
          cargo build -p $BUILD_TARGET 2>&1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          echo "::notice::zccache warm2 build: ${ELAPSED}ms"

      - name: "zccache final stats"
        run: zccache status

      - if: always()
        uses: ./action/cleanup

  # â”€â”€ Report â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  report:
    name: "Results"
    needs: [bare, sccache, zccache]
    runs-on: ubuntu-24.04
    steps:
      - name: Print comparison table
        shell: bash
        run: |
          BARE_COLD=${{ needs.bare.outputs.cold }}
          BARE_WARM1=${{ needs.bare.outputs.warm1 }}
          BARE_WARM2=${{ needs.bare.outputs.warm2 }}
          SC_COLD=${{ needs.sccache.outputs.cold }}
          SC_WARM1=${{ needs.sccache.outputs.warm1 }}
          SC_WARM2=${{ needs.sccache.outputs.warm2 }}
          ZC_COLD=${{ needs.zccache.outputs.cold }}
          ZC_WARM1=${{ needs.zccache.outputs.warm1 }}
          ZC_WARM2=${{ needs.zccache.outputs.warm2 }}

          echo "## Benchmark Results: zccache-core build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Bare (no cache) | sccache | zccache | zccache vs sccache | zccache vs bare |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          for PHASE in cold warm1 warm2; do
            case $PHASE in
              cold)  B=$BARE_COLD;  S=$SC_COLD;  Z=$ZC_COLD;  LABEL="Cold build" ;;
              warm1) B=$BARE_WARM1; S=$SC_WARM1; Z=$ZC_WARM1; LABEL="Warm build 1" ;;
              warm2) B=$BARE_WARM2; S=$SC_WARM2; Z=$ZC_WARM2; LABEL="Warm build 2" ;;
            esac

            # Calculate speedup ratios
            if [ "$Z" -gt 0 ] 2>/dev/null; then
              if [ "$S" -gt 0 ] 2>/dev/null; then
                VS_SC=$(awk "BEGIN {printf \"%.1fx\", $S/$Z}")
              else
                VS_SC="N/A"
              fi
              if [ "$B" -gt 0 ] 2>/dev/null; then
                VS_BARE=$(awk "BEGIN {printf \"%.1fx\", $B/$Z}")
              else
                VS_BARE="N/A"
              fi
            else
              VS_SC="N/A"
              VS_BARE="N/A"
            fi

            echo "| **$LABEL** | ${B}ms | ${S}ms | ${Z}ms | **${VS_SC}** | **${VS_BARE}** |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Cold = first build (empty cache). Warm = rebuild after \`cargo clean\` (cache hot)." >> "$GITHUB_STEP_SUMMARY"
          echo "> All runs on \`ubuntu-24.04\`, same hardware. \`CARGO_INCREMENTAL=0\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "============================================"
          echo "  BENCHMARK RESULTS: zccache-core build"
          echo "============================================"
          echo ""
          printf "%-20s %12s %12s %12s\n" "Phase" "Bare" "sccache" "zccache"
          printf "%-20s %12s %12s %12s\n" "---" "---" "---" "---"
          printf "%-20s %10sms %10sms %10sms\n" "Cold build" "$BARE_COLD" "$SC_COLD" "$ZC_COLD"
          printf "%-20s %10sms %10sms %10sms\n" "Warm build 1" "$BARE_WARM1" "$SC_WARM1" "$ZC_WARM1"
          printf "%-20s %10sms %10sms %10sms\n" "Warm build 2" "$BARE_WARM2" "$SC_WARM2" "$ZC_WARM2"
          echo ""
