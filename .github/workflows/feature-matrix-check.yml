name: Feature Matrix Check

# The main `ci.yml` workflow ignores `**/*.md`, so README/feature-matrix
# edits do not trigger it. This dedicated workflow runs whenever the
# feature-matrix source-of-truth YAML, the renderer, or one of the rendered
# outputs changes, and fails if the rendered outputs are stale relative to
# `docs/feature-matrix.yaml`.
#
# Re-run locally with:
#   uv run --with pyyaml python ci/render_feature_matrix.py

on:
  push:
    branches: [main]
    paths:
      - "docs/feature-matrix.yaml"
      - "docs/FEATURE-MATRIX.md"
      - "ci/render_feature_matrix.py"
      - "README.md"
      - ".github/workflows/feature-matrix-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/feature-matrix.yaml"
      - "docs/FEATURE-MATRIX.md"
      - "ci/render_feature_matrix.py"
      - "README.md"
      - ".github/workflows/feature-matrix-check.yml"

jobs:
  check:
    name: Feature matrix is rendered
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify rendered outputs match YAML source of truth
        run: uv run --with pyyaml python ci/render_feature_matrix.py --check
