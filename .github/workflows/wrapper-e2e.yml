name: Wrapper end-to-end

# Smoke test the RUSTC_WRAPPER path end-to-end. Build zccache from source,
# put both binaries on PATH, then drive a real `cargo build` against a
# small crate with proc-macro build scripts (serde --features derive),
# routing every rustc invocation through the freshly-built wrapper.
#
# Green on macos-13 / macos-14 is the acceptance signal that the 1.7.2
# macOS regression — build-script rustc failing in ~4ms with stderr
# swallowed — is fixed.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - "NOTICE*"
      - "AUTHORS*"
      - "CODEOWNERS"
      - "CONTRIBUTING*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "tasks/**"

jobs:
  wrapper-e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 (arm64) is the active macOS leg. It already validates
          # the 1.7.2 regression fix end-to-end and runs on the modern
          # Apple Silicon image where the Intel-only `macos-13` runner
          # pool is consistently scarce — keeping macos-13 in the matrix
          # added 15+ minutes of queue wait per run for redundant coverage.
          # Re-add if a future regression turns out to be Intel-specific.
          - os: macos-14       # Apple Silicon — primary macOS coverage
          - os: ubuntu-latest  # parity reference
          - os: windows-latest # parity reference
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: zackees/setup-soldr@386201437808bbe52f97b05e531b0276f8e5cebf
        with:
          cache: true
          cache-key-suffix: wrapper-e2e-${{ matrix.os }}
          prebuild-deps: soldr-cook
          prebuild-deps-flags: "--release"

      - name: print toolchain
        run: |
          soldr --version
          rustc --version || true

      # Force soldr to honor the workspace-relative `target/` dir so the
      # next step can copy the artifacts out predictably across OSes —
      # soldr otherwise picks its own CARGO_TARGET_DIR under
      # `$HOME/.soldr/...`. The `--target-dir` is per-invocation; nothing
      # else in CI relies on it.
      - name: build zccache release binaries
        run: soldr cargo build --release --target-dir target -p zccache --bin zccache -p zccache --bin zccache-daemon

      - name: install binaries on PATH (Unix)
        if: runner.os != 'Windows'
        run: |
          install_dir="$HOME/.local/bin"
          mkdir -p "$install_dir"
          # soldr may pin a target triple, in which case the artifacts
          # live under `target/<triple>/release/`. Find them either way.
          z=$(find target -path '*release/zccache' -type f -not -path '*/deps/*' | head -1)
          zd=$(find target -path '*release/zccache-daemon' -type f -not -path '*/deps/*' | head -1)
          test -n "$z"  || { echo "zccache binary not found under target/"; find target -name 'zccache' -type f; exit 1; }
          test -n "$zd" || { echo "zccache-daemon binary not found under target/"; find target -name 'zccache-daemon' -type f; exit 1; }
          install -m755 "$z"  "$install_dir/zccache"
          install -m755 "$zd" "$install_dir/zccache-daemon"
          echo "$install_dir" >> "$GITHUB_PATH"
          # macOS: strip the quarantine xattr if the runner image attached
          # one. Harmless no-op when absent.
          if [ "${{ runner.os }}" = "macOS" ]; then
            xattr -dr com.apple.quarantine "$install_dir/zccache"        || true
            xattr -dr com.apple.quarantine "$install_dir/zccache-daemon" || true
          fi

      - name: install binaries on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installDir = "$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          # Same triple-subdir-or-flat layout as Unix; resolve the actual
          # path before copying.
          $z  = Get-ChildItem -Recurse target -Filter zccache.exe        | Where-Object { $_.FullName -match '\\release\\' -and $_.FullName -notmatch '\\deps\\' } | Select-Object -First 1
          $zd = Get-ChildItem -Recurse target -Filter zccache-daemon.exe | Where-Object { $_.FullName -match '\\release\\' -and $_.FullName -notmatch '\\deps\\' } | Select-Object -First 1
          if (-not $z)  { Write-Error "zccache.exe not found under target/";        exit 1 }
          if (-not $zd) { Write-Error "zccache-daemon.exe not found under target/"; exit 1 }
          Copy-Item $z.FullName  "$installDir/zccache.exe"        -Force
          Copy-Item $zd.FullName "$installDir/zccache-daemon.exe" -Force
          Add-Content $env:GITHUB_PATH $installDir

      - name: Stop setup-soldr builder cache before wrapper smoke test
        uses: zackees/setup-soldr/cleanup@386201437808bbe52f97b05e531b0276f8e5cebf

      - name: smoke compile through wrapper (Unix)
        if: runner.os != 'Windows'
        env:
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export SOLDR_RUSTC_WRAPPER="$HOME/.local/bin/zccache"
          echo "Using isolated wrapper-smoke ZCCACHE_CACHE_DIR=$ZCCACHE_CACHE_DIR"
          echo "Using SOLDR_RUSTC_WRAPPER=$SOLDR_RUSTC_WRAPPER"
          command -v zccache
          zccache --version
          cd "$(mktemp -d)"
          soldr cargo new --lib hello
          cd hello
          # serde-derive pulls in proc-macro2 + serde_derive, both of
          # which have build scripts. cargo will run the wrapper for
          # each build-script rustc invocation — the exact path that
          # broke on macOS in 1.7.2.
          soldr cargo add serde --features derive
          soldr cargo build --verbose 2>&1 | tee build.log
          grep -F 'zccache ' build.log
          test -d "$ZCCACHE_CACHE_DIR/logs"

      - name: smoke compile through wrapper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SOLDR_CACHE_LIFECYCLE: command
          SOLDR_CACHE_SHUTDOWN_TIMEOUT_SECS: "30"
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: |
          $wrapper = Join-Path $env:USERPROFILE ".local\bin\zccache.exe"
          $env:PATH = "$(Split-Path -Parent $wrapper);$env:PATH"
          $env:SOLDR_RUSTC_WRAPPER = $wrapper
          Write-Host "Using isolated wrapper-smoke ZCCACHE_CACHE_DIR=$env:ZCCACHE_CACHE_DIR"
          Write-Host "Using SOLDR_RUSTC_WRAPPER=$env:SOLDR_RUSTC_WRAPPER"
          & $wrapper --version
          $tmp = New-Item -ItemType Directory -Path "$env:TEMP/zc-e2e-$(Get-Random)" -Force
          Set-Location $tmp
          soldr cargo new --lib hello
          Set-Location hello
          soldr cargo add serde --features derive
          soldr cargo build --verbose 2>&1 | Tee-Object -FilePath build.log
          if (-not (Select-String -Path build.log -SimpleMatch 'zccache')) { exit 1 }
          if (-not (Test-Path "$env:ZCCACHE_CACHE_DIR/logs")) { exit 1 }

      - name: Stop isolated wrapper smoke cache
        if: always()
        shell: bash
        env:
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: zccache stop || true

      - name: dump zccache logs on failure (Unix)
        if: failure() && runner.os != 'Windows'
        env:
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: |
          for d in "$ZCCACHE_CACHE_DIR/logs" "$ZCCACHE_CACHE_DIR" "$HOME/.zccache/logs" "$HOME/.zccache"; do
            [ -d "$d" ] || continue
            echo "===== ls -la $d ====="
            ls -la "$d" || true
            for f in "$d"/*.log "$d"/*.log.1; do
              [ -f "$f" ] || continue
              echo "===== $f ====="
              cat "$f" || true
            done
          done

      - name: dump zccache logs on failure (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        env:
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/wrapper-e2e-zccache
        run: |
          $logs = "$env:ZCCACHE_CACHE_DIR/logs"
          if (Test-Path $logs) {
            Get-ChildItem $logs | ForEach-Object {
              Write-Host "===== $($_.FullName) ====="
              Get-Content $_.FullName -ErrorAction SilentlyContinue
            }
          }
