name: Fingerprint Investigation Matrix

on:
  workflow_dispatch:

concurrency:
  group: bench-fingerprint-${{ github.ref }}
  cancel-in-progress: true

# Tests every hypothesis for why zccache cache hits break cargo fingerprints.
# Each job does: cold build -> clean -> warm build -> no-op build (measure + diagnose)

env:
  BUILD_TARGET: zccache-monocrate
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # ── Control: bare cargo (no wrapper) ─────────────────────────
  control-bare:
    name: "Control: bare cargo"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: rebuild (no cache)"
        run: cargo build -p $BUILD_TARGET

      - name: "Build 3: no-op (should be instant)"
        run: |
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::Control bare: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::error::UNEXPECTED: bare cargo recompiled on no-op"
          else
            echo "OK: cargo saw everything as fresh"
          fi

  # ── Control: sccache ─────────────────────────────────────────
  control-sccache:
    name: "Control: sccache"
    runs-on: ubuntu-24.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: "Build 1: cold (populates sccache)"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (sccache hits)"
        run: cargo build -p $BUILD_TARGET

      - name: "Build 3: no-op (should be instant)"
        run: |
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::Control sccache: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::error::UNEXPECTED: sccache recompiled on no-op"
          else
            echo "OK: cargo saw everything as fresh"
          fi

  # ── H1: zccache with hardlink (current behavior — expected broken) ──
  h1-zccache-hardlink:
    name: "H1: zccache hardlink (current)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h1

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (zccache hits via hardlink)"
        run: cargo build -p $BUILD_TARGET

      - name: "Snapshot: output file metadata after Build 2"
        run: |
          echo "=== .rlib files ==="
          find target/debug/deps -name "*.rlib" -exec stat {} \; 2>/dev/null | head -20
          echo "=== .rmeta files ==="
          find target/debug/deps -name "*.rmeta" -exec stat {} \; 2>/dev/null | head -20
          echo "=== .d files ==="
          find target/debug/deps -name "*.d" -exec stat {} \; 2>/dev/null | head -20
          echo "=== hardlink counts ==="
          find target/debug/deps -name "*.rlib" -exec stat -c "%n links=%h inode=%i mtime=%Y" {} \; 2>/dev/null | head -20
          echo "=== cache file mtimes ==="
          find ~/.zccache -name "*_0" -exec stat -c "%n mtime=%Y" {} \; 2>/dev/null | head -10

      - name: "Build 3: no-op (THE BUG — expect Compiling)"
        run: |
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::H1 zccache hardlink: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::warning::CONFIRMED BUG: zccache hardlink causes recompile on no-op"
            echo "COMPILING_COUNT=$(echo "$OUTPUT" | grep -c "Compiling")" >> "$GITHUB_ENV"
          else
            echo "OK: fingerprints survived (bug may be fixed!)"
          fi

      - if: always()
        uses: ./action/cleanup

  # ── H2: zccache, but remove wrapper for Build 3 ─────────────
  # Tests: does cargo fingerprint include RUSTC_WRAPPER path?
  h2-remove-wrapper:
    name: "H2: remove wrapper for Build 3"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h2

      - name: "Build 1: cold (with wrapper)"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (with wrapper, cache hits)"
        run: cargo build -p $BUILD_TARGET

      - name: "Build 3: no-op WITHOUT wrapper"
        run: |
          unset RUSTC_WRAPPER
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::H2 no wrapper Build 3: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::warning::Removing wrapper still recompiles — wrapper path is in fingerprint hash"
          else
            echo "::notice::Removing wrapper fixes it — wrapper presence triggers recompile"
          fi

      - if: always()
        uses: ./action/cleanup

  # ── H3: Build 3 with wrapper but pointing to a DIFFERENT binary ──
  # Tests: does cargo fingerprint the wrapper binary's mtime/hash?
  h3-different-wrapper-binary:
    name: "H3: different wrapper binary for Build 3"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h3

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (cache hits)"
        run: cargo build -p $BUILD_TARGET

      - name: "Copy zccache binary to a new path (different mtime/inode)"
        run: |
          ORIG=$(which zccache)
          cp "$ORIG" /tmp/zccache-copy
          chmod +x /tmp/zccache-copy
          echo "Original: $(stat -c 'mtime=%Y inode=%i' "$ORIG")"
          echo "Copy:     $(stat -c 'mtime=%Y inode=%i' /tmp/zccache-copy)"

      - name: "Build 3: no-op with COPIED wrapper binary"
        run: |
          export RUSTC_WRAPPER=/tmp/zccache-copy
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::H3 different binary: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::warning::Different binary path causes recompile — cargo hashes wrapper path/mtime"
          else
            echo "::notice::Different binary path is fine — wrapper identity not in fingerprint"
          fi

      - if: always()
        uses: ./action/cleanup

  # ── H4: Touch all output mtimes after Build 2 ───────────────
  # Tests: is mtime the root cause?
  h4-touch-mtimes:
    name: "H4: touch output mtimes after Build 2"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h4

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (cache hits)"
        run: cargo build -p $BUILD_TARGET

      - name: "Touch ALL files in target/ to current time"
        run: |
          find target -type f -exec touch {} +
          echo "Touched all files in target/"

      - name: "Build 3: no-op after touching everything"
        run: |
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::H4 touch mtimes: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::warning::Touching mtimes did NOT fix it — mtime is not the (only) issue"
          else
            echo "::notice::Touching mtimes FIXES it — mtime IS the root cause"
          fi

      - if: always()
        uses: ./action/cleanup

  # ── H5: Touch ONLY output artifacts (not .fingerprint/) ─────
  # Tests: is it the output mtime or the fingerprint file mtime?
  h5-touch-outputs-only:
    name: "H5: touch outputs only (not fingerprints)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h5

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (cache hits)"
        run: cargo build -p $BUILD_TARGET

      - name: "Touch ONLY .rlib, .rmeta, .d files (not .fingerprint/)"
        run: |
          find target/debug/deps -name "*.rlib" -exec touch {} + 2>/dev/null || true
          find target/debug/deps -name "*.rmeta" -exec touch {} + 2>/dev/null || true
          find target/debug/deps -name "*.d" -exec touch {} + 2>/dev/null || true
          echo "Touched output artifacts only"

      - name: "Build 3: no-op"
        run: |
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::H5 touch outputs only: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::warning::Touching outputs did NOT fix it"
          else
            echo "::notice::Touching outputs FIXES it — output mtime is the root cause"
          fi

      - if: always()
        uses: ./action/cleanup

  # ── H6: Check hardlink count on outputs ──────────────────────
  # Tests: does cargo reject files with link count > 1?
  h6-break-hardlink:
    name: "H6: break hardlinks (copy-over-self)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h6

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (cache hits via hardlink)"
        run: cargo build -p $BUILD_TARGET

      - name: "Break hardlinks: copy each file over itself"
        run: |
          for f in $(find target/debug/deps -name "*.rlib" -o -name "*.rmeta" -o -name "*.d" 2>/dev/null); do
            tmp="${f}.tmp"
            cp "$f" "$tmp"
            mv "$tmp" "$f"
          done
          echo "Hardlinks broken — all files now have unique inodes and fresh mtimes"
          find target/debug/deps -name "*.rlib" -exec stat -c "%n links=%h mtime=%Y" {} \; 2>/dev/null | head -5

      - name: "Build 3: no-op"
        run: |
          START=$(date +%s%N)
          OUTPUT=$(cargo build -p $BUILD_TARGET 2>&1)
          END=$(date +%s%N)
          MS=$(( (END - START) / 1000000 ))
          echo "$OUTPUT"
          echo "::notice::H6 break hardlinks: ${MS}ms"
          if echo "$OUTPUT" | grep -q "Compiling"; then
            echo "::warning::Breaking hardlinks did NOT fix it — not an inode/hardlink issue"
          else
            echo "::notice::Breaking hardlinks FIXES it — inode sharing or mtime is the cause"
          fi

      - if: always()
        uses: ./action/cleanup

  # ── H7: Cargo fingerprint trace ─────────────────────────────
  # This one gives us the exact reason cargo thinks things are dirty
  h7-cargo-trace:
    name: "H7: cargo fingerprint trace"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: ./
        with:
          shared-key: h7

      - name: "Build 1: cold"
        run: cargo build -p $BUILD_TARGET

      - name: "Clean"
        run: cargo clean

      - name: "Build 2: warm (cache hits)"
        run: cargo build -p $BUILD_TARGET

      - name: "Build 3: with CARGO_LOG=cargo::core::compiler::fingerprint=trace"
        run: |
          CARGO_LOG="cargo::core::compiler::fingerprint=trace" \
            cargo build -p $BUILD_TARGET 2> /tmp/cargo-fingerprint-trace.log || true
          echo "::notice::H7: trace log captured"

      - name: "Parse trace: why is each crate dirty?"
        run: |
          echo "=== Lines containing 'dirty' or 'stale' or 'fresh' ==="
          grep -iE "dirty|stale|fresh|fingerprint|reason" /tmp/cargo-fingerprint-trace.log | head -60
          echo ""
          echo "=== Lines containing 'mtime' ==="
          grep -i "mtime" /tmp/cargo-fingerprint-trace.log | head -20
          echo ""
          echo "=== Lines containing 'wrapper' or 'rustc' path ==="
          grep -iE "wrapper|rustc.*path|RUSTC" /tmp/cargo-fingerprint-trace.log | head -20
          echo ""
          echo "=== First 100 trace lines ==="
          head -100 /tmp/cargo-fingerprint-trace.log

      - name: "Upload full trace"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-fingerprint-trace
          path: /tmp/cargo-fingerprint-trace.log

      - if: always()
        uses: ./action/cleanup

  # ── Summary ──────────────────────────────────────────────────
  summary:
    name: "Summary"
    needs: [control-bare, control-sccache, h1-zccache-hardlink, h2-remove-wrapper, h3-different-wrapper-binary, h4-touch-mtimes, h5-touch-outputs-only, h6-break-hardlink, h7-cargo-trace]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Print hypothesis results
        run: |
          echo "## Fingerprint Investigation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the annotations on each job for CONFIRMED/OK/WARNING markers." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hypothesis | Job | What it tests |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | bare cargo | Baseline — should be instant |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | sccache | Baseline — should be instant |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H1 | zccache hardlink | Current behavior (expected broken) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H2 | remove wrapper | Does cargo fingerprint include RUSTC_WRAPPER? |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H3 | different binary | Does cargo hash the wrapper binary path/mtime? |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H4 | touch all mtimes | Is mtime the root cause? |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H5 | touch outputs only | Is it output mtime specifically? |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H6 | break hardlinks | Is it inode sharing or link count? |" >> "$GITHUB_STEP_SUMMARY"
          echo "| H7 | cargo trace | What does cargo SAY is dirty? (check artifact) |" >> "$GITHUB_STEP_SUMMARY"
