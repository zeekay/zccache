name: Release Standalone Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUSTUP_HOME: ${{ github.workspace }}/.rustup

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            cross: true
            linker: aarch64-unknown-linux-musl-gcc
            strip: aarch64-unknown-linux-musl-strip

          - target: x86_64-apple-darwin
            os: macos-14
            binary_ext: ""

          - target: aarch64-apple-darwin
            os: macos-latest
            binary_ext: ""

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-target
        id: build_target
        with:
          target: ${{ matrix.target }}
          binary_ext: ${{ matrix.binary_ext }}
          cache_key: release-${{ matrix.target }}
          linker: ${{ matrix.linker || '' }}
          strip: ${{ matrix.strip || '' }}
          version: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.build_target.outputs.standalone_dir }}/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Add installer scripts
        run: |
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
          chmod 755 release-assets/install.sh

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
