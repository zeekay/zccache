name: Benchmark Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

concurrency:
  group: benchmark-stats-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    name: Generate benchmark stats
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: zackees/setup-soldr@v0
        with:
          cache: false
          build-cache: false
          target-cache: false

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install benchmark tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang python3-pil

      - name: Generate benchmark report
        shell: bash
        env:
          ZCCACHE_BENCHMARK_PAGES_URL: https://zackees.github.io/zccache/
          ZCCACHE_BENCHMARK_RAW_BASE_URL: https://raw.githubusercontent.com/zackees/zccache/benchmark-stats
        run: |
          set -euo pipefail
          python3 -m ci.benchmark_stats --run-benchmarks --output-dir benchmark-stats --log-path benchmark-output/benchmark.log

      - name: Upload benchmark stats artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-stats
          path: benchmark-stats
          if-no-files-found: error

      - name: Publish benchmark-stats branch
        if: ${{ success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          cp -a benchmark-stats/. "$publish_dir/"
          git -C "$publish_dir" init
          git -C "$publish_dir" checkout -b benchmark-stats
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add .
          git -C "$publish_dir" commit -m "chore: publish benchmark stats for ${GITHUB_SHA}"
          git -C "$publish_dir" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_dir" push --force origin benchmark-stats

      - name: Configure GitHub Pages
        if: ${{ success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: benchmark-stats

  deploy-pages:
    name: Deploy benchmark report
    needs: benchmark
    if: ${{ needs.benchmark.result == 'success' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
