name: Build Native Binaries

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUSTUP_HOME: ${{ github.workspace }}/.rustup

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            include_python: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary_ext: ""
            cross: true
            linker: aarch64-unknown-linux-musl-gcc
            strip: aarch64-unknown-linux-musl-strip
            include_python: false

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_ext: ""
            include_python: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary_ext: ""
            cross: true
            linker: aarch64-linux-gnu-gcc
            strip: aarch64-linux-gnu-strip
            include_python: true

          - target: x86_64-apple-darwin
            os: macos-14
            binary_ext: ""
            include_python: true

          - target: aarch64-apple-darwin
            os: macos-latest
            binary_ext: ""
            include_python: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"
            include_python: true

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary_ext: ".exe"
            include_python: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - uses: ./.github/actions/build-target
        id: build_target
        with:
          target: ${{ matrix.target }}
          binary_ext: ${{ matrix.binary_ext }}
          cache_key: ${{ matrix.target }}
          include_python: ${{ matrix.include_python && 'true' || 'false' }}
          python_version: "3.13"
          linker: ${{ matrix.linker || '' }}
          strip: ${{ matrix.strip || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: ${{ steps.build_target.outputs.staging_dir }}/
          if-no-files-found: error

      - name: Upload standalone archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ format('{0}/*{1}', steps.build_target.outputs.standalone_dir, matrix.binary_ext == '.exe' && '.zip' || '.tar.gz') }}
          if-no-files-found: error
